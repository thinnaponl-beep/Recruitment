<script>
    // ==========================================
    // ⭐ 0. Helper: ระบบบันทึก Log อัจฉริยะ 
    // ==========================================
    async function writeLogToSupabase(action, module, details) {
        const userEmail = state.currentUser?.email || 'System';
        const logId = "LOG-" + new Date().getTime(); 
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const tsStr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`; 

        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

            let payload = {};
            payload[getCol(['logid', 'log_id', 'Log_ID', 'id'])] = logId;
            payload[getCol(['useremail', 'user_email', 'UserEmail', 'email'])] = userEmail;
            payload[getCol(['action', 'Action'])] = action;
            payload[getCol(['module', 'Module'])] = module;
            payload[getCol(['details', 'Details'])] = details;

            const tsCol = getCol(['timestamp', 'Timestamp', 'created_at', 'createdat']);
            if (dbKeys.includes(tsCol) || dbKeys.length === 0) { 
                payload[tsCol] = tsStr;
            }

            await supabase.from('db_logs').insert([payload]);
        } catch(e) { 
            console.error("Log error (ignored):", e); 
        }
    }

    const RESCHEDULE_LIMIT_DAYS = 30;

    // ==========================================
    // 🎓 1. โหลดข้อมูลและแสดงผล (Training Dashboard & Filters)
    // ==========================================

    if (typeof state.trainFilter === 'undefined') state.trainFilter = 'All';
    if (typeof state.trainSearch === 'undefined') state.trainSearch = '';
    if (typeof state.trainDateRange === 'undefined') state.trainDateRange = { start: null, end: null };
    let trainDateFilterControl = null;

    async function loadTrainingData() {
        try {
            const { data, error } = await supabase.from('db_training').select('*');
            if (error) {
                console.warn("Table db_training might not exist yet:", error.message);
                state.trainings = [];
            } else {
                state.trainings = data || [];
            }
            renderTrainingDashboard();
        } catch (err) {
            console.error("Load Training Error:", err);
        }
    }

    function renderTrainingDashboard() {
        const eligibleLeads = state.leads.filter(l => {
            const pVal = l.P_Value || l.p_value || l.pvalue;
            const tStat = l.TrainingStatus || l.training_status || l.trainingstatus;
            return pVal === 'P100' || tStat === 'จองอบรม';
        });

        const tCounts = { 'Total': eligibleLeads.length, 'รอดำเนินการ': 0, 'รออบรม': 0, 'อบรมแล้ว (ผ่าน)': 0, 'อบรมแล้ว (ไม่ผ่าน)': 0, 'ยกเลิก/สละสิทธิ์': 0 };

        eligibleLeads.forEach(l => {
            const leadId = l.Lead_ID || l.lead_id || l.leadid;
            const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
            let status = trainInfo.status || trainInfo.Status || 'รอดำเนินการ';
            if (tCounts[status] !== undefined) tCounts[status]++;
            else tCounts[status] = 1;
        });

        const tConfigs = [
            { id: 'All', label: 'ทั้งหมด', count: tCounts['Total'], color: '#64748b' },
            { id: 'รอดำเนินการ', label: 'รอดำเนินการ', count: tCounts['รอดำเนินการ'], color: '#f59e0b' },
            { id: 'รออบรม', label: 'รออบรม', count: tCounts['รออบรม'], color: '#3b82f6' },
            { id: 'อบรมแล้ว (ผ่าน)', label: 'ผ่าน', count: tCounts['อบรมแล้ว (ผ่าน)'], color: '#10b981' },
            { id: 'อบรมแล้ว (ไม่ผ่าน)', label: 'ไม่ผ่าน', count: tCounts['อบรมแล้ว (ไม่ผ่าน)'], color: '#ef4444' },
            { id: 'ยกเลิก/สละสิทธิ์', label: 'ยกเลิก', count: tCounts['ยกเลิก/สละสิทธิ์'], color: '#6b7280' }
        ];

        let cardsHtml = '<div class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-2 mb-3">';
        tConfigs.forEach(c => {
            const isActive = state.trainFilter === c.id;
            const activeStyle = isActive ? `box-shadow: 0 0 0 3px rgba(0,0,0,0.05); border-color: ${c.color} !important; background-color: ${c.color}15; transform: translateY(-2px);` : '';
            const textStyle = isActive ? `color: ${c.color} !important;` : '';

            cardsHtml += `
            <div class="col">
                <div class="card h-100 shadow-sm border" style="cursor: pointer; transition: all 0.2s; border-left: 4px solid ${c.color} !important; ${activeStyle}" onclick="setTrainFilter('${c.id}')">
                    <div class="card-body p-2 text-center">
                        <div class="small fw-bold text-muted mb-1" style="font-size: 0.75rem; ${textStyle}">${c.label}</div>
                        <h4 class="mb-0 fw-bold" style="color: ${c.color};">${c.count}</h4>
                    </div>
                </div>
            </div>`;
        });
        cardsHtml += '</div>';

        let searchHtml = `
            <div class="input-group input-group-sm shadow-sm" style="max-width: 250px; border-radius: 20px; overflow: hidden;">
                <span class="input-group-text bg-white border-end-0 px-2"><i class="fa-solid fa-search text-muted"></i></span>
                <input type="text" id="tSearchInput" class="form-control border-start-0 ps-0 shadow-none" placeholder="ค้นหาชื่อ, เบอร์โทร..." value="${state.trainSearch}" oninput="handleTrainSearch(this.value)">
                <button id="tSearchClearBtn" class="btn btn-white border-top border-bottom border-end text-muted shadow-none" style="display: ${state.trainSearch ? 'block' : 'none'};" onclick="clearTrainSearch()"><i class="fa-solid fa-xmark"></i></button>
            </div>
        `;

        let dateHtml = `
            <div class="d-flex align-items-center gap-2">
                <label class="form-label mb-0 fw-bold text-muted small" style="white-space: nowrap;">วันนัดอบรม:</label>
                <div class="input-group input-group-sm" style="width: 230px;">
                    <span class="input-group-text bg-white text-muted"><i class="fa-regular fa-calendar"></i></span>
                    <input type="text" class="form-control" id="trainDateFilterInput" placeholder="กรองวันนัดอบรม...">
                    <button class="btn btn-outline-secondary" type="button" onclick="clearTrainDateFilter()" title="ล้างตัวกรอง">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
        `;

        let toolbarHtml = `
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4 bg-white p-2 px-3 rounded shadow-sm border">
            ${searchHtml}
            ${dateHtml}
        </div>`;

        let container = document.getElementById('trainingDashboardCards');
        if (!container) {
            const tbody = document.getElementById('trainingTableBody');
            if (tbody) {
                const cardParent = tbody.closest('.card');
                if (cardParent) {
                    container = document.createElement('div');
                    container.id = 'trainingDashboardCards';
                    cardParent.parentNode.insertBefore(container, cardParent);
                }
            }
        }
        if (container) container.innerHTML = cardsHtml + toolbarHtml;

        if (!trainDateFilterControl && typeof flatpickr !== 'undefined') {
            const el = document.getElementById('trainDateFilterInput');
            if (el) {
                trainDateFilterControl = flatpickr(el, {
                    locale: "th",
                    mode: "range",
                    dateFormat: "d/m/Y",
                    onChange: function(selectedDates) {
                        if (selectedDates.length === 2) {
                            const start = selectedDates[0]; start.setHours(0,0,0,0);
                            const end = selectedDates[1]; end.setHours(23,59,59,999);
                            state.trainDateRange = { start, end };
                            applyTrainingFilters();
                        } else if (selectedDates.length === 0) {
                            state.trainDateRange = { start: null, end: null };
                            applyTrainingFilters();
                        }
                    }
                });
            }
        }

        applyTrainingFilters(eligibleLeads);
    }

    function setTrainFilter(val) { state.trainFilter = val; renderTrainingDashboard(); }
    function handleTrainSearch(val) { state.trainSearch = val; applyTrainingFilters(); }
    function clearTrainSearch() { 
        state.trainSearch = ''; 
        const el = document.getElementById('tSearchInput');
        if(el) el.value = '';
        applyTrainingFilters(); 
    }
    function clearTrainDateFilter() {
        if (trainDateFilterControl) trainDateFilterControl.clear();
    }

    function applyTrainingFilters(baseData = null) {
        let filtered = baseData;
        if (!filtered) {
            filtered = state.leads.filter(l => {
                const pVal = l.P_Value || l.p_value || l.pvalue;
                const tStat = l.TrainingStatus || l.training_status || l.trainingstatus;
                return pVal === 'P100' || tStat === 'จองอบรม';
            });
        }

        if (state.trainFilter !== 'All') {
            filtered = filtered.filter(l => {
                const leadId = l.Lead_ID || l.lead_id || l.leadid;
                const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                const status = trainInfo.status || trainInfo.Status || 'รอดำเนินการ';
                return status === state.trainFilter;
            });
        }

        if (state.trainSearch.trim() !== '') {
            const query = state.trainSearch.toLowerCase().trim();
            filtered = filtered.filter(l => {
                const name = l.FullName || l.full_name || l.fullname || '';
                const phone = l.Phone || l.phone || '';
                const leadId = l.Lead_ID || l.lead_id || l.leadid;
                const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                const notes = trainInfo.notes || trainInfo.Notes || '';
                return name.toLowerCase().includes(query) || phone.toLowerCase().includes(query) || notes.toLowerCase().includes(query);
            });
        }

        if (state.trainDateRange && state.trainDateRange.start && state.trainDateRange.end) {
            filtered = filtered.filter(l => {
                const leadId = l.Lead_ID || l.lead_id || l.leadid;
                const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                const tDateStr = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate;
                if (!tDateStr) return false;
                
                let tDate;
                if (tDateStr.includes('/')) {
                    const parts = tDateStr.split('/');
                    tDate = new Date(parts[2], parts[1] - 1, parts[0]);
                } else {
                    tDate = new Date(tDateStr);
                }
                
                if (isNaN(tDate.getTime())) return false;
                tDate.setHours(0,0,0,0);
                return tDate >= state.trainDateRange.start && tDate <= state.trainDateRange.end;
            });
        }

        const clearBtn = document.getElementById('tSearchClearBtn');
        if (clearBtn) clearBtn.style.display = state.trainSearch ? 'block' : 'none';

        renderTrainingTable(filtered);
    }

    function renderTrainingTable(data) {
        const tbody = document.getElementById('trainingTableBody');
        if (!tbody) return;

        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="12" class="text-center py-5 text-muted"><i class="fa-solid fa-folder-open fs-3 mb-2 d-block"></i> ไม่พบรายชื่อตามเงื่อนไขที่เลือก</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map((row, index) => {
            const leadId = row.Lead_ID || row.lead_id || row.leadid;
            const fullName = row.FullName || row.full_name || row.fullname || '-';
            const jobType = row.JobType || row.job_type || row.jobtype || '-';
            const pVal = row.P_Value || row.p_value || row.pvalue || '-';
            
            // 🌟 ข้อมูลที่เพิ่มมาใหม่
            const phoneStr = row.Phone || row.phone || '-';
            const chatLnk = row.ChatLink || row.chat_link || row.chatlink;
            
            const promoId = row.Promo || row.promo_id || row.promoid || row.promo || '-';
            let promoName = promoId;
            if (promoId !== '-') {
                const matchedPromo = state.promotions?.find(p => p.Promo_ID === promoId || p.promo_id === promoId);
                if (matchedPromo) promoName = matchedPromo.Promo_Name || matchedPromo.promo_name;
            }

            const beneatIcon = `<svg width="16" height="16" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="me-1"><path d="M50 5C25.1 5 5 25.1 5 50c0 10.4 3.6 20 9.6 27.6L10 95l18.4-4.8c7 3.1 14.8 4.8 23.1 4.8 24.9 0 45-20.1 45-45S74.9 5 50 5z" fill="#3bc2d6"/><text x="48" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 50 50)">B</text></svg>`;
            const chatLinkBtn = chatLnk ? `<a href="${chatLnk}" target="_blank" class="btn btn-sm btn-light border text-primary fw-bold px-2 py-0 mt-1 d-inline-flex align-items-center" onclick="event.stopPropagation()">${beneatIcon} แชท</a>` : '<div class="text-muted small mt-1">-</div>';
            
            const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
            
            const transferDateRaw = trainInfo.transfer_date || trainInfo.transferdate || trainInfo.TransferDate;
            const transferDate = formatDateForDisplay(transferDateRaw) || '-';
            const trainDate = formatDateForDisplay(trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate) || '<span class="text-warning fw-bold">ยังไม่ระบุ</span>';
            const reschedCount = parseInt(trainInfo.reschedule_count || trainInfo.reschedulecount || trainInfo.RescheduleCount || 0);
            const status = trainInfo.status || trainInfo.Status || 'รอดำเนินการ';
            const notes = trainInfo.notes || trainInfo.Notes || '-';
            const encodedNote = encodeURIComponent(notes);

            let deadlineText = '';
            if (transferDateRaw && reschedCount < 2) {
                const limitDate = new Date(transferDateRaw);
                limitDate.setDate(limitDate.getDate() + RESCHEDULE_LIMIT_DAYS);
                deadlineText = `<div class="mt-1 small text-muted" style="font-size: 0.7rem;">ถึง: ${formatDateForDisplay(limitDate.toISOString())}</div>`;
            }

            let countBadge = `<span class="badge bg-secondary">${reschedCount} / 2</span>`;
            if (reschedCount === 1) countBadge = `<span class="badge bg-warning text-dark">${reschedCount} / 2</span>`;
            if (reschedCount >= 2) countBadge = `<span class="badge bg-danger">${reschedCount} / 2 (เต็ม)</span>`;

            let statusBadge = `<span class="badge bg-light text-dark border">${status}</span>`;
            if (status.includes('ผ่าน')) statusBadge = `<span class="badge bg-success">${status}</span>`;
            else if (status.includes('ไม่ผ่าน') || status.includes('ยกเลิก')) statusBadge = `<span class="badge bg-danger">${status}</span>`;
            else if (status === 'รออบรม') statusBadge = `<span class="badge bg-primary">${status}</span>`;

            return `
            <tr>
                <td class="fw-bold text-center text-muted">${index + 1}</td>
                <td class="fw-bold">${fullName}</td>
                <td>
                    <div class="text-nowrap"><i class="fa-solid fa-phone text-success small"></i> ${phoneStr}</div>
                    ${chatLinkBtn}
                </td>
                <td><span class="badge bg-info text-dark">${jobType}</span></td>
                <td><span class="badge bg-light text-primary border">${promoName}</span></td>
                <td><span class="badge bg-success">${pVal}</span></td>
                <td class="small text-muted"><i class="fa-regular fa-calendar"></i> ${transferDate}</td>
                <td class="small"><i class="fa-regular fa-calendar-check text-success"></i> ${trainDate}</td>
                <td class="text-center">${countBadge}${deadlineText}</td>
                <td class="text-center">${statusBadge}</td>
                <td onclick="showFullNote(event, '${encodedNote}')">
                    <div class="text-muted small p-1 bg-light rounded border" style="max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;" title="คลิกเพื่อดูบันทึกเต็ม">
                        ${notes}
                    </div>
                </td>
                <td class="text-center">
                    <div class="d-flex flex-column gap-1">
                        <button type="button" class="btn btn-sm btn-outline-success shadow-sm fw-bold" onclick="openTrainingModal('${leadId}')">
                            <i class="fa-solid fa-pen-to-square"></i> จัดการ
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-info shadow-sm fw-bold" onclick="viewTrainingHistory('${leadId}')">
                            <i class="fa-solid fa-clock-rotate-left"></i> ดูประวัติ
                        </button>
                    </div>
                </td>
            </tr>
            `;
        }).join('');
    }

    // ==========================================
    // 📝 2. ฟังก์ชันจัดการฟอร์ม (Modal & Submission)
    // ==========================================
    function openTrainingModal(leadId) {
        const lead = state.leads.find(l => l.Lead_ID === leadId || l.lead_id === leadId || l.leadid === leadId);
        if (!lead) return;

        const form = document.getElementById('trainingForm');
        if (form) form.reset();

        document.getElementById('trainLeadId').value = leadId;
        document.getElementById('trainLeadName').innerText = lead.FullName || lead.full_name || lead.fullname || 'Unknown';

        const modalBody = document.querySelector('#trainingModal .modal-body');
        
        let reschedContainer = document.getElementById('reschedContainer');
        if (!reschedContainer && modalBody) {
            const trainDateDiv = document.getElementById('trainDate').closest('.mb-4');
            if (trainDateDiv) {
                reschedContainer = document.createElement('div');
                reschedContainer.id = 'reschedContainer';
                reschedContainer.className = 'mb-4 p-3 bg-warning bg-opacity-10 border border-warning border-opacity-25 rounded shadow-sm';
                reschedContainer.innerHTML = `
                    <label class="form-label fw-bold text-warning-emphasis mb-1"><i class="fa-solid fa-calendar-plus me-1"></i> เลื่อนนัด (วันนัดอบรมใหม่)</label>
                    <input type="text" class="form-control fw-bold border-warning" name="newRescheduleDate" id="newRescheduleDate" placeholder="เลือกวันนัดใหม่...">
                    <div class="form-text text-muted small mt-1">** หากเลือกวันที่ใหม่ ระบบจะนับสิทธิ์การเลื่อน +1 โดยอัตโนมัติ</div>
                `;
                trainDateDiv.parentNode.insertBefore(reschedContainer, trainDateDiv.nextSibling);
            }
        }

        let notesContainer = document.getElementById('trainNotesContainer');
        if (!notesContainer && modalBody) {
            notesContainer = document.createElement('div');
            notesContainer.id = 'trainNotesContainer';
            notesContainer.className = 'mb-3 mt-3';
            notesContainer.innerHTML = `
                <label class="form-label fw-bold small text-muted">โน้ตเพิ่มเติม / บันทึกการอบรม</label>
                <textarea class="form-control" name="notes" id="trainNotes" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
            `;
            const statusDiv = document.getElementById('trainStatus').closest('.mb-3');
            if (statusDiv) modalBody.insertBefore(notesContainer, statusDiv);
            else modalBody.appendChild(notesContainer);
        }

        const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
        const count = parseInt(trainInfo.reschedule_count || trainInfo.reschedulecount || trainInfo.RescheduleCount || 0);
        
        document.getElementById('trainRescheduleCount').value = count;
        
        const existingTrainDateRaw = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate || '';
        document.getElementById('oldTrainDate').value = formatDateForDB(formatDateForDisplay(existingTrainDateRaw)) || '';

        document.getElementById('trainAmount').value = trainInfo.amount || trainInfo.Amount || '';
        if (trainInfo.status || trainInfo.Status) {
            document.getElementById('trainStatus').value = trainInfo.status || trainInfo.Status;
        }
        if (document.getElementById('trainNotes')) {
            document.getElementById('trainNotes').value = trainInfo.notes || trainInfo.Notes || '';
        }
        if (document.getElementById('newRescheduleDate')) {
            document.getElementById('newRescheduleDate').value = '';
        }

        // Init Flatpickr & Logic เปิดปิดช่องเลื่อนนัด
        if (typeof flatpickr !== 'undefined') {
            const existingTransferDate = trainInfo.transfer_date || trainInfo.transferdate || trainInfo.TransferDate || '';
            
            flatpickr("#transferDate", { 
                locale: "th", dateFormat: "d/m/Y", 
                defaultDate: formatDateForDisplay(existingTransferDate) || null 
            });
            
            const trainDatePicker = flatpickr("#trainDate", { 
                locale: "th", dateFormat: "d/m/Y", 
                defaultDate: formatDateForDisplay(existingTrainDateRaw) || null 
            });

            const reschedDatePicker = flatpickr("#newRescheduleDate", { 
                locale: "th", dateFormat: "d/m/Y"
            });

            let deadlineMsg = '';
            let isExpired = false;
            
            if (existingTransferDate) {
                const limitDate = new Date(existingTransferDate);
                limitDate.setDate(limitDate.getDate() + RESCHEDULE_LIMIT_DAYS);
                deadlineMsg = `<br><i class="fa-solid fa-circle-info mt-1"></i> เลื่อนได้ถึง: <strong>${formatDateForDisplay(limitDate.toISOString())}</strong>`;
                if (new Date() > limitDate) isExpired = true;
            }

            const warnEl = document.getElementById('rescheduleWarning');
            const originalDateInput = document.getElementById('trainDate');

            if (existingTrainDateRaw) {
                trainDatePicker.set('clickOpens', false);
                originalDateInput.classList.add('bg-light', 'text-muted');
                
                if (reschedContainer) {
                    reschedContainer.style.display = 'block';
                    
                    if (count >= 2) {
                        warnEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ผู้สมัครรายนี้เลื่อนรอบอบรมครบ 2 ครั้งแล้ว ห้ามเลื่อนอีก`;
                        reschedDatePicker.set('clickOpens', false);
                        document.getElementById('newRescheduleDate').classList.add('bg-light', 'text-muted');
                        document.getElementById('newRescheduleDate').placeholder = "สิทธิ์เลื่อนนัดเต็มแล้ว";
                    } else if (isExpired) {
                        warnEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> หมดเขตเลื่อนรอบ (เกิน ${RESCHEDULE_LIMIT_DAYS} วัน)${deadlineMsg}`;
                        reschedDatePicker.set('clickOpens', false);
                        document.getElementById('newRescheduleDate').classList.add('bg-light', 'text-muted');
                        document.getElementById('newRescheduleDate').placeholder = "หมดสิทธิ์เลื่อนนัด";
                    } else {
                        warnEl.innerHTML = `ประวัติการเลื่อนรอบ: ${count} / 2 ครั้ง <span class="text-secondary">${deadlineMsg}</span>`;
                        reschedDatePicker.set('clickOpens', true);
                        document.getElementById('newRescheduleDate').classList.remove('bg-light', 'text-muted');
                        document.getElementById('newRescheduleDate').placeholder = "เลือกวันนัดใหม่...";
                    }
                }
            } else {
                trainDatePicker.set('clickOpens', true);
                originalDateInput.classList.remove('bg-light', 'text-muted');
                if (reschedContainer) reschedContainer.style.display = 'none';
                warnEl.innerHTML = `ประวัติการเลื่อนรอบ: ${count} / 2 ครั้ง`;
            }
        }

        const modalEl = document.getElementById('trainingModal');
        if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const trainForm = document.getElementById('trainingForm');
        if (trainForm) {
            trainForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const fd = new FormData(this);
                const leadId = fd.get('leadId');
                
                const originalDateRaw = fd.get('trainDate'); 
                const newReschedDateRaw = fd.get('newRescheduleDate'); 
                
                let finalTrainDate = formatDateForDB(originalDateRaw); 
                let currentCount = parseInt(fd.get('rescheduleCount')) || 0;

                if (newReschedDateRaw && newReschedDateRaw.trim() !== '') {
                    if (currentCount >= 2) {
                        Swal.fire('ปฏิเสธการบันทึก', 'ผู้สมัครเลื่อนอบรมครบ 2 ครั้งแล้ว ไม่สามารถเลื่อนได้อีก', 'error');
                        return;
                    }
                    
                    const transferDateDB = formatDateForDB(fd.get('transferDate'));
                    if (transferDateDB) {
                        const limitDate = new Date(transferDateDB);
                        limitDate.setDate(limitDate.getDate() + RESCHEDULE_LIMIT_DAYS);
                        const selectedNewDate = new Date(formatDateForDB(newReschedDateRaw));
                        
                        if (selectedNewDate > limitDate) {
                            Swal.fire('ปฏิเสธการบันทึก', `ไม่สามารถเลื่อนรอบได้ เนื่องจากเกินกำหนด ${RESCHEDULE_LIMIT_DAYS} วัน<br><br><b>เลื่อนได้ถึง: ${formatDateForDisplay(limitDate.toISOString())}</b>`, 'error');
                            return;
                        }
                    }

                    finalTrainDate = formatDateForDB(newReschedDateRaw);
                    currentCount += 1; 
                }

                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                try {
                    const { data: sample } = await supabase.from('db_training').select('*').limit(1);
                    const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                    const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

                    let payload = {};
                    const idCol = getCol(['lead_id', 'leadid', 'Lead_ID']);
                    
                    payload[idCol] = leadId;
                    payload[getCol(['full_name', 'fullname', 'FullName'])] = document.getElementById('trainLeadName').innerText;
                    payload[getCol(['transfer_date', 'transferdate', 'TransferDate'])] = formatDateForDB(fd.get('transferDate'));
                    
                    payload[getCol(['train_date', 'traindate', 'TrainDate'])] = finalTrainDate;
                    
                    const amountVal = fd.get('amount');
                    payload[getCol(['amount', 'Amount'])] = amountVal ? parseFloat(amountVal) : null;
                    payload[getCol(['reschedule_count', 'reschedulecount', 'RescheduleCount'])] = currentCount;
                    payload[getCol(['status', 'Status'])] = fd.get('status');
                    
                    const notesVal = fd.get('notes') || '';
                    const notesCol = getCol(['notes', 'Notes']);
                    if(notesCol || dbKeys.length === 0) { 
                        payload[notesCol || 'notes'] = notesVal;
                    }

                    const logMsg = `[${leadId}] สถานะ: ${fd.get('status')} | นัด: ${formatDateForDisplay(finalTrainDate) || '-'} | เลื่อน: ${currentCount}/2 | Note: ${notesVal}`;

                    const existingTrain = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId));

                    if (existingTrain) {
                        const { error } = await supabase.from('db_training').update(payload).eq(idCol, leadId);
                        if (error) throw error;
                        await writeLogToSupabase('UPDATE_TRAINING', 'Training', logMsg);
                    } else {
                        const trainIdCol = getCol(['train_id', 'trainid', 'Train_ID']);
                        payload[trainIdCol || 'train_id'] = "TRN-" + new Date().getTime().toString().substring(7);
                        
                        const { error } = await supabase.from('db_training').insert([payload]);
                        if (error) throw error;
                        await writeLogToSupabase('CREATE_TRAINING', 'Training', `[${leadId}] เพิ่มเข้าสู่ระบบนัดหมายอบรม`);
                        await writeLogToSupabase('UPDATE_TRAINING', 'Training', logMsg); 
                    }

                    const modalEl = document.getElementById('trainingModal');
                    if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).hide();
                    
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'บันทึกเรียบร้อย', showConfirmButton: false, timer: 3000 });
                    
                    await loadTrainingData();

                } catch (err) {
                    console.error("Save Training Error:", err);
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                }
            });
        }
    });

    // ==========================================
    // 🕒 3. ฟังก์ชันเปิดดูประวัติ (History Modal) สำหรับ Training
    // ==========================================
    async function viewTrainingHistory(leadId) {
        Swal.fire({ title: 'กำลังโหลดประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const detCol = ['details', 'Details'].find(k => dbKeys.includes(k)) || 'details';

            const { data, error } = await supabase.from('db_logs').select('*').ilike(detCol, `%[${leadId}]%`);
            if (error) throw error;

            let finalLogs = (data || []).filter(log => log.action === 'UPDATE_TRAINING' || log.Action === 'UPDATE_TRAINING' || log.action === 'CREATE_TRAINING' || log.Action === 'CREATE_TRAINING');
            
            finalLogs.sort((a, b) => {
                let dateA = new Date(a.timestamp || a.Timestamp || a.created_at || 0);
                let dateB = new Date(b.timestamp || b.Timestamp || b.created_at || 0);
                return dateB - dateA;
            });
            
            let html = '<div class="text-start mt-3" style="max-height: 400px; overflow-y: auto; padding: 10px 10px 10px 20px;">';
            if(!finalLogs || finalLogs.length === 0) {
                html += '<div class="text-center text-muted py-4">ยังไม่มีประวัติการจัดการอบรม</div>';
            } else {
                finalLogs.forEach(log => {
                    let logDetailString = log.details || log.Details || '';
                    let mainChange = logDetailString;
                    let noteText = '-';
                    if (logDetailString.includes(' | Note: ')) {
                        const parts = logDetailString.split(' | Note: ');
                        mainChange = parts[0];
                        noteText = parts[1];
                    }
                    
                    const d = new Date(log.timestamp || log.Timestamp || log.created_at);
                    let ts = '-';
                    if (!isNaN(d.getTime())) {
                        ts = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    }
                    const email = log.useremail || log.user_email || log.UserEmail || 'System';

                    html += `
                    <div class="border-start border-success border-3 ps-3 mb-4 position-relative">
                        <div class="position-absolute top-0 start-0 translate-middle bg-success rounded-circle" style="width: 14px; height: 14px;"></div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div class="fw-bold text-dark fs-6">${mainChange}</div>
                            <div class="text-muted small"><i class="fa-regular fa-clock me-1"></i> ${ts}</div>
                        </div>
                        <div class="bg-light p-3 rounded small text-secondary border shadow-sm">
                            <strong><i class="fa-regular fa-note-sticky text-warning me-1"></i> บันทึก (Note):</strong><br>
                            ${noteText.replace(/\n/g, '<br>')}
                        </div>
                        <div class="mt-2 small fw-bold text-success"><i class="fa-solid fa-user-pen me-1"></i> อัปเดตโดย: ${email}</div>
                    </div>`;
                });
            }
            html += '</div>';

            Swal.fire({ 
                title: `<i class="fa-solid fa-clock-rotate-left text-success"></i> ประวัติการทำงาน`, 
                html: `<div class="fs-6 text-muted mb-2 border-bottom pb-2">รหัสผู้สมัคร: <strong>${leadId}</strong></div>${html}`, 
                width: 600, 
                confirmButtonText: 'ปิดหน้าต่าง', 
                confirmButtonColor: '#6c757d'
            });

        } catch(err) {
            Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
        }
    }
</script>
