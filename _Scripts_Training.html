<script>
    /**
     * ==========================================================
     * 🚀 PHASE 2: REFACTORING & STATE MANAGEMENT (Training)
     * ==========================================================
     * การออกแบบตามสถาปัตยกรรมที่แยก UI, Logic และ API ออกจากกันชัดเจน
     * เพื่อให้ง่ายต่อการแก้ไข ลดการโหลดซ้ำซ้อน (Optimistic UI) 
     */

    // ==========================================
    // 🛠️ 1. API SERVICE LAYER (จัดการติดต่อ Database)
    // ==========================================
    const TrainingAPI = {
        async writeLog(action, module, details) {
            const userEmail = state.currentUser?.email || 'System';
            const logId = "LOG-" + new Date().getTime(); 
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const tsStr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`; 

            try {
                const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
                const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

                let payload = {};
                payload[getCol(['logid', 'log_id', 'Log_ID', 'id'])] = logId;
                payload[getCol(['useremail', 'user_email', 'UserEmail', 'email'])] = userEmail;
                payload[getCol(['action', 'Action'])] = action;
                payload[getCol(['module', 'Module'])] = module;
                payload[getCol(['details', 'Details'])] = details;

                const tsCol = getCol(['timestamp', 'Timestamp', 'created_at', 'createdat']);
                if (dbKeys.includes(tsCol) || dbKeys.length === 0) payload[tsCol] = tsStr;

                await supabase.from('db_logs').insert([payload]);
            } catch(e) { console.error("Log error:", e); }
        },

        async fetchAll() {
            const { data, error } = await supabase.from('db_training').select('*');
            if (error) throw error;
            return data || [];
        },

        async save(leadId, payload, isNew) {
            const { data: sample } = await supabase.from('db_training').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];
            const idCol = getCol(['lead_id', 'leadid', 'Lead_ID']);

            let finalPayload = { ...payload };

            // Map keys dynamically ให้ตรงกับ Database Schema
            const keyMapping = {
                'id_card': ['id_card', 'idcard', 'ID_Card'],
                'full_name': ['full_name', 'fullname', 'FullName'],
                'transfer_date': ['transfer_date', 'transferdate', 'TransferDate'],
                'train_date': ['train_date', 'traindate', 'TrainDate'],
                'amount': ['amount', 'Amount'],
                'reschedule_count': ['reschedule_count', 'reschedulecount', 'RescheduleCount'],
                'status': ['status', 'Status'],
                'notes': ['notes', 'Notes'],
                'train_id': ['train_id', 'trainid', 'Train_ID']
            };

            let mappedPayload = {};
            mappedPayload[idCol] = leadId;
            mappedPayload['final_campaign'] = payload.final_campaign;
            
            for (const [standardKey, dbColNames] of Object.entries(keyMapping)) {
                const actualCol = getCol(dbColNames);
                if (actualCol || dbKeys.length === 0) {
                    if (payload[standardKey] !== undefined) {
                        mappedPayload[actualCol || standardKey] = payload[standardKey];
                    }
                }
            }

            if (!isNew) {
                const { error } = await supabase.from('db_training').update(mappedPayload).eq(idCol, leadId);
                if (error) throw error;
                return mappedPayload;
            } else {
                const trainIdCol = getCol(['train_id', 'trainid', 'Train_ID']);
                mappedPayload[trainIdCol || 'train_id'] = "TRN-" + new Date().getTime().toString().substring(7);
                const { error } = await supabase.from('db_training').insert([mappedPayload]);
                if (error) throw error;
                return mappedPayload;
            }
        },

        async fetchLogs(leadId) {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const detCol = ['details', 'Details'].find(k => dbKeys.includes(k)) || 'details';

            const { data, error } = await supabase.from('db_logs').select('*').ilike(detCol, `%[${leadId}]%`);
            if (error) throw error;
            return data || [];
        }
    };

    // ==========================================
    // 🧠 2. BUSINESS LOGIC & STATE (จัดการคำนวณและ State ใน Memory)
    // ==========================================
    const TrainingLogic = {
        RESCHEDULE_LIMIT_DAYS: 30,

        debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        },

        validateThaiID(id) {
            if (!id || id.length !== 13) return false;
            let sum = 0;
            for (let i = 0; i < 12; i++) sum += parseInt(id.charAt(i)) * (13 - i);
            return ((11 - (sum % 11)) % 10) === parseInt(id.charAt(12));
        },

        formatThaiID(val) {
            let res = val.replace(/\D/g, ''); 
            if (res.length > 1) res = res.replace(/^(\d{1})/, '$1-');
            if (res.length > 6) res = res.replace(/-(\d{4})/, '-$1-');
            if (res.length > 12) res = res.replace(/-(\d{5})/, '-$1-');
            if (res.length > 15) res = res.replace(/-(\d{2})/, '-$1-');
            return res.substring(0, 17);
        },

        getEffectiveStatus(trainInfo, defaultStatus = 'รอเลือกวันอบรม') {
            let status = trainInfo.status || trainInfo.Status || defaultStatus;
            if (status === 'อบรมแล้ว (ผ่าน)' || status === 'อบรมแล้ว (ไม่ผ่าน)') status = 'อบรมแล้ว';

            if (!status.includes('ยกเลิก') && !status.includes('สละสิทธิ์') && status !== 'อบรมแล้ว') {
                const tDateStr = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate;
                if (tDateStr) {
                     let tDate = tDateStr.includes('/') ? new Date(tDateStr.split('/')[2], tDateStr.split('/')[1] - 1, tDateStr.split('/')[0]) : new Date(tDateStr);
                     if (!isNaN(tDate.getTime())) {
                         tDate.setHours(0,0,0,0);
                         const today = new Date(); today.setHours(0,0,0,0);
                         if (tDate < today) status = 'อบรมแล้ว';
                     }
                }
            }
            return status;
        },

        getEligibleLeads() {
            return state.leads.filter(l => {
                const pVal = l.P_Value || l.p_value || l.pvalue;
                const tStat = l.TrainingStatus || l.training_status || l.trainingstatus;
                return pVal === 'P100' || tStat === 'จองอบรม';
            });
        },

        getFilteredData() {
            let filtered = this.getEligibleLeads();
            let defaultStatus = 'รอเลือกวันอบรม';
            if (state.initialDropdowns?.TrainingPageStatus?.length > 0) {
                defaultStatus = state.initialDropdowns.TrainingPageStatus[0];
            }

            if (state.trainFilter !== 'All') {
                filtered = filtered.filter(l => {
                    const leadId = l.Lead_ID || l.lead_id || l.leadid;
                    const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                    return this.getEffectiveStatus(trainInfo, defaultStatus) === state.trainFilter;
                });
            }

            if (state.trainSearch.trim() !== '') {
                const query = state.trainSearch.toLowerCase().trim();
                filtered = filtered.filter(l => {
                    const name = l.FullName || l.full_name || l.fullname || '';
                    const phone = l.Phone || l.phone || '';
                    const leadId = l.Lead_ID || l.lead_id || l.leadid;
                    const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                    const notes = trainInfo.notes || trainInfo.Notes || '';
                    const idCard = trainInfo.id_card || trainInfo.idcard || trainInfo.ID_Card || '';
                    return name.toLowerCase().includes(query) || phone.toLowerCase().includes(query) || notes.toLowerCase().includes(query) || idCard.includes(query);
                });
            }

            if (state.trainDateRange && state.trainDateRange.start && state.trainDateRange.end) {
                filtered = filtered.filter(l => {
                    const leadId = l.Lead_ID || l.lead_id || l.leadid;
                    const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                    const tDateStr = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate;
                    if (!tDateStr) return false;
                    let tDate = tDateStr.includes('/') ? new Date(tDateStr.split('/')[2], tDateStr.split('/')[1] - 1, tDateStr.split('/')[0]) : new Date(tDateStr);
                    if (isNaN(tDate.getTime())) return false;
                    tDate.setHours(0,0,0,0);
                    return tDate >= state.trainDateRange.start && tDate <= state.trainDateRange.end;
                });
            }

            return filtered;
        },

        updateStateOptimistically(leadId, updatedInfo) {
            const index = state.trainings.findIndex(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId));
            if (index > -1) {
                state.trainings[index] = { ...state.trainings[index], ...updatedInfo };
            } else {
                state.trainings.push({ lead_id: leadId, ...updatedInfo });
            }
        }
    };

    // ==========================================
    // 🎨 3. UI LAYER (จัดการ DOM และแสดงผล)
    // ==========================================
    if (typeof state.trainFilter === 'undefined') state.trainFilter = 'All';
    if (typeof state.trainSearch === 'undefined') state.trainSearch = '';
    if (typeof state.trainDateRange === 'undefined') state.trainDateRange = { start: null, end: null };
    if (typeof state.trainCurrentPage === 'undefined') state.trainCurrentPage = 1;
    
    const TRAIN_ITEMS_PER_PAGE = 50; 
    let trainDateFilterControl = null;

    const TrainingUI = {
        renderDashboard() {
            const eligibleLeads = TrainingLogic.getEligibleLeads();
            
            let statusList = [];
            if (state.initialDropdowns && state.initialDropdowns.TrainingPageStatus && state.initialDropdowns.TrainingPageStatus.length > 0) {
                statusList = state.initialDropdowns.TrainingPageStatus;
            } else {
                statusList = ['รอเลือกวันอบรม', 'รออบรม', 'อบรมแล้ว', 'ยกเลิก/สละสิทธิ์'];
            }

            const tCounts = { 'Total': eligibleLeads.length };
            statusList.forEach(s => tCounts[s] = 0);

            let defaultStatus = statusList.length > 0 ? statusList[0] : 'รอเลือกวันอบรม';

            eligibleLeads.forEach(l => {
                const leadId = l.Lead_ID || l.lead_id || l.leadid;
                const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                let status = TrainingLogic.getEffectiveStatus(trainInfo, defaultStatus);
                if (tCounts[status] !== undefined) tCounts[status]++;
                else tCounts[status] = 1;
            });

            const getColor = (statusName) => {
                if (statusName.includes('รออบรม') || statusName.includes('ระบุวัน')) return '#3b82f6'; 
                if (statusName.includes('แล้ว') || statusName.includes('ผ่าน')) return '#10b981'; 
                if (statusName.includes('ยกเลิก') || statusName.includes('สละสิทธิ์') || statusName.includes('ไม่ผ่าน')) return '#ef4444'; 
                if (statusName.includes('รอ')) return '#f59e0b'; 
                return '#8b5cf6'; 
            };

            const tConfigs = [
                { id: 'All', label: 'ทั้งหมด', count: tCounts['Total'], color: '#64748b' }
            ];

            statusList.forEach(s => {
                tConfigs.push({ id: s, label: s, count: tCounts[s], color: getColor(s) });
            });

            Object.keys(tCounts).forEach(key => {
                if (!tConfigs.find(c => c.id === key) && key !== 'Total') {
                    tConfigs.push({ id: key, label: key, count: tCounts[key], color: getColor(key) }); 
                }
            });

            let cardsHtml = '<div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-2 mb-3">';
            tConfigs.forEach(c => {
                const isActive = state.trainFilter === c.id;
                const activeStyle = isActive ? `box-shadow: 0 0 0 3px rgba(0,0,0,0.05); border-color: ${c.color} !important; background-color: ${c.color}15; transform: translateY(-2px);` : '';
                const textStyle = isActive ? `color: ${c.color} !important;` : '';
                cardsHtml += `
                <div class="col">
                    <div class="card h-100 shadow-sm border" style="cursor: pointer; transition: all 0.2s; border-left: 4px solid ${c.color} !important; ${activeStyle}" onclick="TrainingController.setFilter('${c.id}')">
                        <div class="card-body p-2 text-center">
                            <div class="small fw-bold text-muted mb-1" style="font-size: 0.75rem; ${textStyle}">${c.label}</div>
                            <h4 class="mb-0 fw-bold" style="color: ${c.color};">${c.count}</h4>
                        </div>
                    </div>
                </div>`;
            });
            cardsHtml += '</div>';

            let searchHtml = `
                <div class="input-group input-group-sm shadow-sm" style="max-width: 250px; border-radius: 20px; overflow: hidden;">
                    <span class="input-group-text bg-white border-end-0 px-2"><i class="fa-solid fa-search text-muted"></i></span>
                    <input type="text" id="tSearchInput" class="form-control border-start-0 ps-0 shadow-none" placeholder="ค้นหาชื่อ, เบอร์โทร, เลขบัตร..." value="${state.trainSearch}">
                    <button id="tSearchClearBtn" class="btn btn-white border-top border-bottom border-end text-muted shadow-none" style="display: ${state.trainSearch ? 'block' : 'none'};" onclick="TrainingController.clearSearch()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `;

            let dateHtml = `
                <div class="d-flex align-items-center gap-2">
                    <label class="form-label mb-0 fw-bold text-muted small" style="white-space: nowrap;">วันนัดอบรม:</label>
                    <div class="input-group input-group-sm" style="width: 230px;">
                        <span class="input-group-text bg-white text-muted"><i class="fa-regular fa-calendar"></i></span>
                        <input type="text" class="form-control" id="trainDateFilterInput" placeholder="กรองวันนัดอบรม...">
                        <button class="btn btn-outline-secondary" type="button" onclick="TrainingController.clearDateFilter()" title="ล้างตัวกรอง">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            `;

            let toolbarHtml = `<div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4 bg-white p-2 px-3 rounded shadow-sm border">${searchHtml}${dateHtml}</div>`;

            let container = document.getElementById('trainingDashboardCards');
            if (!container) {
                const tbody = document.getElementById('trainingTableBody');
                if (tbody && tbody.closest('.card')) {
                    container = document.createElement('div');
                    container.id = 'trainingDashboardCards';
                    tbody.closest('.card').parentNode.insertBefore(container, tbody.closest('.card'));
                }
            }
            if (container) container.innerHTML = cardsHtml + toolbarHtml;

            const searchInputEl = document.getElementById('tSearchInput');
            if (searchInputEl) {
                searchInputEl.addEventListener('input', TrainingLogic.debounce(function(e) {
                    TrainingController.handleSearch(e.target.value);
                }, 350));
            }

            if (!trainDateFilterControl && typeof flatpickr !== 'undefined') {
                const el = document.getElementById('trainDateFilterInput');
                if (el) {
                    trainDateFilterControl = flatpickr(el, {
                        locale: "th",
                        mode: "range",
                        dateFormat: "d/m/Y",
                        onChange: function(selectedDates) {
                            if (selectedDates.length === 2) {
                                const start = selectedDates[0]; start.setHours(0,0,0,0);
                                const end = selectedDates[1]; end.setHours(23,59,59,999);
                                state.trainDateRange = { start, end };
                                state.trainCurrentPage = 1;
                                TrainingController.applyFilters();
                            } else if (selectedDates.length === 0) {
                                state.trainDateRange = { start: null, end: null };
                                state.trainCurrentPage = 1;
                                TrainingController.applyFilters();
                            }
                        }
                    });
                }
            }
        },

        renderTable(data) {
            const tbody = document.getElementById('trainingTableBody');
            if (!tbody) return;

            const totalItems = data.length;
            const totalPages = Math.ceil(totalItems / TRAIN_ITEMS_PER_PAGE) || 1;
            
            if (state.trainCurrentPage < 1) state.trainCurrentPage = 1;
            if (state.trainCurrentPage > totalPages) state.trainCurrentPage = totalPages;
            
            const startIndex = (state.trainCurrentPage - 1) * TRAIN_ITEMS_PER_PAGE;
            const endIndex = startIndex + TRAIN_ITEMS_PER_PAGE;
            const paginatedData = data.slice(startIndex, endIndex);

            if(paginatedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" class="text-center py-5 text-muted"><i class="fa-solid fa-folder-open fs-3 mb-2 d-block"></i> ไม่พบรายชื่อตามเงื่อนไขที่เลือก</td></tr>`;
                this.removePagination();
                return;
            }

            let defaultStatus = 'รอเลือกวันอบรม';
            if (state.initialDropdowns?.TrainingPageStatus?.length > 0) {
                defaultStatus = state.initialDropdowns.TrainingPageStatus[0];
            }

            tbody.innerHTML = paginatedData.map((row, index) => {
                const actualIndex = startIndex + index + 1; 
                const leadId = row.Lead_ID || row.lead_id || row.leadid;
                const fullName = row.FullName || row.full_name || row.fullname || '-';
                const jobType = row.JobType || row.job_type || row.jobtype || '-';
                const pVal = row.P_Value || row.p_value || row.pvalue || '-';
                
                let pValBadgeClass = 'bg-secondary';
                if (pVal === 'P100') pValBadgeClass = 'bg-success';
                else if (pVal === 'P90') pValBadgeClass = 'bg-primary';
                else if (pVal === 'P80') pValBadgeClass = 'bg-info text-dark';
                else if (pVal === 'P50') pValBadgeClass = 'bg-warning text-dark';
                else if (pVal === 'P40') pValBadgeClass = 'bg-secondary';
                else if (pVal === 'P00') pValBadgeClass = 'bg-danger';
                else if (pVal === '-') pValBadgeClass = 'bg-light text-muted border';
                
                const pValDisplay = `<span class="badge ${pValBadgeClass} shadow-sm">${pVal}</span>`;
                
                const phoneStr = row.Phone || row.phone || '-';
                const chatLnk = row.ChatLink || row.chat_link || row.chatlink;
                
                const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
                const finalCampaign = trainInfo.final_campaign || trainInfo.finalcampaign || trainInfo.FinalCampaign || '';
                
                const promoId = row.Promo || row.promo_id || row.promoid || row.promo || '-';
                let promoDisplay = '';
                if (promoId && promoId !== '-') {
                    let promoName = promoId;
                    const matchedPromo = state.promotions?.find(p => p.Promo_ID === promoId || p.promo_id === promoId);
                    if (matchedPromo) promoName = matchedPromo.Promo_Name || matchedPromo.promo_name;
                    let promoCheck = (finalCampaign === promoId) ? '<i class="fa-solid fa-circle-check text-success ms-1 fs-6" title="สิทธิ์ที่ถูกเลือกใช้"></i>' : '';
                    promoDisplay = `<div><span class="badge bg-light text-primary border px-2 py-1">${promoName} ${promoCheck}</span></div>`;
                }

                const refId = row.Referrer || row.referrer;
                let referrerDisplay = '';
                if (refId && refId !== '-') {
                    let refCheck = (finalCampaign === refId) ? '<i class="fa-solid fa-circle-check text-success ms-1 fs-6" title="สิทธิ์ที่ถูกเลือกใช้"></i>' : '';
                    const matchedRef = state.referrers?.find(r => r.Ref_ID === refId);
                    let rName = matchedRef ? (matchedRef.Ref_Name || matchedRef.ref_name) : refId;
                    referrerDisplay = `<div class="mt-1"><span class="text-secondary fw-bold small"><i class="fa-solid fa-user-tag text-muted me-1"></i>${rName} ${refCheck}</span></div>`;
                }

                let campaignCellHtml = promoDisplay + referrerDisplay;
                if (!promoDisplay && !referrerDisplay) campaignCellHtml = `<span class="text-muted">-</span>`;
                if (finalCampaign === 'Organic') campaignCellHtml += `<div class="mt-1"><span class="badge bg-light text-secondary border border-secondary opacity-75" style="font-size: 0.65rem;"><i class="fa-solid fa-leaf me-1"></i>Organic (ไม่ใช้สิทธิ์)</span></div>`;

                const beneatIcon = `<svg width="16" height="16" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="me-1"><path d="M50 5C25.1 5 5 25.1 5 50c0 10.4 3.6 20 9.6 27.6L10 95l18.4-4.8c7 3.1 14.8 4.8 23.1 4.8 24.9 0 45-20.1 45-45S74.9 5 50 5z" fill="#3bc2d6"/><text x="48" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 50 50)">B</text></svg>`;
                const chatLinkBtn = chatLnk ? `<a href="${chatLnk}" target="_blank" class="btn btn-sm btn-light border text-primary fw-bold px-2 py-0 mt-1 d-inline-flex align-items-center" onclick="event.stopPropagation()">${beneatIcon} แชท</a>` : '<div class="text-muted small mt-1">-</div>';
                
                const transferDateRaw = trainInfo.transfer_date || trainInfo.transferdate || trainInfo.TransferDate;
                const transferDate = formatDateForDisplay(transferDateRaw) || '-';
                
                const trainDateRaw = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate;
                const reschedCount = parseInt(trainInfo.reschedule_count || trainInfo.reschedulecount || trainInfo.RescheduleCount || 0);
                
                let trainDate;
                if (trainDateRaw) {
                    trainDate = formatDateForDisplay(trainDateRaw);
                } else {
                    trainDate = reschedCount > 0 ? '<span class="text-warning-emphasis fw-bold"><i class="fa-solid fa-hourglass-half"></i> เลื่อน(ไม่ระบุวัน)</span>' : '<span class="text-warning fw-bold">ยังไม่ระบุ</span>';
                }

                const status = TrainingLogic.getEffectiveStatus(trainInfo, defaultStatus);
                const notes = trainInfo.notes || trainInfo.Notes || '-';
                const encodedNote = encodeURIComponent(notes);

                let deadlineText = '';
                if (transferDateRaw && reschedCount < 2) {
                    const limitDate = new Date(transferDateRaw);
                    limitDate.setDate(limitDate.getDate() + TrainingLogic.RESCHEDULE_LIMIT_DAYS);
                    deadlineText = `<div class="mt-1 small text-muted" style="font-size: 0.7rem;">ถึง: ${formatDateForDisplay(limitDate.toISOString())}</div>`;
                }

                let countBadge = `<span class="badge bg-secondary">${reschedCount} / 2</span>`;
                if (reschedCount === 1) countBadge = `<span class="badge bg-warning text-dark">${reschedCount} / 2</span>`;
                if (reschedCount >= 2) countBadge = `<span class="badge bg-danger">${reschedCount} / 2 (เต็ม)</span>`;

                let badgeBgClass = 'bg-light text-dark border';
                if (status.includes('รออบรม') || status.includes('ระบุวัน')) badgeBgClass = 'bg-primary text-white';
                else if (status.includes('แล้ว') || status.includes('ผ่าน')) badgeBgClass = 'bg-success text-white';
                else if (status.includes('ยกเลิก') || status.includes('สละสิทธิ์') || status.includes('ไม่ผ่าน')) badgeBgClass = 'bg-danger text-white';
                else if (status.includes('รอ')) badgeBgClass = 'bg-warning text-dark';
                
                let statusBadge = `<span class="badge ${badgeBgClass}">${status}</span>`;

                if (adm && adm !== 'Auto / รอ Assign' && adm !== 'Auto' && adm !== 'auto' && String(adm).trim() !== '') {
                    const matchedAdmin = state.admins.find(a => a.email === adm || a.name === adm);
                    adminName = matchedAdmin && matchedAdmin.name ? matchedAdmin.name : adm;
                }
                const adminBadge = adminName !== '-' ? `<span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25"><i class="fa-solid fa-user me-1"></i>${adminName}</span>` : '<span class="text-muted small">- รอจ่ายงาน -</span>';

                    <td>

                    <td><span class="badge bg-info text-dark">${jobType}</span></td>
                    <td>${campaignCellHtml}</td>
                    <td>${pValDisplay}</td>
                    <td class="small text-muted"><i class="fa-regular fa-calendar"></i> ${transferDate}</td>
                    <td class="small"><i class="fa-regular fa-calendar-check text-success"></i> ${trainDate}</td>
                    <td class="text-center">${countBadge}${deadlineText}</td>
                    <td class="text-center">${statusBadge}</td>
                    <td onclick="showFullNote(event, '${encodedNote}')">
                        <div class="text-muted small p-1 bg-light rounded border" style="max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;" title="คลิกเพื่อดูบันทึกเต็ม">
                            ${notes}
                        </div>
                    </td>
                    <td>${adminBadge}</td>
                    <td class="text-center">
                        <div class="d-flex flex-column gap-1">
                            <button type="button" class="btn btn-sm btn-outline-success shadow-sm fw-bold" onclick="TrainingController.openModal('${leadId}')">
                                <i class="fa-solid fa-pen-to-square"></i> จัดการ
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-info shadow-sm fw-bold" onclick="TrainingController.viewHistory('${leadId}')">
                                <i class="fa-solid fa-clock-rotate-left"></i> ดูประวัติ
                            </button>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');

            this.renderPagination(totalItems, totalPages, startIndex, endIndex);
        },

        renderPagination(totalItems, totalPages, startIndex, endIndex) {
            const tableContainer = document.querySelector('#trainingTableBody').closest('.table-responsive');
            if (!tableContainer) return;

            let paginationDiv = document.getElementById('trainPaginationFooter');
            if (!paginationDiv) {
                paginationDiv = document.createElement('div');
                paginationDiv.id = 'trainPaginationFooter';
                paginationDiv.className = 'd-flex justify-content-between align-items-center p-3 border-top bg-white';
                tableContainer.parentNode.insertBefore(paginationDiv, tableContainer.nextSibling);
            }

            const showingEnd = Math.min(endIndex, totalItems);
            const showingStart = totalItems === 0 ? 0 : startIndex + 1;

            paginationDiv.innerHTML = `
                <div class="small text-muted fw-bold">
                    แสดง <span class="text-dark">${showingStart} - ${showingEnd}</span> จากทั้งหมด <span class="text-primary">${totalItems}</span> รายการ
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0 shadow-sm">
                        <li class="page-item ${state.trainCurrentPage <= 1 ? 'disabled' : ''}">
                            <a class="page-link text-dark fw-bold" href="#" onclick="TrainingController.changePage(${state.trainCurrentPage - 1}, event)">ก่อนหน้า</a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link bg-primary border-primary fw-bold px-3">หน้า ${state.trainCurrentPage} / ${totalPages}</span>
                        </li>
                        <li class="page-item ${state.trainCurrentPage >= totalPages ? 'disabled' : ''}">
                            <a class="page-link text-dark fw-bold" href="#" onclick="TrainingController.changePage(${state.trainCurrentPage + 1}, event)">ถัดไป</a>
                        </li>
                    </ul>
                </nav>
            `;
        },

        removePagination() {
            const paginationDiv = document.getElementById('trainPaginationFooter');
            if (paginationDiv) paginationDiv.remove();
        }
    };

    // ==========================================
    // 🕹️ 4. CONTROLLER LAYER (รับคำสั่งและเชื่อม UI, Logic, API)
    // ==========================================
    const TrainingController = {
        async init() {
            try {
                const data = await TrainingAPI.fetchAll();
                state.trainings = data || [];
                this.applyFilters();
            } catch(e) {
                console.error("Init training failed:", e);
            }
        },

        applyFilters() {
            TrainingUI.renderDashboard();
            const filteredData = TrainingLogic.getFilteredData();
            TrainingUI.renderTable(filteredData);
        },

        setFilter(val) {
            state.trainFilter = val;
            state.trainCurrentPage = 1;
            this.applyFilters();
        },

        handleSearch(val) {
            state.trainSearch = val;
            state.trainCurrentPage = 1;
            const clearBtn = document.getElementById('tSearchClearBtn');
            if (clearBtn) clearBtn.style.display = val ? 'block' : 'none';
            this.applyFilters();
        },

        clearSearch() {
            state.trainSearch = '';
            state.trainCurrentPage = 1;
            const el = document.getElementById('tSearchInput');
            if(el) el.value = '';
            const clearBtn = document.getElementById('tSearchClearBtn');
            if (clearBtn) clearBtn.style.display = 'none';
            this.applyFilters();
        },

        clearDateFilter() {
            if (trainDateFilterControl) trainDateFilterControl.clear();

            if(event) event.preventDefault();
            if(pageNumber < 1) pageNumber = 1;
            state.trainCurrentPage = pageNumber;
            this.applyFilters();
        },

        openModal(leadId) {
            const lead = state.leads.find(l => l.Lead_ID === leadId || l.lead_id === leadId || l.leadid === leadId);

            const form = document.getElementById('trainingForm');
            if (form) form.reset();

            document.getElementById('trainLeadId').value = leadId;
            document.getElementById('trainLeadName').innerText = lead.FullName || lead.full_name || lead.fullname || 'Unknown';

            const finalCampaignSelect = document.getElementById('trainFinalCampaign');
            let hasOptions = false;
            if (finalCampaignSelect) {
                finalCampaignSelect.innerHTML = '<option value="" disabled selected>-- เลือกแคมเปญที่ใช้จริง --</option>';
                
                const promoId = lead.Promo || lead.promo_id || lead.promoid || lead.promo;
                if (promoId && promoId !== '-') {
                    let promoName = promoId;
                    const matchedPromo = state.promotions?.find(p => p.Promo_ID === promoId || p.promo_id === promoId);
                    if (matchedPromo) promoName = matchedPromo.Promo_Name || matchedPromo.promo_name;
                    finalCampaignSelect.add(new Option(`[โปรโมชั่น] ${promoName}`, promoId));
                    hasOptions = true;
                }
                
                const refId = lead.Referrer || lead.referrer;
                if (refId && refId !== '-') {
                    let refName = refId;
                    const matchedRef = state.referrers?.find(r => r.Ref_ID === refId);
                    if (matchedRef) refName = matchedRef.Ref_Name || matchedRef.ref_name;
                    finalCampaignSelect.add(new Option(`[ผู้แนะนำ] ${refName}`, refId));
                    hasOptions = true;
                }
                
                if (!hasOptions) {
                    finalCampaignSelect.add(new Option('ไม่มีโปรโมชั่น/ผู้แนะนำ (Organic)', 'Organic'));

            const trainStatusSelect = document.getElementById('trainStatus');
            if (trainStatusSelect && state.initialDropdowns?.TrainingPageStatus) {

            const modalBody = document.querySelector('#trainingModal .modal-body');

                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label fw-bold text-warning-emphasis mb-0"><i class="fa-solid fa-calendar-plus me-1"></i> เลื่อนนัดอบรม</label>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" id="rescheduleNoDate" name="rescheduleNoDate">
                                <label class="form-check-label small fw-bold text-muted" for="rescheduleNoDate" style="cursor: pointer;">ไม่ระบุวัน</label>
                            </div>
                        </div>
                        <input type="text" class="form-control fw-bold border-warning" name="newRescheduleDate" id="newRescheduleDate" placeholder="เลือกวันนัดใหม่...">
                        <div class="form-text text-muted small mt-1">** หากเลือกวันที่ใหม่ หรือเลือกไม่ระบุวัน ระบบจะนับสิทธิ์การเลื่อน +1 ทันที</div>
                    `;
                    trainDateDiv.parentNode.insertBefore(reschedContainer, trainDateDiv.nextSibling);
                }
            }

            let notesContainer = document.getElementById('trainNotesContainer');
            if (!notesContainer && modalBody) {
                notesContainer = document.createElement('div');
                notesContainer.id = 'trainNotesContainer';
                notesContainer.className = 'mb-3 mt-3';
                notesContainer.innerHTML = `
                    <label class="form-label fw-bold small text-muted">โน้ตเพิ่มเติม / บันทึกการอบรม</label>
                    <textarea class="form-control" name="notes" id="trainNotes" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
                `;
                const statusDiv = document.getElementById('trainStatus').closest('.mb-3');
                if (statusDiv) modalBody.insertBefore(notesContainer, statusDiv);
                else modalBody.appendChild(notesContainer);
            }

            const trainInfo = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId)) || {};
            const count = parseInt(trainInfo.reschedule_count || trainInfo.reschedulecount || trainInfo.RescheduleCount || 0);
            
            document.getElementById('trainRescheduleCount').value = count;
            
            const existingTrainDateRaw = trainInfo.train_date || trainInfo.traindate || trainInfo.TrainDate || '';
            document.getElementById('oldTrainDate').value = formatDateForDB(formatDateForDisplay(existingTrainDateRaw)) || '';

            document.getElementById('trainAmount').value = trainInfo.amount || trainInfo.Amount || '';
            
            if (document.getElementById('trainStatus')) {
                let defaultStatus = 'รอเลือกวันอบรม';
                if (state.initialDropdowns?.TrainingPageStatus?.length > 0) {
                    defaultStatus = state.initialDropdowns.TrainingPageStatus[0];
                }
                const calculatedStatus = TrainingLogic.getEffectiveStatus(trainInfo, defaultStatus);
                const sel = document.getElementById('trainStatus');
                
                const exists = Array.from(sel.options).some(opt => opt.value === calculatedStatus);
                if (!exists && calculatedStatus) {
                    sel.add(new Option(calculatedStatus, calculatedStatus));
                }
                sel.value = calculatedStatus;
            }
            
            if (document.getElementById('trainNotes')) {
                document.getElementById('trainNotes').value = trainInfo.notes || trainInfo.Notes || '';
            }
            
            const idCardInput = document.getElementById('trainIdCard');
            if (idCardInput) {
                const rawIdCard = trainInfo.id_card || trainInfo.idcard || trainInfo.ID_Card || '';
                idCardInput.value = TrainingLogic.formatThaiID(rawIdCard);
                idCardInput.classList.remove('border-success', 'text-success', 'border-danger', 'text-danger');
            }

            if (document.getElementById('newRescheduleDate')) {
                document.getElementById('newRescheduleDate').value = '';
            }

            // Init Flatpickr
            if (typeof flatpickr !== 'undefined') {
                const existingTransferDate = trainInfo.transfer_date || trainInfo.transferdate || trainInfo.TransferDate || '';
                
                flatpickr("#transferDate", { 
                    locale: "th", dateFormat: "d/m/Y", 
                    defaultDate: formatDateForDisplay(existingTransferDate) || null 
                });
                
                const trainDatePicker = flatpickr("#trainDate", { 
                    locale: "th", dateFormat: "d/m/Y", 
                    defaultDate: formatDateForDisplay(existingTrainDateRaw) || null 
                });

                const reschedDatePicker = flatpickr("#newRescheduleDate", { 
                    locale: "th", dateFormat: "d/m/Y"
                });

                const noDateCheckbox = document.getElementById('rescheduleNoDate');
                const reschedInput = document.getElementById('newRescheduleDate');
                if (noDateCheckbox && reschedInput) {
                    noDateCheckbox.checked = false;
                    reschedInput.disabled = false;
                    
                    noDateCheckbox.onchange = function() {
                        if (this.checked) {
                            reschedInput.disabled = true;
                            reschedInput.value = '';
                            reschedDatePicker.clear();
                        } else {
                            reschedInput.disabled = false;
                        }
                    };
                }

                if (finalCampaignSelect) {
                    const existingFinal = trainInfo.final_campaign || trainInfo.finalcampaign || trainInfo.FinalCampaign;
                    if (existingFinal) {
                        finalCampaignSelect.value = existingFinal;
                    } else if (!hasOptions) {
                        finalCampaignSelect.value = 'Organic';
                    }
                }

                let deadlineMsg = '';
                let isExpired = false;
                
                if (existingTransferDate) {
                    const limitDate = new Date(existingTransferDate);
                    limitDate.setDate(limitDate.getDate() + TrainingLogic.RESCHEDULE_LIMIT_DAYS);
                    deadlineMsg = `<br><i class="fa-solid fa-circle-info mt-1"></i> เลื่อนได้ถึง: <strong>${formatDateForDisplay(limitDate.toISOString())}</strong>`;
                    if (new Date() > limitDate) isExpired = true;
                }

                const warnEl = document.getElementById('rescheduleWarning');
                const originalDateInput = document.getElementById('trainDate');
                const reschedContainerEl = document.getElementById('reschedContainer');

                if (existingTrainDateRaw || count > 0) {
                    trainDatePicker.set('clickOpens', false);
                    originalDateInput.classList.add('bg-light', 'text-muted');
                    
                    if (reschedContainerEl) {
                        reschedContainerEl.style.display = 'block';
                        
                        if (count >= 2 || isExpired) {
                            let reasonText = count >= 2 ? `เลื่อนรอบอบรมครบ 2 ครั้งแล้ว` : `หมดเขตเลื่อนรอบ (เกิน ${TrainingLogic.RESCHEDULE_LIMIT_DAYS} วัน)`;
                            warnEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-danger"></i> ผู้สมัครรายนี้${reasonText} (หากต้องการอนุโลมให้เลื่อนต่อ ต้องระบุเหตุผลในโน้ต) <span class="text-secondary">${deadlineMsg}</span>`;
                            reschedDatePicker.set('clickOpens', true);
                            if(noDateCheckbox) noDateCheckbox.disabled = false;
                        } else {
                            warnEl.innerHTML = `ประวัติการเลื่อนรอบ: ${count} / 2 ครั้ง <span class="text-secondary">${deadlineMsg}</span>`;
                            reschedDatePicker.set('clickOpens', true);
                            if(noDateCheckbox) noDateCheckbox.disabled = false;
                        }
                    }
                } else {
                    trainDatePicker.set('clickOpens', true);
                    originalDateInput.classList.remove('bg-light', 'text-muted');
                    if (reschedContainerEl) reschedContainerEl.style.display = 'none';
                    warnEl.innerHTML = `ประวัติการเลื่อนรอบ: ${count} / 2 ครั้ง`;

            const modalEl = document.getElementById('trainingModal');
            if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).show();

        async viewHistory(leadId) {
            Swal.fire({ title: 'กำลังโหลดประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const data = await TrainingAPI.fetchLogs(leadId);

                let finalLogs = data.filter(log => log.action === 'UPDATE_TRAINING' || log.Action === 'UPDATE_TRAINING' || log.action === 'CREATE_TRAINING' || log.Action === 'CREATE_TRAINING');
                
                finalLogs.sort((a, b) => {
                    let dateA = new Date(a.timestamp || a.Timestamp || a.created_at || 0);
                    let dateB = new Date(b.timestamp || b.Timestamp || b.created_at || 0);
                    return dateB - dateA;
                });
                
                let html = '<div class="text-start mt-3" style="max-height: 400px; overflow-y: auto; padding: 10px 10px 10px 20px;">';
                if(!finalLogs || finalLogs.length === 0) {
                    html += '<div class="text-center text-muted py-4">ยังไม่มีประวัติการจัดการอบรม</div>';
                } else {
                    finalLogs.forEach(log => {
                        let logDetailString = log.details || log.Details || '';
                        let mainChange = logDetailString;
                        let noteText = '-';
                        if (logDetailString.includes(' | Note: ')) {
                            const parts = logDetailString.split(' | Note: ');
                            mainChange = parts[0];
                            noteText = parts[1];
                        }
                        
                        let overQuotaBadge = '';
                        const matchCount = mainChange.match(/เลื่อน:\s*(\d+)\/2/);
                        if (matchCount && parseInt(matchCount[1]) > 2) {
                            overQuotaBadge = `<span class="badge bg-danger ms-2" style="font-size: 0.65rem;"><i class="fa-solid fa-triangle-exclamation"></i> อนุโลมเลื่อนเกินโควต้า</span>`;
                        }
                        
                        const d = new Date(log.timestamp || log.Timestamp || log.created_at);
                        let ts = '-';
                        if (!isNaN(d.getTime())) {
                            ts = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                        }
                        const email = log.useremail || log.user_email || log.UserEmail || 'System';

                        html += `
                        <div class="border-start border-success border-3 ps-3 mb-4 position-relative">
                            <div class="position-absolute top-0 start-0 translate-middle bg-success rounded-circle" style="width: 14px; height: 14px;"></div>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div class="fw-bold text-dark fs-6">${mainChange} ${overQuotaBadge}</div>
                                <div class="text-muted small"><i class="fa-regular fa-clock me-1"></i> ${ts}</div>
                            </div>
                            <div class="bg-light p-3 rounded small text-secondary border shadow-sm">
                                <strong><i class="fa-regular fa-note-sticky text-warning me-1"></i> บันทึก (Note):</strong><br>
                                ${noteText.replace(/\n/g, '<br>')}
                            </div>
                            <div class="mt-2 small fw-bold text-success"><i class="fa-solid fa-user-pen me-1"></i> อัปเดตโดย: ${email}</div>
                        </div>`;
                    });
                }
                html += '</div>';

                Swal.fire({ 
                    title: `<i class="fa-solid fa-clock-rotate-left text-success"></i> ประวัติการทำงาน`, 
                    html: `<div class="fs-6 text-muted mb-2 border-bottom pb-2">รหัสผู้สมัคร: <strong>${leadId}</strong></div>${html}`, 
                    width: 600, 
                    confirmButtonText: 'ปิดหน้าต่าง', 
                    confirmButtonColor: '#6c757d'
                });

            } catch(err) {
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            }
        }
    };

    // ==========================================
    // 🔗 5. GLOBAL BINDINGS & EVENT LISTENERS
    // ==========================================
    // เผยแพร่ฟังก์ชันให้ HTML สามารถเรียกใช้ผ่าน onclick ได้
    window.loadTrainingData = () => TrainingController.init();
    window.renderTrainingDashboard = () => TrainingController.applyFilters();
    window.setTrainFilter = (val) => TrainingController.setFilter(val);
    window.clearTrainSearch = () => TrainingController.clearSearch();
    window.clearTrainDateFilter = () => TrainingController.clearDateFilter();
    window.changeTrainPage = (num, event) => TrainingController.changePage(num, event);

    document.addEventListener('DOMContentLoaded', () => {
        // ตรวจจับการพิมพ์เลขบัตรและจัดฟอร์แมต
        document.body.addEventListener('input', function(e) {
            if (e.target && e.target.id === 'trainIdCard') {
                e.target.value = TrainingLogic.formatThaiID(e.target.value);
                
                const rawValue = e.target.value.replace(/-/g, '');
                if (rawValue.length === 13) {
                    if (TrainingLogic.validateThaiID(rawValue)) {
                        e.target.classList.remove('border-danger', 'text-danger');
                        e.target.classList.add('border-success', 'text-success');
                    } else {
                        e.target.classList.remove('border-success', 'text-success');
                        e.target.classList.add('border-danger', 'text-danger');
                    }
                } else {
                    e.target.classList.remove('border-success', 'text-success', 'border-danger', 'text-danger');
                }
            }
        });

        // จัดการ Form Submit
        const trainForm = document.getElementById('trainingForm');
        if (trainForm) {
            trainForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const fd = new FormData(this);
                const leadId = fd.get('leadId');
                
                // ตรวจสอบความถูกต้องของเลขบัตรประชาชน
                const idCardRaw = (fd.get('idCard') || '').replace(/-/g, '');
                if (idCardRaw && !TrainingLogic.validateThaiID(idCardRaw)) {
                    Swal.fire({ icon: 'error', title: 'เลขบัตรประชาชนไม่ถูกต้อง', text: 'กรุณาตรวจสอบเลขบัตรประจำตัวประชาชน 13 หลักอีกครั้ง ระบบไม่อนุญาตให้บันทึกข้อมูลที่ไม่ถูกต้องครับ' });
                    const idCardInput = document.getElementById('trainIdCard');
                    if (idCardInput) {
                        idCardInput.classList.remove('border-success', 'text-success');
                        idCardInput.classList.add('border-danger', 'text-danger');
                        idCardInput.focus();
                    }
                    return; 
                }
                
                const originalDateRaw = document.getElementById('trainDate') ? document.getElementById('trainDate').value : fd.get('trainDate'); 
                const newReschedDateRaw = document.getElementById('newRescheduleDate') ? document.getElementById('newRescheduleDate').value : fd.get('newRescheduleDate'); 
                const isNoDate = document.getElementById('rescheduleNoDate') ? document.getElementById('rescheduleNoDate').checked : false; 
                
                const notesVal = document.getElementById('trainNotes') ? document.getElementById('trainNotes').value : (fd.get('notes') || '');
                let finalTrainDate = formatDateForDB(originalDateRaw); 
                let currentCount = parseInt(fd.get('rescheduleCount')) || 0;

                // Validate การเลื่อนนัด
                if ((newReschedDateRaw && newReschedDateRaw.trim() !== '') || isNoDate) {
                    let isOverTimeLimit = false;
                    const transferDateRaw = document.getElementById('transferDate') ? document.getElementById('transferDate').value : fd.get('transferDate');
                    const transferDateDB = formatDateForDB(transferDateRaw);
                    
                    if (transferDateDB) {
                        const limitDate = new Date(transferDateDB);
                        limitDate.setDate(limitDate.getDate() + TrainingLogic.RESCHEDULE_LIMIT_DAYS);
                        
                        if (isNoDate) {
                            if (new Date() > limitDate) isOverTimeLimit = true;
                        } else {
                            const selectedNewDate = new Date(formatDateForDB(newReschedDateRaw));
                            if (selectedNewDate > limitDate) isOverTimeLimit = true;
                        }
                    }

                    if (currentCount >= 2 || isOverTimeLimit) {
                        const existingTrain = state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId));
                        const oldNote = existingTrain ? (existingTrain.notes || existingTrain.Notes || '') : '';
                        
                        if (notesVal.trim() === '' || notesVal.trim() === oldNote.trim()) {
                            let reasonMsg = currentCount >= 2 ? 'เลื่อนนัดครบโควตาแล้ว' : `เลยกำหนด ${TrainingLogic.RESCHEDULE_LIMIT_DAYS} วันแล้ว`;
                            Swal.fire({ icon: 'warning', title: 'ต้องระบุเหตุผลการอนุโลม', text: `ผู้สมัคร${reasonMsg} หากต้องการอนุโลมให้เลื่อนต่อ กรุณาพิมพ์เหตุผลใหม่เพิ่มเติมลงในช่อง "โน้ตเพิ่มเติม/บันทึกการอบรม" เสมอ` });
                            return; 
                        }
                    }

                    if (isNoDate) {
                        finalTrainDate = null; 
                    } else {
                        finalTrainDate = formatDateForDB(newReschedDateRaw);
                    }
                    currentCount += 1; 
                }

                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                try {
                    const finalCampVal = document.getElementById('trainFinalCampaign') ? document.getElementById('trainFinalCampaign').value : (fd.get('finalCampaign') || '');
                    
                    const payload = {
                        id_card: idCardRaw,
                        full_name: document.getElementById('trainLeadName').innerText,
                        transfer_date: formatDateForDB(fd.get('transferDate')),
                        train_date: finalTrainDate,
                        amount: fd.get('amount') ? parseFloat(fd.get('amount')) : null,
                        reschedule_count: currentCount,
                        status: fd.get('status'),
                        notes: notesVal,
                        final_campaign: finalCampVal
                    };

                    const isNew = !state.trainings.find(t => (t.lead_id === leadId || t.leadid === leadId || t.Lead_ID === leadId));
                    const updatedDBInfo = await TrainingAPI.save(leadId, payload, isNew);
                    
                    let displayTrainDate = finalTrainDate ? formatDateForDisplay(finalTrainDate) : (isNoDate ? 'เลื่อน (ไม่ระบุวัน)' : '-');
                    const logMsg = `[${leadId}] สถานะ: ${payload.status} | นัด: ${displayTrainDate} | เลื่อน: ${payload.reschedule_count}/2 | ใช้สิทธิ์: ${payload.final_campaign} | Note: ${payload.notes}`;
                    
                    await TrainingAPI.writeLog(isNew ? 'CREATE_TRAINING' : 'UPDATE_TRAINING', 'Training', logMsg);

                    // 🌟 Optimistic UI Update (ไม่ต้องยิงโหลด DB ใหม่ทั้งหมด)
                    TrainingLogic.updateStateOptimistically(leadId, updatedDBInfo);
                    TrainingController.applyFilters();

                    const modalEl = document.getElementById('trainingModal');
                    if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).hide();
                    
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'บันทึกเรียบร้อย', showConfirmButton: false, timer: 3000 });
                } catch (err) {
                    console.error("Save Training Error:", err);
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                }
            });
        }
    });
</script>
