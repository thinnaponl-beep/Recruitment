<style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

    :root {
        /* 🌟 Theme Colors (อิงตามภาพตัวอย่าง) 🌟 */
        --primary-blue: #0ea5e9; /* Sky Blue (สีหลัก) */
        --primary-light: #f0f9ff;
        --success-green: #10b981;
        --warning-yellow: #f59e0b;
        --danger-red: #ef4444;
        --purple-accent: #8b5cf6;
        
        --border-color: #f1f5f9; /* ขอบสีเทาอ่อนมาก */
        --text-main: #334155;    /* สีตัวอักษรหลัก (เทาเข้ม) */
        --text-muted: #64748b;   /* สีตัวอักษรรอง */
        --bg-light: #f8fafc;     /* พื้นหลังหลัก (เทาอมฟ้าอ่อนสุดๆ) */
        
        /* Sidebar Colors */
        --sidebar-bg: #ffffff;
        --sidebar-text: #475569;
        --sidebar-hover: #f8fafc;
    }

    body {
        font-family: 'Sarabun', sans-serif;
        background-color: var(--bg-light);
        color: var(--text-main);
        overflow-x: hidden;
    }

    /* ==========================================
       Layout & Sidebar
       ========================================== */
    #wrapper { display: flex; width: 100%; height: 100vh; overflow: hidden; }
    
    #sidebar { 
        width: 260px; 
        background: var(--sidebar-bg); 
        color: var(--sidebar-text); 
        height: 100vh; 
        overflow-y: auto; 
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        z-index: 1000;
        border-right: 1px solid var(--border-color);
        box-shadow: 2px 0 15px rgba(0,0,0,0.02);
    }
    
    .sidebar-header { 
        padding: 24px 20px; 
        background: var(--sidebar-bg); 
        transition: all 0.3s; 
        white-space: nowrap; 
        overflow: hidden; 
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .sidebar-header h3 { 
        font-size: 1.25rem; 
        font-weight: 700; 
        margin: 0; 
        color: var(--text-main);
    }

    .sidebar-header i {
        background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
        color: white;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-size: 1rem;
        box-shadow: 0 4px 10px rgba(14, 165, 233, 0.2);
    }

    #sidebar ul.components { padding: 15px 12px; }
    
    #sidebar ul li a { 
        padding: 12px 16px; 
        font-size: 0.95rem; 
        font-weight: 500;
        display: flex; 
        align-items: center;
        color: var(--sidebar-text); 
        text-decoration: none; 
        white-space: nowrap; 
        overflow: hidden; 
        transition: all 0.2s; 
        border-radius: 12px;
        margin-bottom: 4px;
    }
    
    #sidebar ul li a i {
        width: 26px;
        font-size: 1.1rem;
        color: #94a3b8;
        transition: all 0.2s;
    }

    #sidebar ul li a:hover { 
        background: var(--sidebar-hover); 
        color: var(--primary-blue); 
    }
    #sidebar ul li a:hover i {
        color: var(--primary-blue);
    }
    
    #sidebar ul li.active > a { 
        background: var(--primary-light); 
        color: var(--primary-blue); 
        font-weight: 600;
    }
    #sidebar ul li.active > a i {
        color: var(--primary-blue);
    }
    
    /* Collapsed Sidebar */
    #sidebar.collapsed { width: 85px; }
    #sidebar.collapsed .sidebar-header { padding: 24px 0; justify-content: center; }
    #sidebar.collapsed .sidebar-header h3 span { display: none; }
    #sidebar.collapsed ul li a span { display: none; }
    #sidebar.collapsed ul li a { padding: 14px 0; justify-content: center; }
    #sidebar.collapsed ul li a i { margin-right: 0 !important; font-size: 1.3rem; }

    #content-wrapper { flex-grow: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); width: calc(100% - 260px); }
    #sidebar.collapsed + #content-wrapper { width: calc(100% - 85px); }

    /* ==========================================
       Navbar & Top Bar
       ========================================== */
    .navbar {
        background-color: rgba(255, 255, 255, 0.95) !important;
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 4px 20px rgba(0,0,0,0.02) !important;
    }

    /* ==========================================
       Generic Cards & Tables
       ========================================== */
    .card {
        border-radius: 16px;
        border: 1px solid var(--border-color) !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03) !important;
        background-color: #ffffff;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-header {
        border-top-left-radius: 16px !important;
        border-top-right-radius: 16px !important;
        background-color: #ffffff;
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 1.25rem;
    }
    
    .table-light {
        background-color: #f8fafc;
        border-bottom: 1px solid var(--border-color);
    }
    .table-light th {
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: none;
    }

    /* ==========================================
       P-Value Cards / Dashboard Cards
       ========================================== */
    .p-card { cursor: pointer; border-radius: 16px; border: 1px solid var(--border-color); }
    .p-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.06) !important; }
    .p-card.active-filter { border: 2px solid var(--primary-blue) !important; transform: scale(1.02); background-color: var(--primary-light); }
    
    /* ==========================================
       UI Form (Modal Version)
       ========================================== */
    .modal-xl { max-width: 1100px; }
    .modal-content { border-radius: 20px; border: none; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    
    .form-control, .form-select {
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
        transition: all 0.2s;
        background-color: #ffffff;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 4px var(--primary-light);
    }
    .input-group-text {
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
    }

    /* Segment & Toggle */
    .segmented-control { display: flex; gap: 10px; }
    .segmented-control .btn { flex: 1; border: 1px solid var(--border-color); color: #64748b; background: #fff; border-radius: 10px; font-weight: 600; font-size: 0.9rem; padding: 0.5rem; transition: all 0.2s; }
    .segmented-control .btn-check:checked + .btn { border-color: var(--primary-blue); color: var(--primary-blue); background-color: var(--primary-light); box-shadow: none; }

    /* Tags */
    .tags-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .tag-badge { background-color: #f1f5f9; color: #475569; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .tag-badge:hover { background-color: var(--primary-light); color: var(--primary-blue); border-color: #bae6fd; }

    /* Buttons */
    .btn { border-radius: 10px; font-weight: 600; padding: 0.5rem 1.25rem; transition: all 0.2s; }
    .btn-primary { background-color: var(--primary-blue); border-color: var(--primary-blue); }
    .btn-primary:hover { background-color: #0284c7; border-color: #0284c7; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
    
    /* Loading Overlay */
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    /* ==========================================
       🤖 AI Floating Widget Styles
       ========================================== */
    .ai-fab-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        color: white;
        border: none;
        font-size: 24px;
        cursor: pointer;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
    }
    .ai-fab-btn:hover {
        transform: scale(1.1);
    }

    .ai-chat-container {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 380px;
        height: 600px;
        max-height: 80vh;
        max-width: 90vw;
        background: white;
        border-radius: 20px;
        z-index: 9998;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px) scale(0.95);
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(0,0,0,0.05);
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        transform-origin: bottom right;
    }

    .ai-chat-container.show {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
    }

    .ai-chat-header {
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
    }

    .ai-chat-body {
        flex-grow: 1;
        width: 100%;
        background: #ffffff;
    }
    .ai-chat-body iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
