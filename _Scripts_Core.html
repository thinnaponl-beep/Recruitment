        _isTrainingLoadedForPromo: false // Flag ป้องกันดึงข้อมูลซ้ำซ้อน
    };

    let provinceSelectControl;
    let districtSelectControl;
    let dateFilterControl;
    let sortableInstance;
    let currentConfigCat = 'Channel';

    // โหลดแพ็คเกจ Google Charts
    if (typeof google !== 'undefined' && google.charts) {
        google.charts.load('current', {'packages':['timeline']});
    }

    // ==========================================
    // 🔐 2. ระบบดึงอีเมลจาก Google Workspace
    // ==========================================
    async function fetchUserSession() {
        return new Promise((resolve) => {
            if (typeof google === 'undefined' || !google.script) {
                console.warn("Running outside Google Apps Script environment.");
                state.currentUser = { email: "local.dev@system.com" };
                resolve(true);
                return;
            }

            google.script.run
                .withSuccessHandler(async (resStr) => {
                    try {
                        const res = JSON.parse(resStr);
                        if (res.status === 'success') {
                            state.currentUser = { email: res.email };
                            const userDisplay = document.getElementById('currentUserDisplay');
                            if (userDisplay) userDisplay.innerText = res.email;
                            resolve(true);
                        } else {
                            Swal.fire('ข้อผิดพลาดการเข้าถึง', res.message, 'error');
                            resolve(false);
                        }
                    } catch (e) {
                        console.error(e);
                        resolve(false);
                    }
                })
                .withFailureHandler((err) => {
                    console.error("Google Script Error:", err);
                    Swal.fire('Error', 'ไม่สามารถเชื่อมต่อกับ Google Workspace ได้', 'error');
                    resolve(false);
                })
                .getCurrentSession();
        });
    }

    // ==========================================
    // 🚀 3. INIT & EVENT LISTENERS
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {
        
        const isSessionActive = await fetchUserSession(); 
        
        if (isSessionActive) {
            await loadInitialDataFromSupabase();
        } else {
            const loadingOverlay = document.getElementById('loading-overlay');
            if (loadingOverlay) loadingOverlay.style.display = 'none';
        }

        if (typeof flatpickr !== 'undefined') {
            flatpickr("#recordDate", { 
                locale: "th", 
                dateFormat: "d/m/Y", 
                defaultDate: new Date() 
            });

            const filterEl = document.getElementById('dateFilter');
            if(filterEl) {
                dateFilterControl = flatpickr(filterEl, {
                    locale: "th",
                    mode: "range",
                    dateFormat: "d/m/Y",
                    placeholder: "เลือกช่วงวันที่...",
                    onChange: function(selectedDates) {
                        if (selectedDates.length === 2) {
                            const start = selectedDates[0];
                            start.setHours(0,0,0,0); 
                            const end = selectedDates[1];

                            state.dateRange = { start: start, end: end };
                            if(typeof applyFilters === 'function') applyFilters();

                            state.dateRange = { start: null, end: null };
                            if(typeof applyFilters === 'function') applyFilters();

                    }
                });
            }
        }
        
        initProvinceDropdown();

        const sidebarCollapseBtn = document.getElementById('sidebarCollapse');
        const sidebar = document.getElementById('sidebar');
        if (sidebarCollapseBtn && sidebar) {
            sidebarCollapseBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
            });
        }

    // ==========================================
    // 🛣️ 4. ROUTING & NAVIGATION
    // ==========================================
    function switchMenu(pageId, updateUrl = true) {

        if (updateUrl && typeof google !== 'undefined' && google.script && google.script.history) {
            google.script.history.push(null, { page: pageId }, pageId);

            'training': '<i class="fa-solid fa-calendar-check text-success"></i> จัดการรอบอบรม (Training)',
            'promotions': '<i class="fa-solid fa-bullhorn text-danger"></i> จัดการแคมเปญและโปรโมชั่น',

    // ==========================================
    // ⚙️ 5. GLOBAL DATA POPULATION (จาก Supabase)
    // ==========================================
    
    async function loadInitialDataFromSupabase() {
        try {
            Swal.fire({ title: 'กำลังดึงข้อมูลจากระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // 1. ดึงข้อมูล Leads (ปลดการเรียงลำดับจากฝั่ง DB ออก เพื่อป้องกัน Error คอลัมน์ recorddate/record_date ไม่ตรงกัน)
            const { data: leadsData, error: leadsErr } = await supabase
                .from('db_leads')
                .select('*');
            if (leadsErr && leadsErr.code !== '42P01') throw leadsErr;
            
            let rawLeads = leadsData || [];
            
            // 🌟 เรียงลำดับข้อมูลโดยอิงจาก "วันที่บันทึก (RecordDate)" เป็นหลัก แล้วดันเคสใหม่ล่าสุดขึ้นบน 🌟
            rawLeads.sort((a, b) => {
                // 1. เรียงตามวันที่บันทึก (RecordDate) เป็นหลัก (ใหม่ไปเก่า)
                const dateA = parseFlexibleDate(a.RecordDate || a.record_date || a.recorddate) || new Date(0);
                const dateB = parseFlexibleDate(b.RecordDate || b.record_date || b.recorddate) || new Date(0);

                // ปรับเวลาให้เป็น 00:00:00 เพื่อเทียบแค่วันที่ล้วนๆ
                const timeOnlyA = new Date(dateA).setHours(0,0,0,0);
                const timeOnlyB = new Date(dateB).setHours(0,0,0,0);

                if (timeOnlyA !== timeOnlyB) {
                    return timeOnlyB - timeOnlyA;
                }

                // 2. ถ้าวันที่บันทึกเป็น "วันเดียวกัน" ให้เอารายการที่เพิ่งคีย์เข้าระบบล่าสุดขึ้นก่อน 
                const createdA = new Date(a.created_at || a.timestamp || a.createdAt || 0).getTime();
                const createdB = new Date(b.created_at || b.timestamp || b.createdAt || 0).getTime();

                if (createdA !== 0 && createdB !== 0 && createdA !== createdB) {
                    return createdB - createdA;
                }

                // 3. สำรองสุดท้าย: ถ้าทุกอย่างเท่ากัน ให้เรียงจากรหัส Lead_ID (เพราะรหัสมักจะ gen จาก Timestamp อยู่แล้ว)
                const idA = String(a.Lead_ID || a.lead_id || a.leadid || '');
                const idB = String(b.Lead_ID || b.lead_id || b.leadid || '');
                return idB.localeCompare(idA);
            });
            
            const mappedLeads = rawLeads.map(row => ({
                Lead_ID: row.Lead_ID || row.lead_id || row.leadid,
                RecordDate: formatDateForDisplay(row.RecordDate || row.record_date || row.recorddate), 
                FullName: row.FullName || row.full_name || row.fullname,
                Phone: row.Phone || row.phone,
                Channel: row.Channel || row.channel,
                JobType: row.JobType || row.job_type || row.jobtype,
                Province: row.Province || row.province,
                District: row.District || row.district,
                Age: row.Age || row.age,
                StartWithin: row.StartWithin || row.start_within || row.startwithin,
                ChatLink: row.ChatLink || row.chat_link || row.chatlink,
                ContactStatus: row.ContactStatus || row.contact_status || row.contactstatus,
                ContactResult: row.ContactResult || row.contact_result || row.contactresult,
                IsApplicant: row.IsApplicant || row.is_applicant || row.isapplicant || (row.is_applicant ? 'มี' : 'ไม่มี'),
                TrainingStatus: row.TrainingStatus || row.training_status || row.trainingstatus,
                P_Value: row.P_Value || row.p_value || row.pvalue,
                Promo: row.Promo || row.promo_id || row.promoid || row.promo,
                Notes: row.Notes || row.notes,
                Admin: row.Admin || row.admin_email || row.adminemail || row.admin,
                Assigned_Admin: row.Assigned_Admin || row.assigned_admin || row.assignedadmin,
                Referrer: row.Referrer || row.referrer,
                BackgroundCheck: row.BackgroundCheck || row.background_check || row.backgroundcheck
            }));

            // 2. ดึง Admins
            const { data: adminData, error: adminErr } = await supabase.from('config_system').select('*');
            if (adminErr) throw new Error("ดึงข้อมูล 'config_system' ไม่สำเร็จ: " + adminErr.message);
            
            const mappedAdmins = (adminData || []).map(a => {
                const isDevVal = String(a.is_developer || a.Is_Developer || a.is_dev || a.isdev || '').trim().toUpperCase();
                const autoAssignVal = String(a.AutoAssign_Status || a.auto_assign || a.autoassign_status || '').trim().toUpperCase();
                return {
                    email: a.Admin_Email || a.email || a.admin_email || a.adminemail,
                    name: a.Admin_Name || a.name || a.admin_name || a.adminname || a.Admin_Email || a.email,
                    role: a.Role || a.role || 'Admin',
                    auto: (autoAssignVal === 'TRUE' || autoAssignVal === 'ON' || autoAssignVal === '1') ? 'ON' : 'OFF',
                    auto_assign: (autoAssignVal === 'TRUE' || autoAssignVal === 'ON' || autoAssignVal === '1'),
                    is_dev: (isDevVal === 'TRUE' || isDevVal === '1')
                };
            });

            // 3. ดึง Dropdowns
            const { data: dropData, error: dropErr } = await supabase.from('config_dropdowns').select('*');
            if (dropErr) throw new Error("ดึงข้อมูล 'config_dropdowns' ไม่สำเร็จ: " + dropErr.message);

            // 🌟 รองรับหมวดหมู่ใหม่ที่แยกกันชัดเจน 🌟
            let dropdowns = { 
                Channel: [], ContactResult_Success: [], ContactResult_Fail: [], Promo: [], JobType: [],
                StartWithin: [], BackgroundCheck: [], TrainingStatus: [], QuickTags: [], ContactStatus: [],
                TrainingPageStatus: [], UncontactableKeywords: []
            };

            if (dropData) {
                const sortedDropData = [...dropData].sort((a, b) => {
                    const orderA = a.Sort_Order ?? a.sort_order ?? a.sortorder ?? 0;
                    const orderB = b.Sort_Order ?? b.sort_order ?? b.sortorder ?? 0;
                    return orderA - orderB;
                });

                sortedDropData.forEach(d => {
                    const cat = d.Category || d.category;
                    const val = d.Value || d.item_value || d.value;
                    const isActive = String(d.IsActive || d.is_active || d.isactive).toUpperCase() !== 'FALSE';
                    
                    // ข้ามการดึง Promo จากตารางนี้ (เพราะเดี๋ยวดึงจาก db_promotions แทน)
                    if (cat !== 'Promo' && isActive && val) {
                        if (!dropdowns[cat]) dropdowns[cat] = []; 
                        dropdowns[cat].push(val);
                    }
                });
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 4. ดึงข้อมูล Promotions 
            const { data: promoData, error: promoErr } = await supabase.from('db_promotions').select('*');
            if (promoErr) console.warn("ดึงข้อมูล 'db_promotions' ไม่สำเร็จ: " + promoErr.message);
            
            if (promoData) {
                state.promotions = promoData.map(p => {
                    let calcStatus = 'Invalid';
                    let parsedStart = parseFlexibleDate(p.Start_Date || p.start_date || p.startdate);
                    let parsedEnd = parseFlexibleDate(p.End_Date || p.end_date || p.enddate);

                    if (parsedStart && parsedEnd) {
                        parsedStart.setHours(0,0,0,0);
                        parsedEnd.setHours(23, 59, 59, 999);
                        const dbStatus = p.Status || p.status;

                        if (dbStatus === 'Inactive') calcStatus = 'Inactive';
                        else if (today > parsedEnd) calcStatus = 'Expired';
                        else if (today < parsedStart) calcStatus = 'Upcoming';
                        else calcStatus = 'Active';
                    }

                    return {
                        Promo_ID: p.Promo_ID || p.promo_id || p.promoid,
                        Promo_Name: p.Promo_Name || p.promo_name || p.promoname,
                        Start_Date: p.Start_Date || p.start_date || p.startdate,
                        End_Date: p.End_Date || p.end_date || p.enddate,
                        Description: p.Description || p.description,
                        Status: p.Status || p.status,
                        Calculated_Status: calcStatus,
                        Parsed_Start: parsedStart,
                        Parsed_End: parsedEnd,
                        Discount_Amount: parseFloat(p.discount_amount || p.Discount_Amount || 0)
                    };
                });

                // เก็บเฉพาะโปรที่ Active ลงไปเป็นตัวเลือก Dropdown
                state.promotions.forEach(p => {
                    if (p.Calculated_Status === 'Active') {
                        dropdowns.Promo.push({ id: p.Promo_ID, name: p.Promo_Name });
                    }
                });
            }

            // 5. ดึงข้อมูล Referrers 
            const { data: refData, error: refErr } = await supabase.from('db_referrers').select('*');
            if (refErr) console.warn("ดึงข้อมูล 'db_referrers' ไม่สำเร็จ: " + refErr.message);

            if (refData) {
                state.referrers = refData.map(r => {
                    let calcStatus = 'Invalid';
                    let parsedStart = parseFlexibleDate(r.Start_Date || r.start_date || r.startdate);
                    let parsedEnd = parseFlexibleDate(r.End_Date || r.end_date || r.enddate);

                    if (parsedStart && parsedEnd) {
                        parsedStart.setHours(0,0,0,0);
                        parsedEnd.setHours(23, 59, 59, 999);
                        const dbStatus = r.Status || r.status;

                        if (dbStatus === 'Inactive') calcStatus = 'Inactive';
                        else if (today > parsedEnd) calcStatus = 'Expired';
                        else if (today < parsedStart) calcStatus = 'Upcoming';
                        else calcStatus = 'Active';
                    }

                    return {
                        Ref_ID: r.Ref_ID || r.ref_id || r.refid,
                        Ref_Name: r.Ref_Name || r.ref_name || r.refname,
                        Start_Date: r.Start_Date || r.start_date || r.startdate,
                        End_Date: r.End_Date || r.end_date || r.enddate,
                        Description: r.Description || r.description,
                        Status: r.Status || r.status,
                        Calculated_Status: calcStatus,
                        Parsed_Start: parsedStart,
                        Parsed_End: parsedEnd,
                        Discount_Amount: parseFloat(r.discount_amount || r.Discount_Amount || 0),
                        Commission_Amount: parseFloat(r.commission_amount || r.Commission_Amount || 0)
                    };
                });
            }

            // 6. ดึงข้อมูล Training (เพื่อให้หน้าโปรโมชั่นสามารถคำนวณยอดเงินได้ทันที)
            const { data: trainData, error: trainErr } = await supabase.from('db_training').select('*');
            if (!trainErr) {
                state.trainings = trainData || [];
                state._isTrainingLoadedForPromo = true;
            }

            // นำข้อมูลเข้าสู่ Global State 
            state.leads = mappedLeads;
            state.filtered = [...state.leads];
            state.admins = mappedAdmins;
            
            if (state.currentUser) {
                const matchedAdmin = state.admins.find(a => a.email === state.currentUser.email);
                if (matchedAdmin) {
                    state.currentUser.name = matchedAdmin.name;
                    state.currentUser.role = matchedAdmin.role;
                    const userDisplay = document.getElementById('currentUserDisplay');
                    if (userDisplay) userDisplay.innerText = matchedAdmin.name || matchedAdmin.email;
                }
            }

            state.initialDropdowns = dropdowns;
            
            // 🌟 เติมข้อมูลลงฟอร์มหน้าต่างๆ 🌟
            populateDropdowns(dropdowns);

            // 🌟 แก้ไข: ซ่อน Loading เสมอเมื่อสำเร็จ 🌟
            const loadingOverlay = document.getElementById('loading-overlay');
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            Swal.close();

            // เปลี่ยนหน้าและอัปเดต UI 
            refreshActivePage();

        } catch (err) {
            console.error("Load Data Error:", err);
            
            // 🌟 แก้ไข: ป้องกันการค้างที่หน้าจอโหลดด้วยการสั่งซ่อนทับอีกรอบ 🌟
            const loadingOverlay = document.getElementById('loading-overlay');
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            
            Swal.fire({
                icon: 'error',
                title: 'เกิดข้อผิดพลาดในการโหลดข้อมูล',
                text: err.message || 'โปรดตรวจสอบการเชื่อมต่อหรือชื่อตารางใน Database'
            });
        }
    }

    // ฟังก์ชันช่วยเพื่อ Refresh การแสดงผลในหน้าปัจจุบันใหม่
    function refreshActivePage() {
        const pages = ['leads', 'pvalue', 'training', 'promotions', 'settings'];
        let activePage = 'leads';

        pages.forEach(p => {
            const el = document.getElementById('page-' + p);
            if (el && el.style.display !== 'none') activePage = p;
        });

        if (activePage === 'leads' && typeof applyFilters === 'function') {
            applyFilters(); 
        } else if (activePage === 'pvalue' && typeof renderPValueDashboard === 'function') {
            renderPValueDashboard();
        } else if (activePage === 'training' && typeof renderTrainingDashboard === 'function') {
            renderTrainingDashboard();
        } else if (activePage === 'promotions' && typeof renderMainPromoDashboard === 'function') {
            renderMainPromoDashboard();
            if (typeof renderPromotionsDashboard === 'function') renderPromotionsDashboard();
            if (typeof renderReferrersDashboard === 'function') renderReferrersDashboard();
        } else if (activePage === 'settings') {
            if (typeof renderAdminTable === 'function') renderAdminTable(); // 🌟 อัปเดตข้อมูลแอดมินตอนกดปุ่ม Reload หรือโหลดครั้งแรก
            if (typeof loadSettingsDropdowns === 'function') loadSettingsDropdowns();
        }
    }

    function populateDropdowns(drops) {
        if (!drops) return;
        
        const fill = (id, arr) => {
            const el = document.getElementById(id);
            if(!el || !arr) return;
            
            const currentVal = el.value; 
            el.innerHTML = '<option value="">เลือก...</option>';
            
            arr.forEach(val => {
                if (typeof val === 'object' && val !== null) {
                    el.add(new Option(val.name, val.id));
                } else {
                    el.add(new Option(val, val));
                }
            });
            
            if(currentVal) el.value = currentVal; 
        };

        // 🌟 ฟอร์มหน้า Leads (ไม่ต้อง fill contactResultSelect แล้วเพราะใช้ระบบ Dependent) 🌟
        fill('channelSelect', drops.Channel);
        fill('contactStatus', drops.ContactStatus);
        fill('startWorkWithin', drops.StartWithin);
        
        fill('promoSelect', drops.Promo); 
        fill('assessPromoSelect', drops.Promo);

        // จัดการ Tag ด่วน (Quick Tags)
        const quickTagsArr = drops.QuickTags || [];
        const updateTags = (containerId) => {
            const container = document.getElementById(containerId);
            if (container && quickTagsArr.length > 0) {
                container.innerHTML = quickTagsArr.map(tag => 
                    `<span class="tag-badge" onclick="appendTag(this)">${tag}</span>`
                ).join('');
            }
        };
        
        updateTags('quickTags'); 
        updateTags('assessQuickTags'); 
    }

    function initProvinceDropdown() {
        const provSelect = document.getElementById('provinceSelect');
        if(!provSelect || !state.thaiData) return;
        
        if(provinceSelectControl) provinceSelectControl.destroy();
        provSelect.innerHTML = '<option value="">เลือกจังหวัด...</option>';
        
        const sortedProv = [...state.thaiData].sort((a,b) => a.name_th.localeCompare(b.name_th));
        sortedProv.forEach(p => {
            provSelect.add(new Option(p.name_th, p.name_th));
        });

        if (typeof TomSelect !== 'undefined') {
            provinceSelectControl = new TomSelect(provSelect, {
                create: false,
                sortField: { field: "text", direction: "asc" },
                placeholder: "พิมพ์ค้นหาจังหวัด..."
            });
            provinceSelectControl.on('change', function(val) { populateDistrict(val); });
        }
    }

    function populateDistrict(provinceName, selectedDistrict = '') {
        const distSelect = document.getElementById('districtSelect');
        if(!distSelect) return;

        if(districtSelectControl) districtSelectControl.destroy();
        distSelect.innerHTML = '<option value="">เลือกอำเภอ/เขต...</option>';
        
        if(!provinceName) {
            if (typeof TomSelect !== 'undefined') {
                districtSelectControl = new TomSelect(distSelect, { create: false, placeholder: "พิมพ์ค้นหาอำเภอ..." });
            }
            return;
        }

        const provData = state.thaiData.find(p => p.name_th === provinceName);
        if(provData && provData.amphure) {
            const sortedDist = [...provData.amphure].sort((a,b) => a.name_th.localeCompare(b.name_th));
            sortedDist.forEach(d => {
                distSelect.add(new Option(d.name_th, d.name_th));
            });
        }

        if (typeof TomSelect !== 'undefined') {
            districtSelectControl = new TomSelect(distSelect, {
                create: false,
                sortField: { field: "text", direction: "asc" },
                placeholder: "พิมพ์ค้นหาอำเภอ..."
            });
            if(selectedDistrict) districtSelectControl.setValue(selectedDistrict, true);
        }
    }

    // ==========================================
    // 🛠️ 6. HELPERS & DATE UTILITIES (เพิ่มความปลอดภัยในการจัดการ String)
    // ==========================================
    
    function showFullNote(event, encodedText) {
        event.stopPropagation(); 
        const text = decodeURIComponent(encodedText);
        if (text === '-' || !text) return;
        
        const formattedText = text.replace(/\n/g, '<br>');
        
        Swal.fire({
            title: '<i class="fa-regular fa-note-sticky text-warning"></i> บันทึก (Note)',
            html: `<div class="text-start p-3 bg-light rounded border shadow-sm" style="max-height: 400px; overflow-y: auto;">${formattedText}</div>`,
            confirmButtonText: 'ปิดหน้าต่าง',
            confirmButtonColor: '#6c757d'
        });
    }

    function appendTag(el) {
        const noteArea = document.getElementById('staffNotesAssess') || document.getElementById('notes') || document.getElementById('staffNotes');
        if(!noteArea) return;
        const text = el.innerText;
        if(!noteArea.value.includes(text)) {
            if (noteArea.value.length > 0 && !noteArea.value.endsWith(' ') && !noteArea.value.endsWith('\n')) {
                noteArea.value += ' ';
            }
            noteArea.value += text + ' ';
            
            el.style.transform = 'scale(0.95)';
            setTimeout(() => el.style.transform = 'scale(1)', 150);
        }
    }

    function formatDateForDisplay(dateStr) {
        if (!dateStr) return '';
        const str = String(dateStr);
        if (str.includes('/')) return str; 
        
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return str; 
        
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }

    function formatDateForDB(dateStr) {
        if (!dateStr) return null;
        const str = String(dateStr);
        if (str.includes('-')) return str; 
        
        const parts = str.split('/');
        if (parts.length === 3) {
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        return null;
    }

    function parseFlexibleDate(dateStr) {
        if (!dateStr) return null;
        const str = String(dateStr);
        if (str.includes('/')) {
            const parts = str.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? null : d;
    }
