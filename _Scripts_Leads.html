<script>
    // ==========================================
    // ⭐ 0. Helper: ระบบบันทึก Log อัจฉริยะ 
    // ==========================================
    async function writeLogToSupabase(action, module, details) {
        const userEmail = state.currentUser?.email || 'System';
        const logId = "LOG-" + new Date().getTime(); 
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const tsStr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`; 

        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

            let payload = {};
            payload[getCol(['logid', 'log_id', 'Log_ID', 'id'])] = logId;
            payload[getCol(['useremail', 'user_email', 'UserEmail', 'email'])] = userEmail;
            payload[getCol(['action', 'Action'])] = action;
            payload[getCol(['module', 'Module'])] = module;
            payload[getCol(['details', 'Details'])] = details;

            const tsCol = getCol(['timestamp', 'Timestamp', 'created_at', 'createdat']);
            if (dbKeys.includes(tsCol) || dbKeys.length === 0) { 
                payload[tsCol] = tsStr;
            }

            await supabase.from('db_logs').insert([payload]);
        } catch(e) { 
            console.error("Log error (ignored):", e); 
        }
    }

    // ==========================================
    // 📊 1. ฟังก์ชันแสดงผลหน้า Leads (Dashboard & Table)
    // ==========================================
    
    if (typeof state.currentFilter === 'undefined') state.currentFilter = 'All';
    if (typeof state.leadsSearch === 'undefined') state.leadsSearch = '';
    if (typeof state.leadsChannelFilter === 'undefined') state.leadsChannelFilter = 'All';

    function handleLeadsSearch(val) {
        state.leadsSearch = val;
        const clearBtn = document.getElementById('lSearchClearBtn');
        if (clearBtn) {
            if (val) {
                clearBtn.classList.remove('d-none');
                clearBtn.style.display = ''; 
            } else {
                clearBtn.classList.add('d-none');
            }
        }
        applyFilters();
    }

    function clearLeadsSearch() {
        state.leadsSearch = '';
        const input = document.getElementById('lSearchInput');
        if(input) input.value = '';
        const clearBtn = document.getElementById('lSearchClearBtn');
        if (clearBtn) clearBtn.classList.add('d-none');
        applyFilters();
    }

    function setLeadsChannelFilter(val) {
        state.leadsChannelFilter = val;
        applyFilters();
    }

    function renderLeadsDashboard(dataToCount = state.leads) {
        const chSelect = document.getElementById('lChannelFilter');
        if (chSelect && chSelect.options.length <= 1 && state.initialDropdowns && state.initialDropdowns.Channel) {
            state.initialDropdowns.Channel.forEach(ch => chSelect.add(new Option(ch, ch)));
            chSelect.value = state.leadsChannelFilter;
        }

        // 🌟 เปลี่ยนเกณฑ์การนับ Card 🌟
        const counts = {
            'All': dataToCount.length,
            'รอติดต่อ': dataToCount.filter(l => !l.ContactResult || l.ContactResult === '-' || String(l.ContactResult).trim() === '').length,
            'คุณสมบัติไม่ผ่านเกณฑ์': dataToCount.filter(l => l.ContactResult && l.ContactResult.includes('ไม่ผ่านเกณฑ์')).length,
            'ติดต่อไม่ได้': dataToCount.filter(l => l.ContactStatus === 'ติดต่อไม่ได้' || (state.initialDropdowns?.ContactResult_Fail || []).includes(l.ContactResult)).length,
            'Add Line เรียบร้อย': dataToCount.filter(l => l.ContactResult === 'Add Line เรียบร้อย' || l.ContactResult === 'แอดไลน์แล้ว').length
        };

        const cards = [
            { id: 'All', label: 'เคสทั้งหมด', count: counts['All'], icon: 'fa-solid fa-users', color: 'primary' },
            { id: 'รอติดต่อ', label: 'รอติดต่อ (Raw)', count: counts['รอติดต่อ'], icon: 'fa-solid fa-hourglass-half', color: 'secondary' },
            { id: 'คุณสมบัติไม่ผ่านเกณฑ์', label: 'คุณสมบัติไม่ผ่านเกณฑ์', count: counts['คุณสมบัติไม่ผ่านเกณฑ์'], icon: 'fa-solid fa-user-xmark', color: 'danger' },
            { id: 'ติดต่อไม่ได้', label: 'ติดต่อไม่ได้', count: counts['ติดต่อไม่ได้'], icon: 'fa-solid fa-phone-slash', color: 'warning' },
            { id: 'Add Line เรียบร้อย', label: 'Add Line เรียบร้อย', count: counts['Add Line เรียบร้อย'], icon: 'fa-brands fa-line', color: 'success' }
        ];

        let html = '';
        cards.forEach(c => {
            const activeClass = state.currentFilter === c.id ? 'active-filter border-2 border-' + c.color : '';
            html += `
            <div class="col-md col-sm-6">
                <div class="card p-card bg-white border-0 shadow-sm h-100 border-start border-4 border-${c.color} ${activeClass}" onclick="filterByContactResult('${c.id}')">
                    <div class="card-body p-3 d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted small fw-bold mb-1" style="font-size: 0.75rem;">${c.label}</div>
                            <h3 class="fw-bold mb-0 text-dark">${c.count}</h3>
                        </div>
                        <div class="bg-${c.color} bg-opacity-10 p-2 rounded-circle text-${c.color} d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                            <i class="${c.icon} fs-6"></i>
                        </div>
                    </div>
                </div>
            </div>`;
        });
        
        const container = document.getElementById('pValueCards'); 
        if(container) container.innerHTML = html;
    }

    // 🌟 เพิ่มฟังก์ชันปุ่ม "วันนี้" 🌟
    function setLeadsDateToToday() {
        if (typeof dateFilterControl !== 'undefined' && dateFilterControl) {
            const today = new Date();
            dateFilterControl.setDate([today, today]); // Flatpickr ใช้ Array 2 ค่าในโหมด Range
            
            const start = new Date(today);
            start.setHours(0,0,0,0);
            const end = new Date(today);
            end.setHours(23,59,59,999);
            
            state.dateRange = { start: start, end: end };
            applyFilters();
        }
    }

    function clearDateFilter() {
        if(typeof dateFilterControl !== 'undefined' && dateFilterControl) {
            dateFilterControl.clear();
        } else {
            const dateInput = document.getElementById('dateFilter');
            if (dateInput && dateInput._flatpickr) dateInput._flatpickr.clear();
        }
    }

    function filterByContactResult(status) {
        state.currentFilter = status;
        applyFilters(); 
    }

    function applyFilters() {
        let baseFiltered = state.leads;
        
        if(state.dateRange && state.dateRange.start && state.dateRange.end) {
            baseFiltered = baseFiltered.filter(l => {
                const rDate = l.RecordDate || l.record_date || l.recorddate;
                if(!rDate) return false;
                
                let rowDate;
                if(rDate.includes('/')) {
                    const parts = rDate.split('/');
                    rowDate = new Date(parts[2], parts[1]-1, parts[0]);
                } else {
                    rowDate = new Date(rDate);
                }
                
                if(isNaN(rowDate.getTime())) return false;
                rowDate.setHours(0,0,0,0);
                
                return rowDate >= state.dateRange.start && rowDate <= state.dateRange.end;
            });
        }

        if (state.leadsChannelFilter !== 'All') {
            baseFiltered = baseFiltered.filter(l => l.Channel === state.leadsChannelFilter);
        }

        if (state.leadsSearch.trim() !== '') {
            const query = state.leadsSearch.toLowerCase().trim();
            baseFiltered = baseFiltered.filter(l => {
                const name = l.FullName || l.full_name || l.fullname || '';
                const phone = l.Phone || l.phone || '';
                const notes = l.Notes || l.notes || '';
                return name.toLowerCase().includes(query) || phone.toLowerCase().includes(query) || notes.toLowerCase().includes(query);
            });
        }

        renderLeadsDashboard(baseFiltered);

        let tableFiltered = baseFiltered;
        
        // 🌟 เปลี่ยนเกณฑ์การกรอง Table 🌟
        if (state.currentFilter !== 'All') {
            if (state.currentFilter === 'รอติดต่อ') {
                tableFiltered = tableFiltered.filter(l => !l.ContactResult || l.ContactResult === '-' || String(l.ContactResult).trim() === '');
            } else if (state.currentFilter === 'คุณสมบัติไม่ผ่านเกณฑ์') {
                tableFiltered = tableFiltered.filter(l => l.ContactResult && l.ContactResult.includes('ไม่ผ่านเกณฑ์'));
            } else if (state.currentFilter === 'ติดต่อไม่ได้') {
                tableFiltered = tableFiltered.filter(l => l.ContactStatus === 'ติดต่อไม่ได้' || (state.initialDropdowns?.ContactResult_Fail || []).includes(l.ContactResult));
            } else if (state.currentFilter === 'Add Line เรียบร้อย') {
                tableFiltered = tableFiltered.filter(l => l.ContactResult === 'Add Line เรียบร้อย' || l.ContactResult === 'แอดไลน์แล้ว');
            } else {
                tableFiltered = tableFiltered.filter(l => l.ContactResult === state.currentFilter);
            }
        }

        state.filtered = tableFiltered;
        renderLeadsTable(tableFiltered);
    }

    function handleRowClick(event, leadId) {
        if (event.ctrlKey || event.metaKey) {
            event.preventDefault(); 
            editLead(leadId);
        }
    }

    function renderLeadsTable(data) {
        const tbody = document.getElementById('leadsTableBody');
        if(!tbody) return;
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" class="text-center py-5 text-muted"><i class="fa-solid fa-inbox fs-3 mb-2 d-block"></i>ไม่พบข้อมูลผู้สมัครในระบบ</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map((row, index) => {
            const id = row.Lead_ID || row.lead_id || row.leadid;
            const name = row.FullName || row.full_name || row.fullname || '-';
            const phone = row.Phone || row.phone || '-';
            const channel = row.Channel || row.channel || '-';
            const res = row.ContactResult || row.contact_result || row.contactresult || '-';
            const note = row.Notes || row.notes || '-';
            const adminEmail = row.Admin || row.admin_email || row.adminemail || '-';
            
            const matchedAdmin = state.admins.find(a => a.email === adminEmail);
            const adminName = matchedAdmin ? matchedAdmin.name : adminEmail;
            
            const prov = row.Province || row.province || '-';
            const dist = row.District || row.district || '-';

            let resBadge = `<span class="fw-bold text-secondary">${res}</span>`;
            if (res.includes('Add Line') || res.includes('แอดไลน์')) resBadge = `<span class="fw-bold text-success">${res}</span>`;
            else if (res.includes('ไม่รับ') || res.includes('ไม่ผ่าน')) resBadge = `<span class="fw-bold text-danger">${res}</span>`;
            else if (res.includes('คุยเบื้องต้น')) resBadge = `<span class="fw-bold text-info">${res}</span>`;

            let actionBtn = `<button type="button" class="btn btn-sm btn-outline-secondary rounded-circle shadow-sm" title="แก้ไขข้อมูล" onclick="editLead('${id}')"><i class="fa-solid fa-pen"></i></button>`;
            
            actionBtn += ` <button type="button" class="btn btn-sm btn-outline-info rounded-pill ms-1 shadow-sm px-3 fw-bold" title="ประวัติการติดต่อ" onclick="viewLogs('${id}')"><i class="fa-solid fa-clock-rotate-left me-1"></i> ประวัติ</button>`;
            actionBtn += ` <button type="button" class="btn btn-sm btn-outline-danger rounded-circle ms-1 shadow-sm" title="ลบข้อมูล" onclick="deleteLead('${id}')"><i class="fa-solid fa-trash"></i></button>`;
            
            if ((res === 'Add Line เรียบร้อย' || res === 'แอดไลน์แล้ว') && !row.P_Value) {
                actionBtn += ` <br><button class="btn btn-sm btn-success mt-1 shadow-sm w-100 fw-bold mt-1" onclick="openAssessment('${id}')"><i class="fa-brands fa-line"></i> ประเมิน P</button>`;
            }

            const beneatIcon = `<svg width="16" height="16" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="me-1"><path d="M50 5C25.1 5 5 25.1 5 50c0 10.4 3.6 20 9.6 27.6L10 95l18.4-4.8c7 3.1 14.8 4.8 23.1 4.8 24.9 0 45-20.1 45-45S74.9 5 50 5z" fill="#3bc2d6"/><text x="48" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="50" fill="#FFFFFF" text-anchor="middle" transform="rotate(-8 50 50)">B</text></svg>`;
            const chatLinkBtn = row.ChatLink ? `<a href="${row.ChatLink}" target="_blank" class="btn btn-sm btn-light border text-primary fw-bold px-2 py-0 mt-1 d-inline-flex align-items-center" onclick="event.stopPropagation()">${beneatIcon} แชท</a>` : '<div class="text-muted small mt-1">-</div>';
            
            const encodedNote = encodeURIComponent(note);
            const ageDisplay = row.Age ? ` <span class="badge bg-light text-secondary border ms-1 fw-normal" style="font-size: 0.75rem;">อายุ ${row.Age} ปี</span>` : '';

            return `
            <tr onclick="handleRowClick(event, '${id}')" style="cursor: pointer;" title="Ctrl + Click เพื่อแก้ไข">
                <td class="text-center text-muted fw-bold">${index+1}</td>
                <td class="small text-muted">${row.RecordDate || '-'}</td>
                <td>
                    <div class="fw-bold text-dark">${name}</div>
                    <small class="text-muted">${row.JobType || '-'}</small>
                </td>
                <td><i class="fa-solid fa-phone text-success small me-1"></i>${phone}</td>
                <td><span class="badge bg-light text-dark border">${channel}</span></td>
                <td>
                    <div class="text-dark small">${prov}</div>
                    <div class="text-muted small" style="font-size: 0.7rem;">${dist}</div>
                </td>
                <td>${resBadge}</td>
                <td onclick="showFullNote(event, '${encodedNote}')"><div class="text-truncate text-muted small bg-light p-1 rounded border" style="max-width: 140px; cursor: pointer;" title="${note}">${note}</div></td>
                <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25"><i class="fa-solid fa-user me-1"></i>${adminName}</span></td>
                <td class="text-center" onclick="event.stopPropagation()">${actionBtn}</td>
            </tr>`;
        }).join('');
    }

    // ==========================================
    // 📝 2. ฟังก์ชันจัดการฟอร์ม (Add / Edit / Delete)
    // ==========================================

    function updateContactResultOptions(selectedValue = '') {
        const statusEl = document.getElementById('contactStatus');
        const resultEl = document.getElementById('contactResultSelect');
        if (!statusEl || !resultEl) return;
        
        const status = statusEl.value;
        resultEl.innerHTML = '<option value="" selected>-- เลือกผลการติดต่อ --</option>';
        
        let filteredResults = [];
        
        if (status === 'ติดต่อได้') {
            filteredResults = state.initialDropdowns?.ContactResult_Success || [];
        } else if (status === 'ติดต่อไม่ได้') {
            filteredResults = state.initialDropdowns?.ContactResult_Fail || [];
        } else {
            // ถ้ารอติดต่อ หรือยังไม่เลือก ให้เอามาโชว์รวมกันทั้งหมด
            filteredResults = [
                ...(state.initialDropdowns?.ContactResult_Success || []),
                ...(state.initialDropdowns?.ContactResult_Fail || [])
            ];
        }

        filteredResults.forEach(item => {
            resultEl.add(new Option(item, item));
        });

        if (selectedValue && filteredResults.includes(selectedValue)) {
            resultEl.value = selectedValue;
        } else if (selectedValue) {
            resultEl.add(new Option(selectedValue, selectedValue));
            resultEl.value = selectedValue;
        }
        
        // ตรวจสอบเพื่อเปิด/ปิดช่องกรอกสาเหตุทันทีที่โหลดตัวเลือกเสร็จ
        toggleDisqualifiedNote(resultEl.value);
    }

    function toggleDisqualifiedNote(resultValue = '') {
        const container = document.getElementById('disqualifiedContainer');
        const disqInput = document.getElementById('disqualifiedNote');
        
        if (!container || !disqInput) return;
        
        // เช็คว่าค่าปัจจุบันใน Dropdown มีคำว่า "ไม่ผ่านเกณฑ์" หรือไม่
        if (resultValue && resultValue.includes('ไม่ผ่านเกณฑ์')) {
            container.style.display = 'block';
            disqInput.required = true;
        } else {
            container.style.display = 'none';
            disqInput.required = false;
            disqInput.value = '';
        }
    }

    window.appendDisqTag = function(element) {
        const tagText = element.innerText;
        const input = document.getElementById('disqualifiedNote');
        if (input) {
            input.value = input.value ? input.value + ' ' + tagText : tagText;
            input.focus();
        }
    };

    function loadQuickTagsForDisqualified() {
        const container = document.getElementById('disqualifiedTagsContainer');
        if (container && state.initialDropdowns?.QuickTags) {
            container.innerHTML = state.initialDropdowns.QuickTags.map(tag => 
                `<span class="badge bg-light text-secondary border p-2" style="cursor:pointer; font-size: 0.75rem;" onclick="appendDisqTag(this)">${tag}</span>`
            ).join('');
        }
    }

    function openAddLeadModal() {
        resetLeadForm(); 
        bootstrap.Modal.getOrCreateInstance(document.getElementById('addLeadModal')).show();
    }

    function editLead(id) {
        const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === id);
        if(!lead) return;
        
        resetLeadForm(); 
        
        const form = document.getElementById('addLeadForm');
        document.getElementById('actionLeadId').value = id;
        document.getElementById('leadModalTitle').innerHTML = `<i class="fa-solid fa-user-pen me-2 text-primary"></i>แก้ไขข้อมูล: <span class="text-muted fs-6">${id}</span>`;

        if(form.elements['fullName']) form.elements['fullName'].value = lead.FullName || lead.full_name || lead.fullname || '';
        if(form.elements['phone']) form.elements['phone'].value = lead.Phone || lead.phone || '';
        if(form.elements['channel']) form.elements['channel'].value = lead.Channel || lead.channel || '';
        
        const jobVal = lead.JobType || lead.job_type || lead.jobtype || 'แม่บ้าน';
        if (form.elements['jobType']) {
            Array.from(form.elements['jobType']).forEach(radio => {
                if (radio.value === jobVal) radio.checked = true;
            });
        }
        
        if(form.elements['contactStatus']) {
            form.elements['contactStatus'].value = lead.ContactStatus || lead.contact_status || lead.contactstatus || '';
            updateContactResultOptions(lead.ContactResult || lead.contact_result || lead.contactresult || '');
        }
        
        if(form.elements['province']) {
            const provVal = lead.Province || lead.province || '';
            form.elements['province'].value = provVal;
            if(typeof provinceSelectControl !== 'undefined' && provinceSelectControl) {
                provinceSelectControl.setValue(provVal, true);
            }
            populateDistrict(provVal, lead.District || lead.district || '');
        }

        if(form.elements['age']) form.elements['age'].value = lead.Age || lead.age || '';
        if(form.elements['startWithin']) form.elements['startWithin'].value = lead.StartWithin || lead.start_within || lead.startwithin || '';
        if(form.elements['chatLink']) form.elements['chatLink'].value = lead.ChatLink || lead.chat_link || lead.chatlink || '';
        
        const isAppVal = lead.IsApplicant || lead.is_applicant || lead.isapplicant || 'ไม่มี';
        if (form.elements['isApplicant']) {
            Array.from(form.elements['isApplicant']).forEach(radio => {
                if (radio.value === isAppVal) radio.checked = true;
            });
        }

        // โหลดโน้ตมาแยกโชว์
        let fullNote = lead.Notes || lead.notes || '';
        const disqMarker = "\n[ไม่ผ่านเกณฑ์]: ";
        if (fullNote.includes(disqMarker)) {
            const parts = fullNote.split(disqMarker);
            document.getElementById('notes').value = parts[0] || '';
            document.getElementById('disqualifiedNote').value = parts[1] || '';
        } else {
            document.getElementById('notes').value = fullNote;
            document.getElementById('disqualifiedNote').value = '';
        }

        if(typeof flatpickr !== 'undefined') {
            flatpickr("#recordDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(lead.RecordDate || lead.record_date || lead.recorddate) || new Date() });
        }

        bootstrap.Modal.getOrCreateInstance(document.getElementById('addLeadModal')).show();
    }

    function resetLeadForm() {
        const f = document.getElementById('addLeadForm');
        if (f) f.reset();
        const actionLeadId = document.getElementById('actionLeadId');
        if (actionLeadId) actionLeadId.value = '';
        const modalTitle = document.getElementById('leadModalTitle');
        if (modalTitle) modalTitle.innerHTML = '<i class="fa-solid fa-user-plus me-2 text-primary"></i>เพิ่มผู้สมัครใหม่';
        if(typeof provinceSelectControl !== 'undefined' && provinceSelectControl) provinceSelectControl.clear(true);
        if(typeof districtSelectControl !== 'undefined' && districtSelectControl) districtSelectControl.clear(true);
        
        const recordDateInput = document.getElementById('recordDate');
        if(recordDateInput && recordDateInput._flatpickr) recordDateInput._flatpickr.setDate(new Date());

        updateContactResultOptions();
        document.getElementById('disqualifiedNote').value = '';
        toggleDisqualifiedNote('');
        loadQuickTagsForDisqualified();
    }

    async function deleteLead(id) {
        Swal.fire({ 
            title: 'ยืนยันการลบ?', 
            text: `คุณต้องการลบข้อมูลผู้สมัครรหัส ${id} ใช่หรือไม่? ข้อมูลนี้จะไม่สามารถกู้คืนได้`, 
            icon: 'warning', 
            showCancelButton: true, 
            confirmButtonColor: '#ef4444', 
            confirmButtonText: 'ลบทิ้ง' 
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let res = await supabase.from('db_leads').delete().eq('lead_id', id);
                    if(res.error) res = await supabase.from('db_leads').delete().eq('Lead_ID', id);
                    if(res.error) res = await supabase.from('db_leads').delete().eq('leadid', id);
                    
                    await writeLogToSupabase('DELETE_LEAD', 'Leads', `ลบข้อมูลผู้สมัคร: ${id}`);
                    Swal.fire('ลบสำเร็จ!', '', 'success'); 
                    await loadInitialDataFromSupabase();
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            }
        });
    }

    // ==========================================
    // 🧲 3. Form Submit Logic & "Bulletproof" Modal Closing
    // ==========================================
    
    function forceCloseModalAndCleanup(modalId) {
        const modalEl = document.getElementById(modalId);
        if (modalEl) {
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            if (modalInstance) modalInstance.hide();
        }
        
        setTimeout(() => {
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        }, 400);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const btnAddLead = document.getElementById('btnAddLead');
        if(btnAddLead) {
            btnAddLead.addEventListener('click', openAddLeadModal);
        }

        const form = document.getElementById('addLeadForm');
        if(form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const fd = new FormData(this);
                const leadId = fd.get('leadId');
                
                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                try {
                    const { data: sample } = await supabase.from('db_leads').select('*').limit(1);
                    const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                    const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

                    let payload = {};
                    payload[getCol(['record_date', 'recorddate', 'RecordDate'])] = formatDateForDB(fd.get('recordDate'));
                    payload[getCol(['full_name', 'fullname', 'FullName'])] = fd.get('fullName');
                    payload[getCol(['phone', 'Phone'])] = fd.get('phone');
                    payload[getCol(['channel', 'Channel'])] = fd.get('channel');
                    payload[getCol(['job_type', 'jobtype', 'JobType'])] = fd.get('jobType');
                    
                    payload[getCol(['contact_status', 'contactstatus', 'ContactStatus'])] = fd.get('contactStatus');
                    payload[getCol(['contact_result', 'contactresult', 'ContactResult'])] = fd.get('contactResult');
                    
                    payload[getCol(['province', 'Province'])] = fd.get('province');
                    payload[getCol(['district', 'District'])] = fd.get('district');
                    payload[getCol(['age', 'Age'])] = fd.get('age') ? parseInt(fd.get('age')) : null;
                    payload[getCol(['start_within', 'startwithin', 'StartWithin'])] = fd.get('startWithin');
                    payload[getCol(['chat_link', 'chatlink', 'ChatLink'])] = fd.get('chatLink');
                    payload[getCol(['is_applicant', 'isapplicant', 'IsApplicant'])] = fd.get('isApplicant');
                    
                    // 🌟 จัดการโน้ต และ P00 (กรณีไม่ผ่านเกณฑ์) 🌟
                    let finalNote = fd.get('notes') || '';
                    const contactResult = fd.get('contactResult') || '';
                    
                    // เช็คจาก Dropdown ว่ามีคำว่า "ไม่ผ่านเกณฑ์" ไหม
                    const isDisq = contactResult.includes('ไม่ผ่านเกณฑ์'); 
                    
                    if (isDisq) {
                        const disqNote = document.getElementById('disqualifiedNote').value;
                        if (disqNote) {
                            finalNote += `\n[ไม่ผ่านเกณฑ์]: ${disqNote}`;
                        }
                        // ปรับสถานะเป็น P00 ให้อัตโนมัติ
                        payload[getCol(['pvalue', 'p_value', 'P_Value'])] = 'P00';
                    }
                    payload[getCol(['notes', 'Notes'])] = finalNote;

                    payload[getCol(['admin_email', 'adminemail', 'admin', 'Admin_Email'])] = state.currentUser?.email || 'System';

                    if(leadId) {
                        const idCol = getCol(['lead_id', 'leadid', 'Lead_ID']);
                        const { error } = await supabase.from('db_leads').update(payload).eq(idCol, leadId);
                        if(error) throw error;
                        await writeLogToSupabase('UPDATE_LEAD', 'Leads', `แก้ไขข้อมูลผู้สมัคร: ${leadId}`);
                    } else {
                        const newId = "LD-" + new Date().getTime().toString().substring(5);
                        payload[getCol(['lead_id', 'leadid', 'Lead_ID'])] = newId;
                        const { error } = await supabase.from('db_leads').insert([payload]);
                        if(error) throw error;
                        await writeLogToSupabase('CREATE_LEAD', 'Leads', `เพิ่มผู้สมัครใหม่: ${newId}`);
                    }

                    forceCloseModalAndCleanup('addLeadModal');
                    resetLeadForm();

                    if (isDisq) {
                        Swal.fire({ 
                            icon: 'success', 
                            title: 'บันทึกเป็น P00 สำเร็จ!', 
                            text: 'ระบบกำลังพาไปยังหน้าประเมิน P-Value...', 
                            timer: 2000, 
                            showConfirmButton: false 
                        }).then(() => {
                            if (typeof switchMenu === 'function') switchMenu('pvalue');
                        });
                    } else {
                        Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกข้อมูลเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                    }
                    
                    await loadInitialDataFromSupabase();

                } catch(err) {
                    Swal.fire('เกิดข้อผิดพลาดในการบันทึก', err.message, 'error');
                }
            });
        }
    });

    // ==========================================
    // 🕒 4. ดูประวัติ (History Log)
    // ==========================================
    
    async function viewLogs(leadId) {
        Swal.fire({ title: 'กำลังโหลดประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const detCol = ['details', 'Details'].find(k => dbKeys.includes(k)) || 'details';

            const { data, error } = await supabase.from('db_logs').select('*').ilike(detCol, `%${leadId}%`);
            if (error) throw error;

            let html = '<div class="text-start mt-3" style="max-height: 400px; overflow-y: auto; padding: 10px 10px 10px 20px;">';
            if(!data || data.length === 0) {
                html += '<div class="text-center text-muted py-4">ไม่มีประวัติการทำรายการ</div>';
            } else {
                data.sort((a,b) => new Date(b.created_at || b.timestamp || b.Timestamp) - new Date(a.created_at || a.timestamp || a.Timestamp)).forEach(log => {
                    const d = new Date(log.created_at || log.timestamp || log.Timestamp);
                    const ts = isNaN(d) ? '-' : `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    
                    const actionText = log.action || log.Action || '-';
                    const detailText = log.details || log.Details || '-';
                    const emailText = log.useremail || log.user_email || log.UserEmail || 'System';
                    
                    html += `
                    <div class="border-start border-primary border-3 ps-3 mb-4 position-relative">
                        <div class="position-absolute top-0 start-0 translate-middle bg-primary rounded-circle" style="width: 14px; height: 14px;"></div>
                        <div class="fw-bold text-dark mb-1 fs-6">${actionText}</div>
                        <div class="text-muted small mb-2"><i class="fa-regular fa-clock me-1"></i> ${ts}</div>
                        <div class="bg-light p-3 rounded small text-secondary border shadow-sm">${detailText.replace(/\n/g, '<br>')}</div>
                        <div class="mt-2 small fw-bold text-primary"><i class="fa-solid fa-user-pen me-1"></i> โดย: ${emailText}</div>
                    </div>`;
                });
            }
            html += '</div>';

            Swal.fire({ 
                title: `<div class="fs-5"><i class="fa-solid fa-clock-rotate-left text-info me-2"></i>ประวัติการทำงาน</div><div class="fs-6 text-muted mt-1">${leadId}</div>`, 
                html: html, 
                width: 600,
                confirmButtonText: 'ปิดหน้าต่าง', 
                confirmButtonColor: '#64748b' 
            });
        } catch(err) { Swal.fire('Error', err.message, 'error'); }
    }
</script>
