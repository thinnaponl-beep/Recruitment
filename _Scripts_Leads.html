<script>
    // ==========================================
    // ⭐ 0. Helper: ระบบบันทึก Log อัจฉริยะ 
    // ==========================================
    async function writeLogToSupabase(action, module, details) {
        const userEmail = state.currentUser?.email || 'System';
        const logId = "LOG-" + new Date().getTime(); 
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const tsStr = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes + ':' + seconds; 

        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

            let payload = {};
            payload[getCol(['logid', 'log_id', 'Log_ID', 'id'])] = logId;
            payload[getCol(['useremail', 'user_email', 'UserEmail', 'email'])] = userEmail;
            payload[getCol(['action', 'Action'])] = action;
            payload[getCol(['module', 'Module'])] = module;
            payload[getCol(['details', 'Details'])] = details;

            const tsCol = getCol(['timestamp', 'Timestamp', 'created_at', 'createdat']);
            if (dbKeys.includes(tsCol) || dbKeys.length === 0) { 
                payload[tsCol] = tsStr;
            }

            await supabase.from('db_logs').insert([payload]);
        } catch(e) { 
            console.error("Log error (ignored):", e); 
        }
    }

    // 🌟 ใหม่: ฟังก์ชันอัปเดตข้อมูลแบบเงียบ (Silent Reload) เพื่อไม่ให้โหลดซ้อนกัน
    async function silentReloadLeads() {
        try {
            // 🌟 1. ดึงข้อมูล (ทะลุ Limit 1000 แถวด้วย While Loop) 🌟
            let allLeads = [];
            let from = 0;
            const limit = 1000;
            let hasMore = true;

            while (hasMore) {
                const { data, error } = await supabase
                    .from('db_leads')
                    .select('*')
                    .order('created_at', { ascending: false }) // ดึงของใหม่ล่าสุดมาก่อน
                    .range(from, from + limit - 1);
                    
                if (error) {
                    console.error("Supabase fetch error:", error);
                    break;
                }

                if (data && data.length > 0) {
                    allLeads = allLeads.concat(data);
                    from += limit;
                    if (data.length < limit) hasMore = false;
                } else {
                    hasMore = false;
                }
            }

            state.leads = (allLeads || []).map(row => ({
                Lead_ID: row.Lead_ID || row.lead_id || row.leadid,
                RecordDate: formatDateForDisplay(row.RecordDate || row.record_date || row.recorddate),
                FullName: row.FullName || row.full_name || row.fullname,
                Phone: row.Phone || row.phone,
                Channel: row.Channel || row.channel,
                WorkType: row.WorkType || row.work_type || row.worktype,
                JobType: row.JobType || row.job_type || row.jobtype,
                Province: row.Province || row.province,
                District: row.District || row.district,
                Age: row.Age || row.age,
                StartWithin: row.StartWithin || row.start_within || row.startwithin,
                ChatLink: row.ChatLink || row.chat_link || row.chatlink,
                ContactStatus: row.ContactStatus || row.contact_status || row.contactstatus,
                ContactResult: row.ContactResult || row.contact_result || row.contactresult,
                IsApplicant: row.IsApplicant || row.is_applicant || row.isapplicant || (row.is_applicant ? 'มี' : 'ไม่มี'),
                TrainingStatus: row.TrainingStatus || row.training_status || row.trainingstatus,
                P_Value: row.P_Value || row.p_value || row.pvalue,
                Promo: row.Promo || row.promo_id || row.promoid || row.promo,
                Notes: row.Notes || row.notes,
                Admin: row.Admin || row.admin_email || row.adminemail || row.admin,
                Assigned_Admin: row.Assigned_Admin || row.assigned_admin || row.assignedadmin,
                Referrer: row.Referrer || row.referrer,
                BackgroundCheck: row.BackgroundCheck || row.background_check || row.backgroundcheck,
                created_at: row.created_at // 🌟 เก็บค่าไว้ช่วยเรียงในหน้าจอ
            })); 
            
            applyFilters(); // อัปเดตตาราง
        } catch (e) {
            console.error("Silent reload failed:", e);
        }
    }

    // ==========================================
    // 📊 1. ฟังก์ชันแสดงผลหน้า Leads (Dashboard & Table)
    // ==========================================
    
    if (typeof state.currentFilter === 'undefined') state.currentFilter = 'All';
    if (typeof state.leadsSearch === 'undefined') state.leadsSearch = '';
    if (typeof state.leadsChannelFilter === 'undefined') state.leadsChannelFilter = 'All';

    // 🌟 State สำหรับ Pagination หน้า Leads
    if (typeof state.leadsCurrentPage === 'undefined') state.leadsCurrentPage = 1;
    const LEADS_ITEMS_PER_PAGE = 50;
    
    let leadsDateFilterControl = null; // ตัวแปรเก็บ Instance ของ Flatpickr หน้า Leads

    // 🌟 นำ Debounce มาใช้กับช่องค้นหา
    let leadsSearchTimeout;
    function handleLeadsSearch(val) {
        clearTimeout(leadsSearchTimeout);
        leadsSearchTimeout = setTimeout(() => {
            state.leadsSearch = val;
            state.leadsCurrentPage = 1; 
            const clearBtn = document.getElementById('lSearchClearBtn');
            if (clearBtn) {
                if (val) {
                    clearBtn.classList.remove('d-none');
                    clearBtn.style.display = ''; 
                } else {
                    clearBtn.classList.add('d-none');
                }
            }
            applyFilters();
        }, 350); 
    }

    function clearLeadsSearch() {
        state.leadsSearch = '';
        state.leadsCurrentPage = 1;
        const input = document.getElementById('lSearchInput');
        if(input) input.value = '';
        const clearBtn = document.getElementById('lSearchClearBtn');
        if (clearBtn) clearBtn.classList.add('d-none');
        applyFilters();
    }

    function setLeadsChannelFilter(val) {
        state.leadsChannelFilter = val;
        state.leadsCurrentPage = 1;
        applyFilters();
    }

    // 🌟 ฟังก์ชัน Render Dashboard แบบ PRS UI (การ์ด + ตัวกรอง) 🌟
    function renderLeadsDashboard(dataToCount = state.leads) {
        // 1. สร้าง Dropdown ตัวเลือกช่องทาง
        let channelOptionsHtml = '<option value="All">ทั้งหมด</option>';
        if (state.initialDropdowns && state.initialDropdowns.Channel) {
            state.initialDropdowns.Channel.forEach(ch => {
                const selected = state.leadsChannelFilter === ch ? 'selected' : '';
                channelOptionsHtml += '<option value="' + ch + '" ' + selected + '>' + ch + '</option>';
            });
        }

        // 2. คำนวณยอด Card
        const counts = {
            'All': dataToCount.length,
            'รอติดต่อ': dataToCount.filter(l => !l.ContactResult || l.ContactResult === '-' || String(l.ContactResult).trim() === '').length,
            'คุณสมบัติไม่ผ่านเกณฑ์': dataToCount.filter(l => l.ContactResult && l.ContactResult.includes('ไม่ผ่านเกณฑ์')).length,
            'ติดต่อไม่ได้': dataToCount.filter(l => l.ContactStatus === 'ติดต่อไม่ได้' || (state.initialDropdowns?.ContactResult_Fail || []).includes(l.ContactResult)).length,
            'Add Line เรียบร้อย': dataToCount.filter(l => l.ContactResult === 'Add Line เรียบร้อย' || l.ContactResult === 'แอดไลน์แล้ว').length
        };

        const cards = [
            { id: 'All', label: 'เคสทั้งหมด', count: counts['All'], icon: 'fa-solid fa-users', color: 'primary' },
            { id: 'รอติดต่อ', label: 'รอติดต่อ (Raw)', count: counts['รอติดต่อ'], icon: 'fa-solid fa-hourglass-half', color: 'secondary' },
            { id: 'คุณสมบัติไม่ผ่านเกณฑ์', label: 'คุณสมบัติไม่ผ่านเกณฑ์', count: counts['คุณสมบัติไม่ผ่านเกณฑ์'], icon: 'fa-solid fa-user-xmark', color: 'danger' },
            { id: 'ติดต่อไม่ได้', label: 'ติดต่อไม่ได้', count: counts['ติดต่อไม่ได้'], icon: 'fa-solid fa-phone-slash', color: 'warning' },
            { id: 'Add Line เรียบร้อย', label: 'Add Line เรียบร้อย', count: counts['Add Line เรียบร้อย'], icon: 'fa-brands fa-line', color: 'success' }
        ];

        let cardsHtml = '<div class="row g-3 mb-4">';
        cards.forEach(c => {
            const activeClass = state.currentFilter === c.id ? 'active-filter border-2 border-' + c.color : '';
            cardsHtml += '<div class="col-md col-sm-6">' +
                '<div class="card p-card bg-white border-0 shadow-sm h-100 border-start border-4 border-' + c.color + ' ' + activeClass + '" onclick="filterByContactResult(\'' + c.id + '\')" style="cursor:pointer; transition: transform 0.2s;">' +
                    '<div class="card-body p-3 d-flex justify-content-between align-items-center">' +
                        '<div>' +
                            '<div class="text-muted small fw-bold mb-1" style="font-size: 0.75rem;">' + c.label + '</div>' +
                            '<h3 class="fw-bold mb-0 text-dark">' + c.count + '</h3>' +
                        '</div>' +
                        '<div class="bg-' + c.color + ' bg-opacity-10 p-2 rounded-circle text-' + c.color + ' d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">' +
                            '<i class="' + c.icon + ' fs-6"></i>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        });
        cardsHtml += '</div>';

        // 3. 🌟 อัปเกรด Toolbar เป็นสไตล์ Card (PRS Style) พร้อมปุ่ม Export 🌟
        let controlsHtml = '<div class="card border-0 shadow-sm mb-4">' +
            '<div class="card-body p-3">' +
                '<div class="row g-3 align-items-end">' +
                    '<div class="col-md-4">' +
                        '<label class="form-label small text-muted fw-bold">ช่วงวันที่รับสมัคร</label>' +
                        '<div class="input-group">' +
                            '<span class="input-group-text bg-light border-end-0"><i class="far fa-calendar-alt text-primary"></i></span>' +
                            '<input type="text" class="form-control border-start-0 ps-0 shadow-none bg-white" id="dateFilter" placeholder="เลือกช่วงเวลา..." readonly>' +
                            '<button class="btn btn-light border-start-0 text-primary fw-bold" type="button" onclick="setLeadsDateToToday()" title="วันนี้">วันนี้</button>' +
                            '<button class="btn btn-light border-start-0 text-muted" type="button" onclick="clearDateFilter()" title="ล้างค่า"><i class="fas fa-times"></i></button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="col-md-2">' +
                        '<label class="form-label small text-muted fw-bold">ช่องทาง</label>' +
                        '<select id="lChannelFilter" class="form-select shadow-none" onchange="setLeadsChannelFilter(this.value)">' +
                            channelOptionsHtml +
                        '</select>' +
                    '</div>' +
                    '<div class="col-md-4">' +
                        '<label class="form-label small text-muted fw-bold">ค้นหา</label>' +
                        '<div class="input-group">' +
                            '<span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>' +
                            '<input type="text" id="lSearchInput" class="form-control border-start-0 ps-0 shadow-none" placeholder="ค้นหาชื่อ, เบอร์โทร..." value="' + state.leadsSearch + '" oninput="handleLeadsSearch(this.value)">' +
                            '<button id="lSearchClearBtn" class="btn btn-white border-top border-bottom border-end text-muted shadow-none" style="display: ' + (state.leadsSearch ? 'block' : 'none') + ';" onclick="clearLeadsSearch()"><i class="fa-solid fa-xmark"></i></button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="col-md-2 text-end d-flex gap-2 justify-content-end align-items-end">' +
                        '<button class="btn btn-soft-success w-100 rounded-pill fw-bold shadow-sm" onclick="exportLeadsReport()">' +
                            '<i class="fas fa-file-excel me-1"></i> Export' +
                        '</button>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>';

        // นำไปใส่ใน DOM
        const container = document.getElementById('pValueCards') || document.getElementById('leadsCards'); 
        if(container) {
            // 🌟 แยกโซน Cards และ Toolbar ออกจากกัน เพื่อป้องกัน Input เสีย Focus ขณะพิมพ์ 🌟
            let cardsDiv = document.getElementById('lCardsDiv');
            let toolsDiv = document.getElementById('lToolsDiv');
            
            if (!cardsDiv || !toolsDiv) {
                container.innerHTML = '<div id="lCardsDiv"></div><div id="lToolsDiv"></div>';
                cardsDiv = document.getElementById('lCardsDiv');
                toolsDiv = document.getElementById('lToolsDiv');
            }
            
            // อัปเดตเฉพาะการ์ดตัวเลขเสมอ
            cardsDiv.innerHTML = cardsHtml;
            
            // 🌟 อัปเดตเครื่องมือค้นหาและวันที่ "เพียงครั้งแรก" หรือเมื่อกล่องมันว่าง เพื่อไม่ให้ทำลาย Focus ที่ผู้ใช้กำลังพิมพ์ 🌟
            if (toolsDiv.innerHTML.trim() === '') {
                toolsDiv.innerHTML = controlsHtml;

                // 🌟 Initialize Flatpickr 🌟
                if (typeof flatpickr !== 'undefined') {
                    const el = document.getElementById('dateFilter');
                    if (el) {
                        if (leadsDateFilterControl) {
                            leadsDateFilterControl.destroy();
                        }
                        
                        let defaultDates = null;
                        if (state.dateRange && state.dateRange.start && state.dateRange.end) {
                            defaultDates = [state.dateRange.start, state.dateRange.end];
                        }

                        leadsDateFilterControl = flatpickr(el, {
                            locale: "th",
                            mode: "range",
                            dateFormat: "d/m/Y",
                            defaultDate: defaultDates,
                            onChange: function(selectedDates) {
                                if (selectedDates.length === 2) {
                                    const start = selectedDates[0]; start.setHours(0,0,0,0);
                                    const end = selectedDates[1]; end.setHours(23,59,59,999);
                                    state.dateRange = { start, end };
                                    state.leadsCurrentPage = 1;
                                    applyFilters();
                                } else if (selectedDates.length === 0) {
                                    state.dateRange = { start: null, end: null };
                                    state.leadsCurrentPage = 1;
                                    applyFilters();
                                }
                            }
                        });
                    }
                }
            }
        }
    }

    // 🌟 ฟังก์ชัน Export Leads เป็น Excel/CSV 🌟
    window.exportLeadsReport = function() {
        // ใช้ข้อมูลที่ผ่านการกรอง (Filter) แล้ว
        const exportData = state.filtered;

        if (!exportData || exportData.length === 0) {
            Swal.fire('ไม่พบข้อมูล', 'ไม่มีข้อมูลสำหรับช่วงเวลาหรือเงื่อนไขที่เลือก', 'info');
            return;
        }

        // สร้างข้อมูลสำหรับ Excel (Array of Arrays)
        let excelData = [
            ["รหัส", "วันที่ลงทะเบียน", "ชื่อ-นามสกุล", "เบอร์โทร", "ช่องทาง", "รูปแบบงาน", "จังหวัด", "เขต/อำเภอ", "ประเภทงาน", "สถานะติดต่อ", "ผลการติดต่อ", "P-Value", "ผู้รับผิดชอบ", "หมายเหตุ"]
        ];
        
        exportData.forEach(row => {
            const leadId = row.Lead_ID || row.lead_id || row.leadid || '';
            const rDate = row.RecordDate || row.record_date || row.recorddate || '';
            const name = row.FullName || row.full_name || row.fullname || '';
            const phone = row.Phone || row.phone || '';
            const channel = row.Channel || row.channel || '';
            const workType = row.WorkType || row.work_type || row.worktype || ''; // 🌟 ส่งออกรูปแบบงาน (ยังมีในฐานข้อมูล)
            const prov = row.Province || row.province || '';
            const dist = row.District || row.district || '';
            const jobType = row.JobType || row.job_type || row.jobtype || '';
            const cStatus = row.ContactStatus || row.contact_status || row.contactstatus || '';
            const cRes = row.ContactResult || row.contact_result || row.contactresult || '';
            const pVal = row.P_Value || row.p_value || row.pvalue || '';
            
            const adminEmail = row.Admin || row.admin_email || row.adminemail || '-';
            const matchedAdmin = state.admins?.find(a => a.email === adminEmail);
            const adminName = matchedAdmin ? matchedAdmin.name : adminEmail;

            const note = row.Notes || row.notes || '';

            excelData.push([
                leadId, rDate, name, phone, channel, workType, prov, dist, jobType, cStatus, cRes, pVal, adminName, note
            ]);
        });

        const timestamp = new Date().toISOString().slice(0,10);

        // ตรวจสอบว่ามีไลบรารี XLSX (SheetJS) หรือไม่ ถ้ามีให้โหลดเป็น .xlsx
        if (typeof XLSX !== 'undefined') {
            const ws = XLSX.utils.aoa_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Leads_Report");
            XLSX.writeFile(wb, "Leads_Report_" + timestamp + ".xlsx");
        } else {
            // Fallback เป็น CSV กรณีไม่ได้ติดตั้ง XLSX (ปลอดภัยจาก SyntaxError 100%)
            let csvContent = "";
            excelData.forEach(row => {
                const rowStr = row.map(f => '"' + String(f || "").replace(/"/g, '""').replace(/[\r\n]+/g, ' ') + '"').join(",");
                csvContent += rowStr + "\n";
            });
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const downloadUrl = URL.createObjectURL(blob);
            const aLink = document.createElement("a");
            
            // ใช้วิธี setAttribute เพื่อหลีกเลี่ยง Syntax Error ในระบบประมวลผลที่เข้มงวด
            aLink.setAttribute("href", downloadUrl);
            aLink.setAttribute("download", "Leads_Report_" + timestamp + ".csv");
            document.body.appendChild(aLink);
            aLink.click();
            document.body.removeChild(aLink);
        }
    };

    // 🌟 เพิ่มฟังก์ชันปุ่ม "วันนี้" 🌟
    function setLeadsDateToToday() {
        if (leadsDateFilterControl) {
            const today = new Date();
            leadsDateFilterControl.setDate([today, today]); 
            
            const start = new Date(today);
            start.setHours(0,0,0,0);
            const end = new Date(today);
            end.setHours(23,59,59,999);
            
            state.dateRange = { start: start, end: end };
            state.leadsCurrentPage = 1;
            applyFilters();
        }
    }

    function clearDateFilter() {
        if(leadsDateFilterControl) {
            leadsDateFilterControl.clear();
        } else {
            const dateInput = document.getElementById('dateFilter');
            if (dateInput && dateInput._flatpickr) dateInput._flatpickr.clear();
        }
        // 🌟 บังคับเคลียร์ State วันที่ และโหลดข้อมูลทั้งหมด (รีเซ็ตกลับหน้า 1) 🌟
        state.dateRange = { start: null, end: null };
        state.leadsCurrentPage = 1;
        applyFilters();
    }

    function filterByContactResult(status) {
        state.currentFilter = status;
        state.leadsCurrentPage = 1;
        applyFilters(); 
    }

    function applyFilters() {
        // 🌟 สำรอง Focus ปัจจุบันของช่องค้นหา ป้องกันปัญหาพิมพ์แล้วหลุด
        const searchInput = document.getElementById('lSearchInput');
        const isFocused = searchInput && (document.activeElement === searchInput);
        const cursorPosition = isFocused ? searchInput.selectionStart : null;

        let baseFiltered = [...(state.leads || [])];
        
        // 🌟 บังคับเรียงลำดับ: ข้อมูลใหม่ล่าสุดต้องอยู่บนสุดเสมอ 🌟
        baseFiltered.sort((a, b) => {
            let dateA = a.created_at ? new Date(a.created_at).getTime() : 0;
            let dateB = b.created_at ? new Date(b.created_at).getTime() : 0;
            
            // ป้องกัน Error กรณี Date Parse ไม่สำเร็จ
            if (isNaN(dateA)) dateA = 0;
            if (isNaN(dateB)) dateB = 0;
            
            // เรียงตามวันที่อัปเดตล่าสุด
            if (dateA !== dateB) {
                return dateB - dateA; 
            }
            
            // 🌟 กรณีสร้างพร้อมกัน (ข้อมูลเก่า) -> เรียงตามวันที่ลงทะเบียน (RecordDate)
            const parseRDate = (rd) => {
                if(!rd) return 0;
                if(rd.includes('/')) {
                    const p = rd.split('/');
                    return new Date(p[2], p[1]-1, p[0]).getTime();
                }
                let parsed = new Date(rd).getTime();
                return isNaN(parsed) ? 0 : parsed;
            };
            
            let rDateA = parseRDate(a.RecordDate || a.record_date || a.recorddate);
            let rDateB = parseRDate(b.RecordDate || b.record_date || b.recorddate);
            
            if (rDateA !== rDateB) {
                return rDateB - rDateA;
            }
            
            // 🌟 หากวันที่รับสมัครเท่ากันอีก ให้เรียงตามตัวเลขใน Lead_ID ถอยหลัง 🌟
            let strA = String(a.Lead_ID || a.lead_id || a.leadid || '');
            let strB = String(b.Lead_ID || b.lead_id || b.leadid || '');
            
            let numA = parseInt(strA.replace(/\D/g, '')) || 0;
            let numB = parseInt(strB.replace(/\D/g, '')) || 0;
            
            if (numA !== numB) {
                return numB - numA; 
            }
            
            return strB.localeCompare(strA);
        });
        
        if(state.dateRange && state.dateRange.start && state.dateRange.end) {
            baseFiltered = baseFiltered.filter(l => {
                const rDate = l.RecordDate || l.record_date || l.recorddate;
                if(!rDate) return false;
                
                let rowDate;
                if(rDate.includes('/')) {
                    const parts = rDate.split('/');
                    rowDate = new Date(parts[2], parts[1]-1, parts[0]);
                } else {
                    rowDate = new Date(rDate);
                }
                
                if(isNaN(rowDate.getTime())) return false;
                rowDate.setHours(0,0,0,0);
                
                return rowDate >= state.dateRange.start && rowDate <= state.dateRange.end;
            });
        }

        if (state.leadsChannelFilter !== 'All') {
            baseFiltered = baseFiltered.filter(l => l.Channel === state.leadsChannelFilter);
        }

        if (state.leadsSearch.trim() !== '') {
            const query = state.leadsSearch.toLowerCase().trim();
            baseFiltered = baseFiltered.filter(l => {
                // 🌟 บังคับแปลงข้อมูลเป็น String เสมอ เพื่อป้องกัน Error กรณีเป็นตัวเลข
                const name = String(l.FullName || l.full_name || l.fullname || '').toLowerCase();
                const phone = String(l.Phone || l.phone || '').toLowerCase();
                const notes = String(l.Notes || l.notes || '').toLowerCase();
                
                return name.includes(query) || phone.includes(query) || notes.includes(query);
            });
        }

        renderLeadsDashboard(baseFiltered); // 🌟 ย้ายมาเรียกตรงนี้ให้ Dashboard อัปเดตตัวเลขตลอดเวลา

        let tableFiltered = baseFiltered;
        
        // 🌟 เปลี่ยนเกณฑ์การกรอง Table 🌟
        if (state.currentFilter !== 'All') {
            if (state.currentFilter === 'รอติดต่อ') {
                tableFiltered = tableFiltered.filter(l => !l.ContactResult || l.ContactResult === '-' || String(l.ContactResult).trim() === '');
            } else if (state.currentFilter === 'คุณสมบัติไม่ผ่านเกณฑ์') {
                tableFiltered = tableFiltered.filter(l => l.ContactResult && l.ContactResult.includes('ไม่ผ่านเกณฑ์'));
            } else if (state.currentFilter === 'ติดต่อไม่ได้') {
                tableFiltered = tableFiltered.filter(l => l.ContactStatus === 'ติดต่อไม่ได้' || (state.initialDropdowns?.ContactResult_Fail || []).includes(l.ContactResult)).length;
            } else if (state.currentFilter === 'Add Line เรียบร้อย') {
                tableFiltered = tableFiltered.filter(l => l.ContactResult === 'Add Line เรียบร้อย' || l.ContactResult === 'แอดไลน์แล้ว');
            } else {
                tableFiltered = tableFiltered.filter(l => l.ContactResult === state.currentFilter);
            }
        }

        state.filtered = tableFiltered;
        renderLeadsTable(tableFiltered);

        // 🌟 คืนค่า Focus กลับไปที่กล่องค้นหาตามเดิม (ถ้ากำลังพิมพ์อยู่)
        if (isFocused) {
            const newInput = document.getElementById('lSearchInput');
            if (newInput) {
                newInput.focus();
                try { newInput.setSelectionRange(cursorPosition, cursorPosition); } catch(e) {}
            }
        }
    }

        if (state.leadsCurrentPage > totalPages) state.leadsCurrentPage = totalPages;

        const startIndex = (state.leadsCurrentPage - 1) * LEADS_ITEMS_PER_PAGE;
        const endIndex = startIndex + LEADS_ITEMS_PER_PAGE;
        const paginatedData = data.slice(startIndex, endIndex);

        if(paginatedData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center py-5 text-muted"><i class="fa-solid fa-inbox fs-3 mb-2 d-block"></i>ไม่พบข้อมูลผู้สมัครในระบบ</td></tr>';

            if (res.includes('Add Line') || res.includes('แอดไลน์')) resBadge = '<span class="fw-bold text-success">' + res + '</span>';
            else if (res.includes('ไม่รับ') || res.includes('ไม่ผ่าน')) resBadge = '<span class="fw-bold text-danger">' + res + '</span>';
            else if (res.includes('คุยเบื้องต้น')) resBadge = '<span class="fw-bold text-info">' + res + '</span>';

    function renderLeadsPagination(totalItems, totalPages, startIndex, endIndex) {
        const tableContainer = document.querySelector('#leadsTableBody').closest('.table-responsive');
        if (!tableContainer) return;

        let paginationDiv = document.getElementById('leadsPaginationFooter');
        if (!paginationDiv) {
            paginationDiv = document.createElement('div');
            paginationDiv.id = 'leadsPaginationFooter';
            paginationDiv.className = 'd-flex justify-content-between align-items-center p-3 border-top bg-white';
            tableContainer.parentNode.insertBefore(paginationDiv, tableContainer.nextSibling);
        }

        const showingEnd = Math.min(endIndex, totalItems);
        const showingStart = totalItems === 0 ? 0 : startIndex + 1;

        // 🌟 แก้ไข: ใช้ปุ่ม <button> แทนการใช้ <a href="#"> ป้องกันบั๊ก Identifier 'href' 🌟
        paginationDiv.innerHTML = '<div class="small text-muted fw-bold">' +
                'แสดง <span class="text-dark">' + showingStart + ' - ' + showingEnd + '</span> จากทั้งหมด <span class="text-primary">' + totalItems + '</span> รายการ' +
            '</div>' +
            '<nav aria-label="Page navigation">' +
                '<ul class="pagination pagination-sm mb-0 shadow-sm">' +
                    '<li class="page-item ' + (state.leadsCurrentPage <= 1 ? 'disabled' : '') + '">' +
                        '<button class="page-link text-dark fw-bold border-0 bg-transparent" onclick="changeLeadsPage(' + (state.leadsCurrentPage - 1) + ', event)">ก่อนหน้า</button>' +
                    '</li>' +
                    '<li class="page-item active">' +
                        '<span class="page-link bg-primary border-primary fw-bold px-3">หน้า ' + state.leadsCurrentPage + ' / ' + totalPages + '</span>' +
                    '</li>' +
                    '<li class="page-item ' + (state.leadsCurrentPage >= totalPages ? 'disabled' : '') + '">' +
                        '<button class="page-link text-dark fw-bold border-0 bg-transparent" onclick="changeLeadsPage(' + (state.leadsCurrentPage + 1) + ', event)">ถัดไป</button>' +

    function updateContactResultOptions(selectedValue = '') {
        const statusEl = document.getElementById('contactStatus');
        const resultEl = document.getElementById('contactResultSelect');
        if (!statusEl || !resultEl) return;
        
        const status = statusEl.value;
        resultEl.innerHTML = '<option value="" selected>-- เลือกผลการติดต่อ --</option>';
        
        let filteredResults = [];
        
        if (status === 'ติดต่อได้') {
            filteredResults = state.initialDropdowns?.ContactResult_Success || [];
        } else if (status === 'ติดต่อไม่ได้') {
            filteredResults = state.initialDropdowns?.ContactResult_Fail || [];
        } else {
            // ถ้ารอติดต่อ หรือยังไม่เลือก ให้เอามาโชว์รวมกันทั้งหมด
            filteredResults = [
                ...(state.initialDropdowns?.ContactResult_Success || []),
                ...(state.initialDropdowns?.ContactResult_Fail || [])
            ];
        }

        filteredResults.forEach(item => {
            resultEl.add(new Option(item, item));
        });

        if (selectedValue && filteredResults.includes(selectedValue)) {
            resultEl.value = selectedValue;
        } else if (selectedValue) {
            resultEl.add(new Option(selectedValue, selectedValue));
            resultEl.value = selectedValue;
        }
        
        // ตรวจสอบเพื่อเปิด/ปิดช่องกรอกสาเหตุทันทีที่โหลดตัวเลือกเสร็จ
        toggleDisqualifiedNote(resultEl.value);
    }

    function toggleDisqualifiedNote(resultValue = '') {
        const container = document.getElementById('disqualifiedContainer');
        const disqInput = document.getElementById('disqualifiedNote');
        
        if (!container || !disqInput) return;
        
        // เช็คว่าค่าปัจจุบันใน Dropdown มีคำว่า "ไม่ผ่านเกณฑ์" หรือไม่
        if (resultValue && resultValue.includes('ไม่ผ่านเกณฑ์')) {
            container.style.display = 'block';
            disqInput.required = true;
        } else {
            container.style.display = 'none';
            disqInput.required = false;
            disqInput.value = '';
        }
    }

    function editLead(id) {
        const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === id);
        if(!lead) return;
        
        resetLeadForm(); 
        
        const form = document.getElementById('addLeadForm');
        document.getElementById('actionLeadId').value = id;
        document.getElementById('leadModalTitle').innerHTML = '<i class="fa-solid fa-user-pen me-2 text-primary"></i>แก้ไขข้อมูล: <span class="text-muted fs-6">' + id + '</span>';

        if(form.elements['fullName']) form.elements['fullName'].value = lead.FullName || lead.full_name || lead.fullname || '';
        if(form.elements['phone']) form.elements['phone'].value = lead.Phone || lead.phone || '';
        if(form.elements['channel']) form.elements['channel'].value = lead.Channel || lead.channel || '';
        
        const jobVal = lead.JobType || lead.job_type || lead.jobtype || 'แม่บ้าน';
        if (form.elements['jobType']) {
            Array.from(form.elements['jobType']).forEach(radio => {
                if (radio.value === jobVal) radio.checked = true;
            });
        }
        
        if(form.elements['contactStatus']) {
            form.elements['contactStatus'].value = lead.ContactStatus || lead.contact_status || lead.contactstatus || '';
            updateContactResultOptions(lead.ContactResult || lead.contact_result || lead.contactresult || '');
        }
        
        if(form.elements['province']) {
            const provVal = lead.Province || lead.province || '';
            form.elements['province'].value = provVal;
            if(typeof provinceSelectControl !== 'undefined' && provinceSelectControl) {
                provinceSelectControl.setValue(provVal, true);
            }
            populateDistrict(provVal, lead.District || lead.district || '');
        }

        if(form.elements['age']) form.elements['age'].value = lead.Age || lead.age || '';
        if(form.elements['startWithin']) form.elements['startWithin'].value = lead.StartWithin || lead.start_within || lead.startwithin || '';
        if(form.elements['chatLink']) form.elements['chatLink'].value = lead.ChatLink || lead.chat_link || lead.chatlink || '';
        
        const isAppVal = lead.IsApplicant || lead.is_applicant || lead.isapplicant || 'ไม่มี';
        if (form.elements['isApplicant']) {
            Array.from(form.elements['isApplicant']).forEach(radio => {
                if (radio.value === isAppVal) radio.checked = true;
            });
        }

        // โหลดโน้ตมาแยกโชว์
        let fullNote = lead.Notes || lead.notes || '';
        const disqMarker = "\n[ไม่ผ่านเกณฑ์]: ";
        if (fullNote.includes(disqMarker)) {
            const parts = fullNote.split(disqMarker);
            document.getElementById('notes').value = parts[0] || '';
            document.getElementById('disqualifiedNote').value = parts[1] || '';
        } else {
            document.getElementById('notes').value = fullNote;
            document.getElementById('disqualifiedNote').value = '';
        }

        if(typeof flatpickr !== 'undefined') {
            flatpickr("#recordDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(lead.RecordDate || lead.record_date || lead.recorddate) || new Date() });
        }

        bootstrap.Modal.getOrCreateInstance(document.getElementById('addLeadModal')).show();
    }

    function resetLeadForm() {
        const f = document.getElementById('addLeadForm');
        if (f) f.reset();
        const actionLeadId = document.getElementById('actionLeadId');
        if (actionLeadId) actionLeadId.value = '';
        const modalTitle = document.getElementById('leadModalTitle');
        if (modalTitle) modalTitle.innerHTML = '<i class="fa-solid fa-user-plus me-2 text-primary"></i>เพิ่มผู้สมัครใหม่';
        if(typeof provinceSelectControl !== 'undefined' && provinceSelectControl) provinceSelectControl.clear(true);
        if(typeof districtSelectControl !== 'undefined' && districtSelectControl) districtSelectControl.clear(true);
        
        const recordDateInput = document.getElementById('recordDate');
        if(recordDateInput && recordDateInput._flatpickr) recordDateInput._flatpickr.setDate(new Date());

        updateContactResultOptions();
        
        document.getElementById('disqualifiedNote').value = '';
        toggleDisqualifiedNote('');
        loadQuickTagsForDisqualified();
    }

    async function deleteLead(id) {
        Swal.fire({ 
            title: 'ยืนยันการลบ?', 
            text: 'คุณต้องการลบข้อมูลผู้สมัครรหัส ' + id + ' ใช่หรือไม่? ข้อมูลนี้จะไม่สามารถกู้คืนได้', 
            icon: 'warning', 
            showCancelButton: true, 
            confirmButtonColor: '#ef4444', 
            confirmButtonText: 'ลบทิ้ง' 
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let res = await supabase.from('db_leads').delete().eq('lead_id', id);
                    if(res.error) res = await supabase.from('db_leads').delete().eq('Lead_ID', id);
                    if(res.error) res = await supabase.from('db_leads').delete().eq('leadid', id);
                    
                    await writeLogToSupabase('DELETE_LEAD', 'Leads', 'ลบข้อมูลผู้สมัคร: ' + id);
                    
                    // 🌟 อัปเดตข้อมูล State แบบไม่ต้องโหลดใหม่ทั้งระบบ
                    state.leads = state.leads.filter(l => (l.Lead_ID || l.lead_id || l.leadid) !== id);
                    applyFilters();

                    Swal.fire('ลบสำเร็จ!', '', 'success'); 
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            }
        });
    }

    // 🧲 3. Form Submit Logic & "Bulletproof" Modal Closing
    // ==========================================
    
    function forceCloseModalAndCleanup(modalId) {
        const modalEl = document.getElementById(modalId);
        if (modalEl) {
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            if (modalInstance) modalInstance.hide();
        }
        
        setTimeout(() => {
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        }, 400);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const btnAddLead = document.getElementById('btnAddLead');
        if(btnAddLead) {
            btnAddLead.addEventListener('click', openAddLeadModal);
        }

        const form = document.getElementById('addLeadForm');
        
        // 🌟 2. ระบบ Queue และตัวแปรป้องกันการกดบันทึกซ้ำ (Concurrency Control)
        let submissionQueue = Promise.resolve(); 
        let isSubmitting = false; 

        if(form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // ถ้ากำลังเซฟอยู่ ให้บล็อกการกดซ้ำทันที
                if (isSubmitting) return; 
                
                // คัดลอกข้อมูลฟอร์ม ณ ตอนที่กด เพื่อนำไปเข้าคิว
                const fd = new FormData(this);
                const leadId = fd.get('leadId');
                const userEmail = state.currentUser?.email || 'System';

                // นำงานไปต่อคิว (ถ้ามีการยิงข้อมูลพร้อมกัน ระบบจะรันทีละคิวตามลำดับ)
                submissionQueue = submissionQueue.then(async () => {
                    isSubmitting = true;
                    
                    // ล็อคปุ่มบันทึก
                    const btnSubmit = form.querySelector('button[type="submit"]');
                    if (btnSubmit) {
                        btnSubmit.disabled = true;
                        btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> กำลังบันทึก...';
                    }

                    Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    try {
                        const { data: sample } = await supabase.from('db_leads').select('*').limit(1);
                        const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                        const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

                        let payload = {};
                        payload[getCol(['record_date', 'recorddate', 'RecordDate'])] = formatDateForDB(fd.get('recordDate'));
                        payload[getCol(['full_name', 'fullname', 'FullName'])] = fd.get('fullName');
                        payload[getCol(['phone', 'Phone'])] = fd.get('phone');
                        payload[getCol(['channel', 'Channel'])] = fd.get('channel');
                        
                        payload[getCol(['job_type', 'jobtype', 'JobType'])] = fd.get('jobType');
                        payload[getCol(['contact_status', 'contactstatus', 'ContactStatus'])] = fd.get('contactStatus');
                        payload[getCol(['contact_result', 'contactresult', 'ContactResult'])] = fd.get('contactResult');
                        payload[getCol(['province', 'Province'])] = fd.get('province');
                        payload[getCol(['district', 'District'])] = fd.get('district');
                        payload[getCol(['age', 'Age'])] = fd.get('age') ? parseInt(fd.get('age')) : null;
                        payload[getCol(['start_within', 'startwithin', 'StartWithin'])] = fd.get('startWithin');
                        payload[getCol(['chat_link', 'chatlink', 'ChatLink'])] = fd.get('chatLink');
                        payload[getCol(['is_applicant', 'isapplicant', 'IsApplicant'])] = fd.get('isApplicant');
                        
                        let finalNote = fd.get('notes') || '';
                        const contactResult = fd.get('contactResult') || '';
                        const isDisq = contactResult.includes('ไม่ผ่านเกณฑ์'); 
                        
                        if (isDisq) {
                            const disqNote = document.getElementById('disqualifiedNote').value;
                            if (disqNote) {
                                finalNote += '\n[ไม่ผ่านเกณฑ์]: ' + disqNote;
                            }
                            payload[getCol(['pvalue', 'p_value', 'P_Value'])] = 'P00';
                        }
                        payload[getCol(['notes', 'Notes'])] = finalNote;

                        const idCol = getCol(['lead_id', 'leadid', 'Lead_ID']);
                        const adminCol = getCol(['admin_email', 'adminemail', 'admin', 'Admin']);
                        const assignedAdminCol = getCol(['assigned_admin', 'assignedadmin', 'Assigned_Admin']);

                        const isQualifiedNow = (contactResult === 'Add Line เรียบร้อย' || contactResult === 'แอดไลน์แล้ว');
                        let shouldClearAssignedAdmin = false;

                        if (leadId) {
                            const oldLead = state.leads.find(l => l.Lead_ID === leadId || l.lead_id === leadId || l.leadid === leadId);
                            const oldResult = oldLead ? (oldLead.ContactResult || oldLead.contact_result || oldLead.contactresult) : '';
                            const wasQualified = (oldResult === 'Add Line เรียบร้อย' || oldResult === 'แอดไลน์แล้ว');
                            
                            if (isQualifiedNow && !wasQualified) {
                                shouldClearAssignedAdmin = true;
                            }
                        } else {
                            if (isQualifiedNow) {
                                shouldClearAssignedAdmin = true;
                            }
                        }

                        if (shouldClearAssignedAdmin && assignedAdminCol) {
                            payload[assignedAdminCol] = ''; 
                        }

                        if(leadId) {
                            const { error } = await supabase.from('db_leads').update(payload).eq(idCol, leadId);
                            if(error) throw error;
                            await writeLogToSupabase('UPDATE_LEAD', 'Leads', 'แก้ไขข้อมูลผู้สมัคร: ' + leadId);
                        } else {
                            // 🌟 ใช้ Timestamp เต็มรูปแบบสำหรับ ID เพื่อป้องกันรหัสซ้ำและการจัดเรียงที่ผิดพลาด
                            const newId = "LD-" + Date.now().toString();
                            payload[idCol] = newId;
                            if (adminCol) payload[adminCol] = userEmail;
                            
                            const { error } = await supabase.from('db_leads').insert([payload]);
                            if(error) throw error;
                            await writeLogToSupabase('CREATE_LEAD', 'Leads', 'เพิ่มผู้สมัครใหม่: ' + newId);
                            
                            // 🌟 หากเพิ่มข้อมูลใหม่ บังคับให้พาผู้ใช้กลับไปหน้า 1 เพื่อดูรายชื่อใหม่บนสุดทันที
                            state.leadsCurrentPage = 1;
                        }

                        forceCloseModalAndCleanup('addLeadModal');
                        resetLeadForm();

                        // โหลดข้อมูลแบบเงียบๆ
                        await silentReloadLeads();

                        if (isDisq) {
                            Swal.fire({ 
                                icon: 'success', 
                                title: 'บันทึกเป็น P00 สำเร็จ!', 
                                text: 'ระบบกำลังพาไปยังหน้าประเมิน P-Value...', 
                                timer: 2000, 
                                showConfirmButton: false 
                            }).then(() => {
                                if (typeof switchMenu === 'function') switchMenu('pvalue');
                            });
                        } else {
                            Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกข้อมูลเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                        }

                    } catch(err) {
                        Swal.fire('เกิดข้อผิดพลาดในการบันทึก', err.message, 'error');
                    } finally {
                        // ปลดล็อคปุ่มและสถานะเมื่อทำงานคิวนี้เสร็จ
                        isSubmitting = false;
                        const btnSubmit = form.querySelector('button[type="submit"]');
                        if (btnSubmit) {
                            btnSubmit.disabled = false;
                            btnSubmit.innerHTML = 'บันทึกข้อมูล';
                        }
                    }
                }).catch(err => {
                    isSubmitting = false;
                    console.error("Queue Error:", err);
                });
            });
        }
    });

    // ==========================================
    // 🕒 4. ดูประวัติ (History Log)
    // ==========================================
    
    async function viewLogs(leadId) {
        Swal.fire({ title: 'กำลังโหลดประวัติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const detCol = ['details', 'Details'].find(k => dbKeys.includes(k)) || 'details';

            const { data, error } = await supabase.from('db_logs').select('*').ilike(detCol, '%' + leadId + '%');
            if (error) throw error;

            let html = '<div class="text-start mt-3" style="max-height: 400px; overflow-y: auto; padding: 10px 10px 10px 20px;">';
            if(!data || data.length === 0) {
                html += '<div class="text-center text-muted py-4">ไม่มีประวัติการทำรายการ</div>';
            } else {
                data.sort((a,b) => new Date(b.created_at || b.timestamp || b.Timestamp) - new Date(a.created_at || a.timestamp || a.Timestamp)).forEach(log => {
                    const d = new Date(log.created_at || log.timestamp || log.Timestamp);
                    const ts = isNaN(d) ? '-' : (String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'));
                    
                    const actionText = log.action || log.Action || '-';
                    const detailText = log.details || log.Details || '-';
                    const emailText = log.useremail || log.user_email || log.UserEmail || 'System';
                    
                    html += '<div class="border-start border-primary border-3 ps-3 mb-4 position-relative">' +
                        '<div class="position-absolute top-0 start-0 translate-middle bg-primary rounded-circle" style="width: 14px; height: 14px;"></div>' +
                        '<div class="fw-bold text-dark mb-1 fs-6">' + actionText + '</div>' +
                        '<div class="text-muted small mb-2"><i class="fa-regular fa-clock me-1"></i> ' + ts + '</div>' +
                        '<div class="bg-light p-3 rounded small text-secondary border shadow-sm">' + detailText.replace(/\n/g, '<br>') + '</div>' +
                        '<div class="mt-2 small fw-bold text-primary"><i class="fa-solid fa-user-pen me-1"></i> โดย: ' + emailText + '</div>' +
                    '</div>';
                });
            }
            html += '</div>';

            Swal.fire({ 
                title: '<div class="fs-5"><i class="fa-solid fa-clock-rotate-left text-info me-2"></i>ประวัติการทำงาน</div><div class="fs-6 text-muted mt-1">' + leadId + '</div>', 
                html: html, 
                width: 600,
                confirmButtonText: 'ปิดหน้าต่าง', 
                confirmButtonColor: '#64748b' 
            });
        } catch(err) { Swal.fire('Error', err.message, 'error'); }
    }
</script>
