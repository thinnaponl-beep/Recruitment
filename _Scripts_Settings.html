<script>
    // ==========================================
    // ⭐ 0. Helper: ระบบบันทึก Log อัจฉริยะ 
    // ==========================================
    async function writeLogToSupabase(action, module, details) {
        const userEmail = state.currentUser?.email || 'System';
        const logId = "LOG-" + new Date().getTime(); 
        
        // 🌟 แก้ไข: จัดการเวลาให้เป็น Local Time (เวลาไทย) ป้องกันเวลาช้าไป 7 ชั่วโมง
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const tsStr = `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`; 

        try {
            const { data: sample } = await supabase.from('db_logs').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];

            let payload = {};
            payload[getCol(['logid', 'log_id', 'Log_ID', 'id'])] = logId;
            payload[getCol(['useremail', 'user_email', 'UserEmail', 'email'])] = userEmail;
            payload[getCol(['action', 'Action'])] = action;
            payload[getCol(['module', 'Module'])] = module;
            payload[getCol(['details', 'Details'])] = details;

            const tsCol = getCol(['timestamp', 'Timestamp', 'created_at', 'createdat']);
            if (dbKeys.includes(tsCol) || dbKeys.length === 0) { 
                payload[tsCol] = tsStr;
            }

            await supabase.from('db_logs').insert([payload]);
        } catch(e) { 
            console.error("Log error (ignored):", e); 
        }
    }

    // ==========================================
    // ⚙️ 1. จัดการสิทธิ์แอดมิน (Admin Management)
    // ==========================================
    function loadSettingsDropdowns() {
        renderAdminTable();
        selectDropdownCat(currentConfigCat);
    }

    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        if(!tbody) return;
        
        tbody.innerHTML = state.admins.map(a => `
            <tr>
                <td class="ps-4">
                    <div class="fw-bold text-dark">
                        ${a.name || a.email}
                        ${a.is_dev ? '<span class="badge bg-dark ms-1" style="font-size:0.65rem;">Dev</span>' : ''}
                    </div>
                    ${a.name && a.name !== a.email ? `<small class="text-muted">${a.email}</small>` : ''}
                </td>
                <td><span class="badge bg-secondary opacity-75">${a.role || '-'}</span></td>
                <td><div class="fw-bold ${a.auto === 'ON' ? 'text-success' : 'text-danger'}">${a.auto || 'OFF'}</div></td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-primary border-0 me-1" onclick="editAdmin('${a.email}')" title="แก้ไข">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteAdmin('${a.email}')" title="ลบ">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function openAdminModal() {
        const f = document.getElementById('adminForm');
        if (f) f.reset();
        
        const actionType = document.getElementById('adminActionType');
        if(actionType) actionType.value = 'add';
        
        const emailInput = document.getElementById('adminEmailInput');
        if(emailInput) emailInput.readOnly = false;
        
        const modalTitle = document.getElementById('adminModalTitle');
        if(modalTitle) modalTitle.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i> เพิ่มข้อมูลแอดมิน';
        
        const modalEl = document.getElementById('adminModal');
        if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }

    function editAdmin(email) {
        const admin = state.admins.find(a => a.email === email);
        if(!admin) return;

        const f = document.getElementById('adminForm');
        if(f) f.reset();

        const actionType = document.getElementById('adminActionType');
        if(actionType) actionType.value = 'edit';
        
        const modalTitle = document.getElementById('adminModalTitle');
        if(modalTitle) modalTitle.innerHTML = '<i class="fa-solid fa-user-pen me-2"></i> แก้ไขข้อมูลแอดมิน';
        
        const emailInput = document.getElementById('adminEmailInput');
        if(emailInput) {
            emailInput.value = admin.email;
            emailInput.readOnly = true; 
        }

        const nameInput = document.getElementById('adminNameInput');
        if(nameInput) nameInput.value = (admin.name && admin.name !== admin.email) ? admin.name : '';
        
        const roleSelect = document.getElementById('adminRoleSelect');
        if(roleSelect) roleSelect.value = admin.role;
        
        const autoAssignSwitch = document.getElementById('autoAssignSwitch');
        if(autoAssignSwitch) autoAssignSwitch.checked = (admin.auto === 'ON');

        // 🌟 ดึงค่า Developer Mode มาติ๊กให้ใน UI
        const devSwitch = document.getElementById('isDeveloperSwitch');
        if(devSwitch) devSwitch.checked = !!admin.is_dev;

        const modalEl = document.getElementById('adminModal');
        if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).show();
    }

    async function saveAdmin() {
        const form = document.getElementById('adminForm');
        if (!form) return;
        
        const data = {
            name: form.elements['adminName'].value,
            email: form.elements['adminEmail'].value,
            role: form.elements['adminRole'].value,
            autoAssign: form.elements['autoAssign'].checked,
            isDev: form.elements['isDeveloper'] ? form.elements['isDeveloper'].checked : false
        };
        
        if(!data.email) return Swal.fire('Error', 'กรุณาระบุอีเมล', 'error');
        if(!data.name) return Swal.fire('Error', 'กรุณาระบุชื่อเล่น', 'error');

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            const { data: sysSample } = await supabase.from('config_system').select('*').limit(1);
            const sysKeys = (sysSample && sysSample.length > 0) ? Object.keys(sysSample[0]) : [];
            const getCol = (names) => names.find(k => sysKeys.includes(k)) || names[0];

            const emailCol = getCol(['adminemail', 'admin_email', 'Admin_Email', 'email']);
            const nameCol = getCol(['adminname', 'admin_name', 'Admin_Name', 'name']);
            const roleCol = getCol(['role', 'Role']);
            const autoCol = getCol(['autoassign_status', 'AutoAssign_Status', 'auto_assign']);
            
            // 🌟 รองรับคอลัมน์ is_developer ลงฐานข้อมูล
            const devCol = getCol(['is_developer', 'Is_Developer', 'is_dev', 'isdev']);

            let payload = {};
            payload[emailCol] = data.email;
            payload[nameCol] = data.name;
            payload[roleCol] = data.role;
            payload[autoCol] = data.autoAssign ? 'TRUE' : 'FALSE';
            
            if (devCol || sysKeys.length === 0) {
                payload[devCol || 'is_developer'] = data.isDev ? 'TRUE' : 'FALSE';
            }

            let { data: existing } = await supabase.from('config_system').select('*').eq(emailCol, data.email);

            if (existing && existing.length > 0) {
                const { error } = await supabase.from('config_system').update(payload).eq(emailCol, data.email);
                if (error) throw error;
            } else {
                const wlCol = getCol(['current_workload', 'Current_Workload', 'workload']);
                payload[wlCol] = 0;
                const { error } = await supabase.from('config_system').insert([payload]);
                if (error) throw error;
            }

            await writeLogToSupabase('UPDATE_ADMIN', 'Settings', `Set Admin: ${data.name} as ${data.role}`);

            const modalEl = document.getElementById('adminModal');
            if (modalEl) bootstrap.Modal.getOrCreateInstance(modalEl).hide();
            
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'บันทึกข้อมูลเรียบร้อย', timer: 2000, showConfirmButton: false });
            loadInitialDataFromSupabase();

        } catch (err) {
            console.error(err);
            Swal.fire('Error', err.message, 'error');
        }
    }

    async function deleteAdmin(email) {
        Swal.fire({ 
            title: 'ลบสิทธิ์?', 
            text: `ต้องการลบ ${email} ออกจากระบบ?`, 
            icon: 'warning', 
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'ลบทิ้ง'
        }).then(async r => {
            if(r.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', didOpen: () => Swal.showLoading() });
                try {
                    const { data: sysSample } = await supabase.from('config_system').select('*').limit(1);
                    const sysKeys = (sysSample && sysSample.length > 0) ? Object.keys(sysSample[0]) : [];
                    const emailCol = ['adminemail', 'admin_email', 'Admin_Email', 'email'].find(k => sysKeys.includes(k)) || 'adminemail';

                    const { error } = await supabase.from('config_system').delete().eq(emailCol, email);
                    if (error) throw error;

                    await writeLogToSupabase('DELETE_ADMIN', 'Settings', `Removed Admin: ${email}`);

                    Swal.fire('ลบสำเร็จ!', 'ลบสิทธิ์แอดมินเรียบร้อยแล้ว', 'success');
                    loadInitialDataFromSupabase();
                } catch (err) {
                    Swal.fire('Error', err.message, 'error');
                }
            }
        });
    }

    // ==========================================
    // 📋 2. จัดการตัวเลือก (Dropdown Management)
    // ==========================================
    function selectDropdownCat(cat) {
        currentConfigCat = cat;
        
        document.querySelectorAll('#dropdownCategoryList .list-group-item, #dropdownCategoryList button').forEach(el => {
            const clickAttr = el.getAttribute('onclick') || "";
            if (clickAttr.includes(`'${cat}'`)) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
        
        const titleEl = document.getElementById('currentDropdownTitle'); 
        if (titleEl) titleEl.innerText = `ตัวเลือก: ${cat}`;
        
        renderDropdownItems();
    }

    function renderDropdownItems() {
        const list = document.getElementById('dropdownSortableList');
        if (!list) return;
        
        const items = (state.initialDropdowns && state.initialDropdowns[currentConfigCat]) || [];
        
        list.innerHTML = items.map(item => `
            <li class="list-group-item d-flex justify-content-between align-items-center py-3 px-4" data-id="${item}">
                <div><i class="fa-solid fa-grip-lines text-muted me-3 grip-handle" style="cursor:grab"></i> ${item}</div>
                <button class="btn btn-sm text-danger border-0" onclick="deleteDropdownItem('${item}')">
                    <i class="fa-solid fa-circle-minus"></i>
                </button>
            </li>
        `).join('');

        if(sortableInstance) sortableInstance.destroy();
        
        if (typeof Sortable !== 'undefined') {
            sortableInstance = new Sortable(list, { 
                animation: 150, 
                handle: '.grip-handle', 
                ghostClass: 'bg-light' 
            });
        }
    }

    async function addDropdownItem() {
        const { value: newItem } = await Swal.fire({ 
            title: 'เพิ่มตัวเลือก', 
            input: 'text', 
            showCancelButton: true 
        });
        
        if (newItem) {
            let items = sortableInstance ? sortableInstance.toArray() : [];
            items.push(newItem);
            updateDropdowns(items);
        }
    }

    function deleteDropdownItem(item) {
        let items = sortableInstance ? sortableInstance.toArray().filter(i => i !== item) : [];
        updateDropdowns(items);
    }

    function saveDropdownOrder() {
        if (sortableInstance) {
            updateDropdowns(sortableInstance.toArray());
        }
    }

    async function updateDropdowns(items) {
        Swal.fire({ title: 'กำลังอัปเดต...', didOpen: () => Swal.showLoading() });
        try {
            const { data: dropSample } = await supabase.from('config_dropdowns').select('*').limit(1);
            const dropKeys = (dropSample && dropSample.length > 0) ? Object.keys(dropSample[0]) : [];
            const getCol = (names) => names.find(k => dropKeys.includes(k)) || names[0];

            const catCol = getCol(['category', 'Category']);
            const valCol = getCol(['value', 'item_value', 'Value']);
            const orderCol = getCol(['sort_order', 'Sort_Order', 'sortorder']);
            const activeCol = getCol(['is_active', 'IsActive', 'isactive']);

            // 🌟 1. ลบตัวเลือกเก่าทิ้งทั้งหมดก่อน (พร้อมดักจับ Error อย่างรัดกุม)
            const { error: delError } = await supabase.from('config_dropdowns').delete().eq(catCol, currentConfigCat);
            
            // 🚨 ถ้าลบไม่ได้ แสดงว่าฐานข้อมูลอาจมีปัญหา (เช่น ไม่มี Primary Key) ให้แจ้งเตือนทันทีเพื่อป้องกันข้อมูลซ้ำ
            if (delError) {
                throw new Error(`ไม่สามารถล้างข้อมูลเก่าได้ (โปรดตรวจสอบว่าตาราง config_dropdowns ของคุณมี Primary Key "id" แล้วหรือยัง): ${delError.message}`);
            }

            // 🌟 2. ล้างข้อมูลที่ซ้ำกันออก (Deduplication) ช่วยกำจัดของเก่าที่เคยค้างอยู่
            const uniqueItems = [...new Set(items)];

            // 3. จัดเตรียมข้อมูลสำหรับ Insert ใหม่เข้าไปตามลำดับ
            const insertPayload = uniqueItems.map((item, index) => {
                let row = {};
                row[catCol] = currentConfigCat;
                row[valCol] = item;
                row[orderCol] = index + 1;
                row[activeCol] = 'TRUE';
                return row;
            });

            if (insertPayload.length > 0) {
                const { error: insError } = await supabase.from('config_dropdowns').insert(insertPayload);
                if (insError) throw insError;
            }

            await writeLogToSupabase('UPDATE_DROPDOWN', 'Settings', `Updated list for ${currentConfigCat}`);

            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'บันทึกลำดับสำเร็จ', timer: 2000, showConfirmButton: false });
            loadInitialDataFromSupabase();

        } catch (err) {
            console.error("Dropdown Update Error:", err);
            Swal.fire('ข้อผิดพลาด', err.message, 'error');
        }
    }
</script>
