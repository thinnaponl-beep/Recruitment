<script>
    // ==========================================
    // ⚙️ 1. จัดการสิทธิ์แอดมิน (Admin Settings)
    // ==========================================
    function openAdminModal(email = '') {
        const form = document.getElementById('adminForm');
        if (form) form.reset();
        
        document.getElementById('adminActionType').value = email ? 'edit' : 'add';
        document.getElementById('adminModalTitle').innerHTML = email ? '<i class="fa-solid fa-user-pen me-2"></i> แก้ไขข้อมูลแอดมิน' : '<i class="fa-solid fa-user-plus me-2"></i> เพิ่มแอดมินใหม่';
        
        const emailInput = document.getElementById('adminEmailInput');
        
        if (email) {
            const admin = state.admins.find(a => a.email === email);
            if (admin) {
                document.getElementById('adminNameInput').value = admin.name || '';
                emailInput.value = admin.email;
                emailInput.readOnly = true;
                emailInput.classList.add('bg-light');
                document.getElementById('adminRoleSelect').value = admin.role || 'Admin';
                document.getElementById('autoAssignSwitch').checked = admin.auto_assign || admin.auto === 'ON';
                document.getElementById('isDeveloperSwitch').checked = admin.is_dev;
            }
        } else {
            emailInput.readOnly = false;
            emailInput.classList.remove('bg-light');
        }
        
        bootstrap.Modal.getOrCreateInstance(document.getElementById('adminModal')).show();
    }

    async function saveAdmin() {
        const form = document.getElementById('adminForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }
        
        const action = document.getElementById('adminActionType').value;
        const email = document.getElementById('adminEmailInput').value.trim();
        const name = document.getElementById('adminNameInput').value.trim();
        const role = document.getElementById('adminRoleSelect').value;
        const autoAssign = document.getElementById('autoAssignSwitch').checked;
        const isDev = document.getElementById('isDeveloperSwitch').checked;
        
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            const { data: sample } = await supabase.from('config_system').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const getCol = (names) => names.find(k => dbKeys.includes(k)) || names[0];
            
            let payload = {};
            payload[getCol(['adminemail', 'admin_email', 'Admin_Email', 'email'])] = email;
            payload[getCol(['adminname', 'admin_name', 'Admin_Name', 'name'])] = name;
            payload[getCol(['role', 'Role'])] = role;
            payload[getCol(['autoassign_status', 'AutoAssign_Status', 'auto_assign', 'autoassign'])] = autoAssign ? 'TRUE' : 'FALSE';
            payload[getCol(['is_developer', 'Is_Developer', 'is_dev', 'isdev'])] = isDev ? 'TRUE' : 'FALSE';
            
            const emailCol = getCol(['adminemail', 'admin_email', 'Admin_Email', 'email']);

            if (action === 'add') {
                const { data: check } = await supabase.from('config_system').select('*').eq(emailCol, email);
                if (check && check.length > 0) throw new Error("อีเมลนี้มีในระบบแล้ว");
                
                const { error } = await supabase.from('config_system').insert([payload]);
                if (error) throw error;
            } else {
                const { error } = await supabase.from('config_system').update(payload).eq(emailCol, email);
                if (error) throw error;
            }
            
            await loadInitialDataFromSupabase();
            renderAdminTable();
            bootstrap.Modal.getOrCreateInstance(document.getElementById('adminModal')).hide();
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
            
        } catch (err) {
            Swal.fire('ข้อผิดพลาด', err.message, 'error');
        }
    }

    async function deleteAdmin(email) {
        Swal.fire({
            title: 'ยืนยันการลบ?',
            text: `ต้องการลบสิทธิ์แอดมิน ${email} ใช่หรือไม่?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'ลบทิ้ง'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const { data: sample } = await supabase.from('config_system').select('*').limit(1);
                    const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                    const emailCol = dbKeys.find(k => ['adminemail', 'admin_email', 'Admin_Email', 'email'].includes(k)) || 'admin_email';

                    const { error } = await supabase.from('config_system').delete().eq(emailCol, email);
                    if (error) throw error;

                    await loadInitialDataFromSupabase();
                    renderAdminTable();
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1500, showConfirmButton: false });
                } catch (err) {
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                }
            }
        });
    }

    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        if (!tbody) return;
        
        if (state.admins.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">ไม่พบข้อมูลแอดมิน</td></tr>`;
            return;
        }
        
        tbody.innerHTML = state.admins.map(a => {
            const roleBadge = a.role === 'Admin' ? '<span class="badge bg-primary">Admin</span>' : (a.role === 'Recruiter' ? '<span class="badge bg-info text-dark">Recruiter</span>' : '<span class="badge bg-secondary">Viewer</span>');
            const autoBadge = a.auto === 'ON' ? '<span class="badge bg-success"><i class="fa-solid fa-check"></i> เปิดรับงาน</span>' : '<span class="badge bg-light text-muted border">ปิด</span>';
            const devBadge = a.is_dev ? '<span class="badge bg-dark ms-2"><i class="fa-solid fa-code"></i> Dev</span>' : '';
            
            return `
            <tr>
                <td class="ps-4">
                    <div class="fw-bold text-dark">${a.name} ${devBadge}</div>
                    <small class="text-muted">${a.email}</small>
                </td>
                <td>${roleBadge}</td>
                <td>${autoBadge}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-secondary rounded-circle me-1" onclick="openAdminModal('${a.email}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="deleteAdmin('${a.email}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const tabAdminBtn = document.getElementById('admin-tab');
        if (tabAdminBtn) {
            tabAdminBtn.addEventListener('shown.bs.tab', () => renderAdminTable());
        }
        if (tabAdminBtn && tabAdminBtn.classList.contains('active')) {
            setTimeout(renderAdminTable, 500);
        }
    });

    // ==========================================
    // 📋 2. จัดการ Dropdowns (Dropdown Settings)
    // ==========================================
    
    currentConfigCat = 'Channel';

    function loadSettingsDropdowns() {
        selectDropdownCat(currentConfigCat);
    }

    function selectDropdownCat(cat) {
        currentConfigCat = cat;
        
        // จัดการ UI หมวดหมู่ที่ถูกเลือก (ฝั่งซ้าย)
        document.querySelectorAll('#dropdownCategoryList button').forEach(btn => {
            btn.classList.remove('active', 'bg-primary', 'text-white');
            btn.classList.add('text-dark');
        });
        
        const activeBtn = document.querySelector(`#dropdownCategoryList button[onclick="selectDropdownCat('${cat}')"]`);
        if (activeBtn) {
            activeBtn.classList.add('active', 'bg-primary', 'text-white');
            activeBtn.classList.remove('text-dark');
            document.getElementById('currentDropdownTitle').innerHTML = activeBtn.innerHTML;
        }

        renderDropdownSortableList();
    }

    async function renderDropdownSortableList() {
        const listEl = document.getElementById('dropdownSortableList');
        if (!listEl) return;

        listEl.innerHTML = '<li class="list-group-item text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>กำลังโหลดข้อมูล...</li>';

        try {
            const { data: allData, error } = await supabase.from('config_dropdowns').select('*');
            if (error) throw error;

            // กรองเอาเฉพาะ Category ที่เลือก
            const filteredData = (allData || []).filter(d => {
                const cat = d.Category || d.category;
                return cat === currentConfigCat;
            });

            // เรียงลำดับ
            filteredData.sort((a, b) => {
                const orderA = a.Sort_Order ?? a.sort_order ?? a.sortorder ?? 99;
                const orderB = b.Sort_Order ?? b.sort_order ?? b.sortorder ?? 99;
                return orderA - orderB;
            });

            if (filteredData.length === 0) {
                listEl.innerHTML = '<li class="list-group-item text-center py-4 text-muted">ยังไม่มีข้อมูลตัวเลือกในหมวดหมู่นี้</li>';
                return;
            }

            listEl.innerHTML = filteredData.map(item => {
                const id = item.id || item.ID || item.config_id;
                const val = item.Value || item.value || item.item_value;
                return `
                <li class="list-group-item d-flex justify-content-between align-items-center" data-id="${id}">
                    <div class="d-flex align-items-center gap-3">
                        <i class="fa-solid fa-grip-lines text-muted" style="cursor: grab;"></i>
                        <span class="fw-bold text-dark">${val}</span>
                    </div>
                    <button class="btn btn-sm text-danger border-0 bg-transparent" onclick="deleteDropdownItem('${id}')" title="ลบตัวเลือกนี้">
                        <i class="fa-solid fa-circle-minus fs-5"></i>
                    </button>
                </li>`;
            }).join('');

            if (typeof Sortable !== 'undefined') {
                if (window.sortableInstance) window.sortableInstance.destroy();
                window.sortableInstance = new Sortable(listEl, {
                    animation: 150,
                    ghostClass: 'bg-light'
                });
            }

        } catch (err) {
            listEl.innerHTML = `<li class="list-group-item text-center py-4 text-danger">เกิดข้อผิดพลาด: ${err.message}</li>`;
        }
    }

    async function addDropdownItem() {
        const { value: newValue } = await Swal.fire({
            title: 'เพิ่มตัวเลือก',
            input: 'text',
            inputPlaceholder: 'พิมพ์ชื่อตัวเลือกที่ต้องการ...',
            showCancelButton: true,
            confirmButtonText: 'ตกลง (OK)',
            cancelButtonText: 'ยกเลิก (Cancel)'
        });

        if (newValue && newValue.trim() !== '') {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const { data: sample } = await supabase.from('config_dropdowns').select('*').limit(1);
                const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                
                const catCol = dbKeys.find(k => ['category', 'Category'].includes(k)) || 'category';
                const valCol = dbKeys.find(k => ['value', 'Value', 'item_value'].includes(k)) || 'value';
                const actCol = dbKeys.find(k => ['is_active', 'IsActive', 'isactive'].includes(k)) || 'is_active';
                const sortCol = dbKeys.find(k => ['sort_order', 'Sort_Order', 'sortorder'].includes(k)) || 'sort_order';

                let payload = {};
                payload[catCol] = currentConfigCat;
                payload[valCol] = newValue.trim();
                payload[actCol] = true;

                // 🌟 ป้องกัน Error Data Type ในฐานข้อมูลโดยส่งตัวเลข (Timestamp) เป็น ID 🌟
                // เนื่องจากผู้ใช้บางท่านสร้างคอลัมน์ "id" แบบ Not-Null แต่ไม่ได้ตั้ง Auto-increment ไว้
                if (dbKeys.includes('id')) {
                    payload['id'] = Date.now();
                } else if (dbKeys.includes('config_id')) {
                    payload['config_id'] = Date.now();
                } else {
                    payload['id'] = Date.now(); // ป้องกันกรณีที่ซ่อนคอลัมน์ id ไว้
                }

                const { data: existing } = await supabase.from('config_dropdowns').select(sortCol).eq(catCol, currentConfigCat);
                let maxOrder = 0;
                if (existing && existing.length > 0) {
                    maxOrder = Math.max(...existing.map(e => e[sortCol] || 0));
                }
                payload[sortCol] = maxOrder + 1;

                let { error } = await supabase.from('config_dropdowns').insert([payload]);
                
                // 🌟 Fallback: หากฐานข้อมูลตั้ง id เป็นชนิด UUID ระบบจะตรวจจับและเปลี่ยนเป็น UUID 🌟
                if (error && error.message && error.message.includes('uuid')) {
                    payload['id'] = crypto.randomUUID();
                    const retry = await supabase.from('config_dropdowns').insert([payload]);
                    if (retry.error) throw retry.error;
                } else if (error) {
                    throw error;
                }

                await loadInitialDataFromSupabase(); 
                await renderDropdownSortableList(); 
                
                Swal.fire({ icon: 'success', title: 'เพิ่มสำเร็จ', timer: 1500, showConfirmButton: false });
            } catch (err) {
                Swal.fire('ข้อผิดพลาดในการบันทึก', err.message, 'error');
                console.error("Add Dropdown Error:", err);
            }
        }
    }

    async function deleteDropdownItem(id) {
        if (!id || id === 'undefined') return Swal.fire('Error', 'ไม่พบ ID ของข้อมูลนี้', 'error');
        
        Swal.fire({
            title: 'ยืนยันการลบ?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'ลบข้อมูล'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const { data: sample } = await supabase.from('config_dropdowns').select('*').limit(1);
                    const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
                    const idCol = dbKeys.find(k => ['id', 'ID', 'config_id'].includes(k)) || 'id';

                    const { error } = await supabase.from('config_dropdowns').delete().eq(idCol, id);
                    if (error) throw error;

                    await loadInitialDataFromSupabase();
                    await renderDropdownSortableList();
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1500, showConfirmButton: false });
                } catch (err) {
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                }
            }
        });
    }

    async function saveDropdownOrder() {
        const listEl = document.getElementById('dropdownSortableList');
        if (!listEl) return;

        const items = Array.from(listEl.children);
        if (items.length === 0 || items[0].classList.contains('text-muted')) return;

        Swal.fire({ title: 'กำลังบันทึกลำดับ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const { data: sample } = await supabase.from('config_dropdowns').select('*').limit(1);
            const dbKeys = (sample && sample.length > 0) ? Object.keys(sample[0]) : [];
            const idCol = dbKeys.find(k => ['id', 'ID', 'config_id'].includes(k)) || 'id';
            const sortCol = dbKeys.find(k => ['sort_order', 'Sort_Order', 'sortorder'].includes(k)) || 'sort_order';

            for (let i = 0; i < items.length; i++) {
                const id = items[i].getAttribute('data-id');
                if (id) {
                    let payload = {};
                    payload[sortCol] = i + 1;
                    await supabase.from('config_dropdowns').update(payload).eq(idCol, id);
                }
            }

            await loadInitialDataFromSupabase();
            await renderDropdownSortableList();
            Swal.fire({ icon: 'success', title: 'บันทึกลำดับสำเร็จ', timer: 1500, showConfirmButton: false });
        } catch (err) {
            Swal.fire('ข้อผิดพลาด', err.message, 'error');
        }
    }
</script>
