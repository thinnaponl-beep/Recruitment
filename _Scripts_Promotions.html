<script>
    // ==========================================
    // 📢 1. จัดการข้อมูลโปรโมชั่นและโค้ดอินฟลูเอนเซอร์
    // ==========================================
    
    if (typeof state.promoFilter === 'undefined') state.promoFilter = 'Active';
    if (typeof state.referrerFilter === 'undefined') state.referrerFilter = 'Active'; 
    if (typeof state.dashboardMonth === 'undefined') state.dashboardMonth = 'All'; 
    if (typeof state.dashboardTypeFilter === 'undefined') state.dashboardTypeFilter = 'All'; // 🌟 เก็บ State สำหรับกรองประเภท

    // 🌟 Event Listener แก้บั๊ก Gantt Chart แสดงผลผิดเมื่อซ่อนอยู่ในแท็บ
    document.addEventListener('DOMContentLoaded', () => {
        const triggerTabList = document.querySelectorAll('#promoMainTab button[data-bs-toggle="pill"]');
        triggerTabList.forEach(triggerEl => {
            triggerEl.addEventListener('shown.bs.tab', event => {
                if (event.target.id === 'tab-promo-btn') {
                    drawPromoGanttChart();
                } else if (event.target.id === 'tab-referrer-btn') {
                    drawReferrerGanttChart();
                } else if (event.target.id === 'tab-dashboard-btn') {
                    renderMainPromoDashboard();
                }
            });
        });
    });

    async function loadPromotionsData() {
        // 🌟 แก้ปัญหาข้อมูลยอดเงินไม่ขึ้นเมื่อเปิดเว็บครั้งแรก 🌟
        // เช็คว่าเคยดึงข้อมูล Training มาแล้วหรือยัง ถ้ายังให้แอบดึงมาก่อนเพื่อใช้คำนวณยอดเงิน Conversion
        if (!state._isTrainingLoadedForPromo) {
            Swal.fire({ title: 'กำลังคำนวณสถิติ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const { data, error } = await supabase.from('db_training').select('*');
                if (!error) {
                    state.trainings = data || [];
                    state._isTrainingLoadedForPromo = true; // ล็อกไว้ว่าดึงแล้ว จะได้ไม่เสียเวลาดึงซ้ำ
                }
            } catch (err) {
                console.error("Error loading training data for promotions:", err);
            }
            Swal.close();
        }

        renderMainPromoDashboard();
        renderPromotionsDashboard(); 
        renderReferrersDashboard(); 
    }

    // ==========================================
    // 📊 TAB 0: DASHBOARD สรุปสถิติและต้นทุน
    // ==========================================
    
    function getYearMonth(dateStr) {
        if (!dateStr) return null;
        if (dateStr.includes('/')) {
            const parts = dateStr.split('/'); 
            return parts[2] + '-' + parts[1];
        } else if (dateStr.includes('-')) {
            const parts = dateStr.split('-'); 
            return parts[0] + '-' + parts[1];
        }
        return null;
    }

    window.changeDashMonth = function(val) {
        state.dashboardMonth = val;
        renderMainPromoDashboard();
    };

    // 🌟 Function ควบคุมการเปลี่ยนประเภท 🌟
    window.changeDashType = function(val) {
        state.dashboardTypeFilter = val;
        renderMainPromoDashboard();
    };

    // 🌟 Function แสดงรายละเอียดรายคน (Popup) 🌟
    window.showPromoDetails = function(id, name, type) {
        let detailsHtml = `
            <div class="table-responsive">
                <table class="table table-sm table-hover align-middle text-nowrap" style="font-size: 0.85rem;">
                    <thead class="table-light">
                        <tr>
                            <th>ผู้สมัคร</th>
                            <th>วันที่รับเข้า</th>
                            <th>แคมเปญที่ใช้จริง</th>
                            <th>วันที่เกิดผล(โอน/อบรม)</th>
                            <th class="text-end">ส่วนลด</th>
                            <th class="text-end">ค่าแนะนำ</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        let relatedLeads = state.leads.filter(l => {
            const pId = l.Promo || l.promo_id || l.promoid || l.promo;
            const rId = l.Referrer || l.referrer;
            return pId === id || rId === id;
        });

        let relatedTrainings = state.trainings.filter(t => {
            const cId = t.final_campaign || t.finalcampaign || t.FinalCampaign;
            const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === (t.lead_id || t.Lead_ID || t.leadid));
            const rId = lead ? (lead.Referrer || lead.referrer) : null;
            return cId === id || rId === id;
        });

        let uniqueLeadIds = new Set([
            ...relatedLeads.map(l => l.Lead_ID || l.lead_id || l.leadid),
            ...relatedTrainings.map(t => t.lead_id || t.Lead_ID || t.leadid)
        ]);

        let hasData = false;

        uniqueLeadIds.forEach(leadId => {
            const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === leadId);
            const train = state.trainings.find(t => (t.lead_id || t.Lead_ID || t.leadid) === leadId);

            if (!lead) return;

            let include = true;
            if (state.dashboardMonth !== 'All') {
                const tDate = train ? (train.transfer_date || train.transferdate || train.TransferDate || train.train_date || train.traindate) : null;
                const rDate = lead.RecordDate || lead.record_date || lead.recorddate;
                const ymTrain = getYearMonth(tDate);
                const ymRecord = getYearMonth(rDate);

                if (ymTrain) {
                    if (ymTrain !== state.dashboardMonth) include = false;
                } else {
                    if (ymRecord !== state.dashboardMonth) include = false;
                }
            }

            if (!include) return;

            const leadName = lead.FullName || lead.full_name || lead.fullname;
            const recordDate = formatDateForDisplay(lead.RecordDate || lead.record_date || lead.recorddate);
            const finalCamp = train ? (train.final_campaign || train.finalcampaign || train.FinalCampaign || '-') : '-';
            const convDateRaw = train ? (train.transfer_date || train.transferdate || train.TransferDate || train.train_date || train.traindate) : null;
            const convDate = convDateRaw ? formatDateForDisplay(convDateRaw) : '<span class="text-muted">-</span>';
            
            let discount = 0;
            let commission = 0;

            if (type === 'Promotion') {
                const promo = state.promotions.find(p => p.Promo_ID === id);
                if (train && finalCamp === id) discount = promo ? (promo.Discount_Amount || 0) : 0;
            } else if (type === 'Referrer') {
                const ref = state.referrers.find(r => r.Ref_ID === id);
                const lRef = lead.Referrer || lead.referrer;
                if (train && finalCamp === id) discount = ref ? (ref.Discount_Amount || 0) : 0;
                if (train && lRef === id) commission = ref ? (ref.Commission_Amount || 0) : 0;
            }

            const isOriginMatch = ((lead.Promo || lead.promo) === id || (lead.Referrer || lead.referrer) === id);
            const isConvMatch = (finalCamp === id || ((lead.Referrer || lead.referrer) === id && train));

            if (isOriginMatch || isConvMatch) {
                hasData = true;
                detailsHtml += `
                    <tr>
                        <td>
                            <div class="fw-bold text-dark">${leadName}</div>
                            <small class="text-muted" style="font-size: 0.7rem;">${leadId}</small>
                        </td>
                        <td>${recordDate}</td>
                        <td><span class="badge bg-light text-dark border">${finalCamp}</span></td>
                        <td>${convDate}</td>
                        <td class="text-end text-danger">${discount > 0 ? '-' + discount.toLocaleString() : '-'}</td>
                        <td class="text-end text-warning-emphasis fw-bold">${commission > 0 ? '+' + commission.toLocaleString() : '-'}</td>
                    </tr>
                `;
            }
        });

        if (!hasData) {
             detailsHtml += `<tr><td colspan="6" class="text-center py-4 text-muted">ไม่พบรายละเอียดในเงื่อนไขนี้</td></tr>`;
        }

        detailsHtml += `
                    </tbody>
                </table>
            </div>
        `;

        Swal.fire({
            title: `<div class="fs-5"><i class="fa-solid fa-list-ul text-primary me-2"></i>รายละเอียดสถิติ</div><div class="fs-6 text-muted mt-1">${name} (${id})</div>`,
            html: detailsHtml,
            width: '850px',
            showCloseButton: true,
            showConfirmButton: false,
            customClass: { popup: 'rounded-4' }
        });
    }

    function renderMainPromoDashboard() {
        if (!state.promotions || !state.referrers || !state.trainings) return;

        let totalLeadsFromCampaigns = 0;
        let totalConversions = 0;
        let totalDiscountCost = 0;
        let totalCommissionCost = 0;
        
        let statsArray = [];

        // 1. คำนวณฝั่ง Promotions
        if (state.dashboardTypeFilter === 'All' || state.dashboardTypeFilter === 'Promotion') {
            state.promotions.forEach(p => {
                const id = p.Promo_ID;
                
                const filteredLeads = state.leads.filter(l => {
                    const pId = l.Promo || l.promo_id || l.promoid || l.promo;
                    if (pId !== id) return false;
                    
                    if (state.dashboardMonth !== 'All') {
                        const ym = getYearMonth(l.RecordDate || l.record_date || l.recorddate);
                        return ym === state.dashboardMonth;
                    }
                    return true;
                });
                const leadsCount = filteredLeads.length;

                const filteredConversions = state.trainings.filter(t => {
                    const cId = t.final_campaign || t.finalcampaign || t.FinalCampaign;
                    if (cId !== id) return false;
                    
                    if (state.dashboardMonth !== 'All') {
                        const tDate = t.transfer_date || t.transferdate || t.TransferDate || t.train_date || t.traindate || t.TrainDate;
                        const ym = getYearMonth(tDate);
                        
                        if (ym) {
                            return ym === state.dashboardMonth;
                        } else {
                            const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === (t.lead_id || t.Lead_ID || t.leadid));
                            if(lead) {
                                 return getYearMonth(lead.RecordDate || lead.record_date || lead.recorddate) === state.dashboardMonth;
                            }
                            return false;
                        }
                    }
                    return true;
                });
                const conversions = filteredConversions.length;
                
                const discountCost = conversions * (p.Discount_Amount || 0);
                
                totalLeadsFromCampaigns += leadsCount;
                totalConversions += conversions;
                totalDiscountCost += discountCost;

                if (leadsCount > 0 || conversions > 0) {
                    statsArray.push({
                        name: p.Promo_Name, id: id, type: 'Promotion',
                        leads: leadsCount, conversions: conversions,
                        discount: discountCost, commission: 0,
                        totalCost: discountCost
                    });
                }
            });
        }

        // 2. คำนวณฝั่ง Referrers
        if (state.dashboardTypeFilter === 'All' || state.dashboardTypeFilter === 'Referrer') {
            state.referrers.forEach(r => {
                const id = r.Ref_ID;
                
                const filteredLeads = state.leads.filter(l => {
                    const rId = l.Referrer || l.referrer;
                    if (rId !== id) return false;
                    
                    if (state.dashboardMonth !== 'All') {
                        const ym = getYearMonth(l.RecordDate || l.record_date || l.recorddate);
                        return ym === state.dashboardMonth;
                    }
                    return true;
                });
                const leadsCount = filteredLeads.length;

                let discountConversions = 0;
                let commConversions = 0;

                state.trainings.forEach(t => {
                    if (state.dashboardMonth !== 'All') {
                        const tDate = t.transfer_date || t.transferdate || t.TransferDate || t.train_date || t.traindate || t.TrainDate;
                        const ym = getYearMonth(tDate);
                        if (ym) {
                            if (ym !== state.dashboardMonth) return; 
                        } else {
                            const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === (t.lead_id || t.Lead_ID || t.leadid));
                            if (lead) {
                                if (getYearMonth(lead.RecordDate || lead.record_date || lead.recorddate) !== state.dashboardMonth) return; 
                            } else {
                                return; 
                            }
                        }
                    }

                    const cId = t.final_campaign || t.finalcampaign || t.FinalCampaign;
                    if (cId === id) {
                        discountConversions++;
                    }

                    const lead = state.leads.find(l => (l.Lead_ID || l.lead_id || l.leadid) === (t.lead_id || t.Lead_ID || t.leadid));
                    if (lead) {
                        const rId = lead.Referrer || lead.referrer;
                        if (rId === id) {
                            commConversions++;
                        }
                    }
                });
                
                const discountCost = discountConversions * (r.Discount_Amount || 0);
                const commCost = commConversions * (r.Commission_Amount || 0);
                const itemTotalCost = discountCost + commCost;

                totalLeadsFromCampaigns += leadsCount;
                totalConversions += discountConversions; 
                totalDiscountCost += discountCost;
                totalCommissionCost += commCost;

                if (leadsCount > 0 || commConversions > 0 || discountConversions > 0) {
                    statsArray.push({
                        name: r.Ref_Name, id: id, type: 'Referrer',
                        leads: leadsCount, 
                        conversions: Math.max(discountConversions, commConversions), 
                        discount: discountCost, commission: commCost,
                        totalCost: itemTotalCost
                    });
                }
            });
        }

        const totalBudgetSpent = totalDiscountCost + totalCommissionCost;

        document.getElementById('promoOverviewCards').innerHTML = `
            <div class="col-12 mb-2 d-flex flex-wrap justify-content-between align-items-center gap-3">
                <h6 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-chart-pie text-primary me-2"></i> ภาพรวมสถิติแคมเปญ</h6>
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <div class="input-group input-group-sm shadow-sm" style="width: auto;">
                        <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-filter"></i>&nbsp; หมวดหมู่</span>
                        <select class="form-select fw-bold text-primary" id="dashTypeFilter" onchange="changeDashType(this.value)">
                            <option value="All" ${state.dashboardTypeFilter === 'All' ? 'selected' : ''}>ทั้งหมด</option>
                            <option value="Promotion" ${state.dashboardTypeFilter === 'Promotion' ? 'selected' : ''}>เฉพาะโปรโมชั่น</option>
                            <option value="Referrer" ${state.dashboardTypeFilter === 'Referrer' ? 'selected' : ''}>เฉพาะผู้แนะนำ</option>
                        </select>
                    </div>
                    <div class="input-group input-group-sm shadow-sm" style="width: auto;">
                        <span class="input-group-text bg-white text-muted"><i class="fa-regular fa-calendar"></i>&nbsp; กรองเดือน</span>
                        <input type="month" class="form-control fw-bold text-primary" id="dashMonthFilter" value="${state.dashboardMonth === 'All' ? '' : state.dashboardMonth}" onchange="changeDashMonth(this.value)">
                        <button class="btn btn-outline-secondary bg-white" onclick="changeDashMonth('All')" ${state.dashboardMonth === 'All' ? 'disabled' : ''}>ทั้งหมด</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-white border-0 shadow-sm h-100 border-start border-4 border-primary">
                    <div class="card-body">
                        <div class="text-muted small fw-bold">Leads จากที่เลือก</div>
                        <h3 class="fw-bold mb-0 text-primary">${totalLeadsFromCampaigns} <span class="fs-6 text-muted">คน</span></h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-white border-0 shadow-sm h-100 border-start border-4 border-success">
                    <div class="card-body">
                        <div class="text-muted small fw-bold">ยอดนำไปใช้จริง (Conversion)</div>
                        <h3 class="fw-bold mb-0 text-success">${totalConversions} <span class="fs-6 text-muted">รายการ</span></h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-white border-0 shadow-sm h-100 border-start border-4 border-warning">
                    <div class="card-body">
                        <div class="text-muted small fw-bold">ค่าแนะนำ อินฟลู</div>
                        <h3 class="fw-bold mb-0 text-warning-emphasis">฿${totalCommissionCost.toLocaleString()}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-white border-0 shadow-sm h-100 border-start border-4 border-danger bg-danger bg-opacity-10">
                    <div class="card-body">
                        <div class="text-danger small fw-bold"><i class="fa-solid fa-coins me-1"></i> ต้นทุนรวม (Total Cost)</div>
                        <h3 class="fw-bold mb-0 text-danger">฿${totalBudgetSpent.toLocaleString()}</h3>
                    </div>
                </div>
            </div>
        `;

        statsArray.sort((a, b) => b.conversions - a.conversions);
        const tbody = document.getElementById('dashboardPromoTableBody');
        if (statsArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">ยังไม่มีข้อมูลสถิติในเงื่อนไขที่เลือก</td></tr>`;
        } else {
            tbody.innerHTML = statsArray.map(item => `
                <tr style="cursor: pointer;" onclick="showPromoDetails('${item.id}', '${item.name}', '${item.type}')" title="คลิกเพื่อดูรายชื่อผู้สมัครที่เกี่ยวข้อง">
                    <td class="ps-4">
                        <div class="fw-bold text-primary">${item.name}</div>
                        <small class="text-muted">${item.id}</small>
                    </td>
                    <td>${item.type === 'Promotion' ? '<span class="badge bg-danger bg-opacity-10 text-danger border border-danger">โปรโมชั่น</span>' : '<span class="badge bg-primary bg-opacity-10 text-primary border border-primary">ผู้แนะนำ</span>'}</td>
                    <td class="text-center fw-bold text-muted">${item.leads}</td>
                    <td class="text-center fw-bold text-success fs-5">${item.conversions}</td>
                    <td class="text-end text-danger">${item.discount > 0 ? '-' + item.discount.toLocaleString() : '-'}</td>
                    <td class="text-end text-warning-emphasis">${item.commission > 0 ? item.commission.toLocaleString() : '-'}</td>
                    <td class="text-end pe-4 fw-bold fs-6">฿${item.totalCost.toLocaleString()}</td>
                </tr>
            `).join('');
        }
    }


    // ==========================================
    // 📢 TAB 1: โปรโมชั่น (Promotions)
    // ==========================================
    function renderPromotionsDashboard() {
        const pCounts = { 'Total': state.promotions.length, 'Active': 0, 'Expired': 0, 'Upcoming': 0, 'Inactive': 0, 'Invalid': 0 };
        state.promotions.forEach(p => { pCounts[p.Calculated_Status] = (pCounts[p.Calculated_Status] || 0) + 1; });

        const pConfigs = [
            { id: 'All', label: 'ทั้งหมด', count: pCounts['Total'], color: '#64748b' },
            { id: 'Active', label: 'กำลังใช้งาน', count: pCounts['Active'], color: '#10b981' },
            { id: 'Upcoming', label: 'รอเริ่มต้น', count: pCounts['Upcoming'], color: '#f59e0b' },
            { id: 'Expired', label: 'หมดเวลา', count: pCounts['Expired'], color: '#ef4444' },
            { id: 'Inactive', label: 'ปิดใช้งาน', count: pCounts['Inactive'], color: '#6b7280' }
        ];

        let cardsHtml = '<div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-2 mb-4">';
        pConfigs.forEach(c => {
            const isActive = state.promoFilter === c.id;
            const activeStyle = isActive ? `box-shadow: 0 0 0 3px rgba(0,0,0,0.05); border-color: ${c.color} !important; background-color: ${c.color}15; transform: translateY(-2px);` : '';
            cardsHtml += `
            <div class="col">
                <div class="card h-100 shadow-sm border" style="cursor: pointer; transition: all 0.2s; border-left: 4px solid ${c.color} !important; ${activeStyle}" onclick="setPromoFilter('${c.id}')">
                    <div class="card-body p-2 text-center">
                        <div class="small fw-bold text-muted mb-1" style="font-size: 0.75rem; ${isActive ? `color: ${c.color} !important;` : ''}">${c.label}</div>
                        <h4 class="mb-0 fw-bold" style="color: ${c.color};">${c.count}</h4>
                    </div>
                </div>
            </div>`;
        });
        cardsHtml += '</div>';

        document.getElementById('promotionsDashboardCards').innerHTML = cardsHtml;
        applyPromoFilters();
    }

    function setPromoFilter(status) { state.promoFilter = status; renderPromotionsDashboard(); }

    function applyPromoFilters() {
        let filteredData = state.promoFilter === 'All' ? state.promotions : state.promotions.filter(p => p.Calculated_Status === state.promoFilter);
        renderPromotionsTable(filteredData);
        drawPromoGanttChart(filteredData);
    }

    function renderPromotionsTable(data) {
        const tbody = document.getElementById('promosTableBody');
        if (!tbody) return;
        if (!data || data.length === 0) { 
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-muted">ไม่พบข้อมูลโปรโมชั่นในสถานะนี้</td></tr>`; return; 
        }

        tbody.innerHTML = data.map((row, index) => {
            let statusBadge = '';
            if (row.Calculated_Status === 'Inactive') statusBadge = '<span class="badge bg-secondary">ปิดใช้งาน (Inactive)</span>';
            else if (row.Calculated_Status === 'Expired') statusBadge = '<span class="badge bg-danger">หมดเวลา (Expired)</span>';
            else if (row.Calculated_Status === 'Upcoming') statusBadge = '<span class="badge bg-warning text-dark">รอเริ่มต้น (Upcoming)</span>';
            else if (row.Calculated_Status === 'Active') statusBadge = '<span class="badge bg-success">กำลังใช้งาน (Active)</span>';

            const discount = row.Discount_Amount > 0 ? `฿${row.Discount_Amount.toLocaleString()}` : '-';

            return `
            <tr>
                <td class="fw-bold text-center text-muted">${index + 1}</td>
                <td class="text-danger fw-bold">${row.Promo_ID || '-'}</td>
                <td class="fw-bold">${row.Promo_Name || '-'}<br><small class="text-muted">${row.Description || '-'}</small></td>
                <td class="text-end fw-bold text-danger">${discount}</td>
                <td><i class="fa-regular fa-calendar text-muted"></i> ${formatDateForDisplay(row.Start_Date)} <i class="fa-solid fa-arrow-right mx-1 text-muted"></i> ${formatDateForDisplay(row.End_Date)}</td>
                <td>${statusBadge}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-secondary rounded-circle me-1" onclick="editPromo('${row.Promo_ID}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="deletePromo('${row.Promo_ID}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    function drawPromoGanttChart(data = state.promotions) {
        const container = document.getElementById('promoTimeline');
        if (!container || typeof google === 'undefined' || !google.visualization) return;
        
        let activeData = state.promoFilter === 'All' ? data : data.filter(p => p.Calculated_Status === state.promoFilter);
        if (!activeData || activeData.length === 0) { container.innerHTML = '<div class="text-center mt-5 text-muted">ไม่มีข้อมูลสำหรับสร้างกราฟ</div>'; return; }

        const chart = new google.visualization.Timeline(container);
        const dataTable = new google.visualization.DataTable();
        dataTable.addColumn({ type: 'string', id: 'Status' }); 
        dataTable.addColumn({ type: 'string', id: 'Name' }); 
        dataTable.addColumn({ type: 'date', id: 'Start' }); 
        dataTable.addColumn({ type: 'date', id: 'End' });

        const rows = activeData.map(p => {
            if (p.Parsed_Start && p.Parsed_End) {
                let lbl = 'ไม่ระบุ';
                if (p.Calculated_Status === 'Active') lbl = 'พร้อมใช้งาน (Active)'; 
                else if (p.Calculated_Status === 'Inactive') lbl = 'ปิดใช้งาน (Inactive)'; 
                else if (p.Calculated_Status === 'Expired') lbl = 'หมดเวลา (Expired)'; 
                else if (p.Calculated_Status === 'Upcoming') lbl = 'รอเริ่มต้น (Upcoming)';
                return [lbl, p.Promo_Name || 'Promo', p.Parsed_Start, p.Parsed_End];
            }
            return null;
        }).filter(r => r !== null);

        if (rows.length > 0) {
            dataTable.addRows(rows);
            const colors = [...new Set(rows.map(r => r[0]))].map(l => l.includes('Active') ? '#10b981' : l.includes('Expired') ? '#ef4444' : l.includes('Upcoming') ? '#f59e0b' : '#6b7280');
            
            chart.draw(dataTable, { 
                timeline: { colorByRowLabel: true }, 
                colors: colors, 
                backgroundColor: '#ffffff', 
                height: Math.max(250, rows.length * 45 + 50),
                hAxis: {
                    format: 'dd/MM/yyyy'
                }
            });
        }
    }

    // ==========================================
    // 👥 TAB 2: ผู้แนะนำ (Referrers)
    // ==========================================
    function renderReferrersDashboard() {
        const rCounts = { 'Total': state.referrers.length, 'Active': 0, 'Expired': 0, 'Upcoming': 0, 'Inactive': 0, 'Invalid': 0 };
        state.referrers.forEach(r => { rCounts[r.Calculated_Status] = (rCounts[r.Calculated_Status] || 0) + 1; });

        const rConfigs = [
            { id: 'All', label: 'ทั้งหมด', count: rCounts['Total'], color: '#64748b' },
            { id: 'Active', label: 'กำลังใช้งาน', count: rCounts['Active'], color: '#3b82f6' },
            { id: 'Upcoming', label: 'รอเริ่มต้น', count: rCounts['Upcoming'], color: '#f59e0b' },
            { id: 'Expired', label: 'หมดเวลา', count: rCounts['Expired'], color: '#ef4444' },
            { id: 'Inactive', label: 'ปิดใช้งาน', count: rCounts['Inactive'], color: '#6b7280' }
        ];

        let cardsHtml = '<div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-2 mb-4">';
        rConfigs.forEach(c => {
            const isActive = state.referrerFilter === c.id;
            const activeStyle = isActive ? `box-shadow: 0 0 0 3px rgba(0,0,0,0.05); border-color: ${c.color} !important; background-color: ${c.color}15; transform: translateY(-2px);` : '';
            cardsHtml += `
            <div class="col">
                <div class="card h-100 shadow-sm border" style="cursor: pointer; transition: all 0.2s; border-left: 4px solid ${c.color} !important; ${activeStyle}" onclick="setReferrerFilter('${c.id}')">
                    <div class="card-body p-2 text-center">
                        <div class="small fw-bold text-muted mb-1" style="font-size: 0.75rem; ${isActive ? `color: ${c.color} !important;` : ''}">${c.label}</div>
                        <h4 class="mb-0 fw-bold" style="color: ${c.color};">${c.count}</h4>
                    </div>
                </div>
            </div>`;
        });
        cardsHtml += '</div>';

        document.getElementById('referrersDashboardCards').innerHTML = cardsHtml;
        applyReferrerFilters();
    }

    function setReferrerFilter(status) { state.referrerFilter = status; renderReferrersDashboard(); }

    function applyReferrerFilters() {
        let filteredData = state.referrerFilter === 'All' ? state.referrers : state.referrers.filter(r => r.Calculated_Status === state.referrerFilter);
        renderReferrersTable(filteredData);
        drawReferrerGanttChart(filteredData);
    }

    function renderReferrersTable(data) {
        const tbody = document.getElementById('referrersTableBody');
        if (!tbody) return;
        if (!data || data.length === 0) { 
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-muted">ไม่พบข้อมูลผู้แนะนำในสถานะนี้</td></tr>`; return; 
        }

        tbody.innerHTML = data.map((row, index) => {
            let statusBadge = '';
            if (row.Calculated_Status === 'Inactive') statusBadge = '<span class="badge bg-secondary">ปิดใช้งาน (Inactive)</span>';
            else if (row.Calculated_Status === 'Expired') statusBadge = '<span class="badge bg-danger">หมดเวลา (Expired)</span>';
            else if (row.Calculated_Status === 'Upcoming') statusBadge = '<span class="badge bg-warning text-dark">รอเริ่มต้น (Upcoming)</span>';
            else if (row.Calculated_Status === 'Active') statusBadge = '<span class="badge bg-primary">กำลังใช้งาน (Active)</span>';

            const discount = row.Discount_Amount > 0 ? `฿${row.Discount_Amount.toLocaleString()}` : '-';
            const commission = row.Commission_Amount > 0 ? `฿${row.Commission_Amount.toLocaleString()}` : '-';

            return `
            <tr>
                <td class="fw-bold text-center text-muted">${index + 1}</td>
                <td class="text-primary fw-bold">${row.Ref_ID || '-'}</td>
                <td class="fw-bold">${row.Ref_Name || '-'}<br><small class="text-muted">${row.Description || '-'}</small></td>
                <td class="text-end fw-bold text-danger">${discount}</td>
                <td class="text-end fw-bold text-warning-emphasis">${commission}</td>
                <td><i class="fa-regular fa-calendar text-muted"></i> ${formatDateForDisplay(row.Start_Date)} <i class="fa-solid fa-arrow-right mx-1 text-muted"></i> ${formatDateForDisplay(row.End_Date)}</td>
                <td>${statusBadge}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-secondary rounded-circle me-1" onclick="editReferrer('${row.Ref_ID}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="deleteReferrer('${row.Ref_ID}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    function drawReferrerGanttChart(data = state.referrers) {
        const container = document.getElementById('referrerTimeline');
        if (!container || typeof google === 'undefined' || !google.visualization) return;
        
        let activeData = state.referrerFilter === 'All' ? data : data.filter(r => r.Calculated_Status === state.referrerFilter);
        if (!activeData || activeData.length === 0) { container.innerHTML = '<div class="text-center mt-5 text-muted">ไม่มีข้อมูลสำหรับสร้างกราฟ</div>'; return; }

        const chart = new google.visualization.Timeline(container);
        const dataTable = new google.visualization.DataTable();
        dataTable.addColumn({ type: 'string', id: 'Status' }); 
        dataTable.addColumn({ type: 'string', id: 'Name' }); 
        dataTable.addColumn({ type: 'date', id: 'Start' }); 
        dataTable.addColumn({ type: 'date', id: 'End' });

        const rows = activeData.map(r => {
            if (r.Parsed_Start && r.Parsed_End) {
                let lbl = 'ไม่ระบุ';
                if (r.Calculated_Status === 'Active') lbl = 'พร้อมใช้งาน (Active)'; 
                else if (r.Calculated_Status === 'Inactive') lbl = 'ปิดใช้งาน (Inactive)'; 
                else if (r.Calculated_Status === 'Expired') lbl = 'หมดเวลา (Expired)'; 
                else if (r.Calculated_Status === 'Upcoming') lbl = 'รอเริ่มต้น (Upcoming)';
                return [lbl, r.Ref_Name || 'Referrer', r.Parsed_Start, r.Parsed_End];
            }
            return null;
        }).filter(r => r !== null);

        if (rows.length > 0) {
            dataTable.addRows(rows);
            const colors = [...new Set(rows.map(r => r[0]))].map(l => l.includes('Active') ? '#3b82f6' : l.includes('Expired') ? '#ef4444' : l.includes('Upcoming') ? '#f59e0b' : '#6b7280');
            
            chart.draw(dataTable, { 
                timeline: { colorByRowLabel: true }, 
                colors: colors, 
                backgroundColor: '#ffffff', 
                height: Math.max(250, rows.length * 45 + 50),
                hAxis: {
                    format: 'dd/MM/yyyy'
                }
            });
        }
    }

    // ==========================================
    // 🖍️ 3. จัดการฟอร์ม (Modal & Submit)
    // ==========================================
    
    // -- PROMOTIONS MODAL --
    function openPromoModal() {
        const f = document.getElementById('promoForm'); if (f) f.reset(); 
        document.getElementById('promoId').value = ''; 
        document.getElementById('promoModalTitle').innerHTML = '<i class="fa-solid fa-bullhorn"></i> เพิ่มโปรโมชั่นใหม่';
        if (typeof flatpickr !== 'undefined') {
            flatpickr("#promoStartDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: new Date() }); 
            flatpickr("#promoEndDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: new Date() });
        }
        bootstrap.Modal.getOrCreateInstance(document.getElementById('promoModal')).show();
    }

    function editPromo(promoId) {
        const promo = state.promotions.find(p => p.Promo_ID === promoId); if (!promo) return;
        document.getElementById('promoId').value = promoId; 
        document.getElementById('promoModalTitle').innerHTML = '<i class="fa-solid fa-pen"></i> แก้ไขโปรโมชั่น: ' + promoId;
        const form = document.getElementById('promoForm');
        
        if (form.elements['promoName']) form.elements['promoName'].value = promo.Promo_Name || ''; 
        if (form.elements['description']) form.elements['description'].value = promo.Description || ''; 
        if (form.elements['status']) form.elements['status'].value = promo.Status || 'Active';
        
        const discountInput = document.getElementById('promoDiscount');
        if (discountInput) discountInput.value = promo.Discount_Amount || 0;
        
        if (typeof flatpickr !== 'undefined') {
            flatpickr("#promoStartDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(promo.Start_Date) || new Date() }); 
            flatpickr("#promoEndDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(promo.End_Date) || new Date() });
        }
        bootstrap.Modal.getOrCreateInstance(document.getElementById('promoModal')).show();
    }

    async function deletePromo(promoId) {
        Swal.fire({ title: 'ยืนยันการลบ?', text: `ลบโปรโมชั่น ${promoId}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบทิ้ง' }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let res = await supabase.from('db_promotions').delete().eq('promo_id', promoId);
                    if (res.error) res = await supabase.from('db_promotions').delete().eq('Promo_ID', promoId);
                    await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'DELETE_PROMO', module: 'Promotions', details: `Deleted Promo ID: ${promoId}` }]);
                    Swal.fire('ลบสำเร็จ!', '', 'success'); loadPromotionsData(); loadInitialDataFromSupabase();
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            }
        });
    }

    // -- REFERRERS MODAL --
    function openReferrerModal() {
        const f = document.getElementById('referrerForm'); if (f) f.reset(); 
        document.getElementById('refId').value = ''; 
        document.getElementById('referrerModalTitle').innerHTML = '<i class="fa-solid fa-user-plus"></i> เพิ่มผู้แนะนำใหม่ / โค้ดอินฟลู';
        if (typeof flatpickr !== 'undefined') {
            flatpickr("#refStartDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: new Date() }); 
            flatpickr("#refEndDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: new Date() });
        }
        bootstrap.Modal.getOrCreateInstance(document.getElementById('referrerModal')).show();
    }

    function editReferrer(refId) {
        const ref = state.referrers.find(r => r.Ref_ID === refId); if (!ref) return;
        document.getElementById('refId').value = refId; 
        document.getElementById('referrerModalTitle').innerHTML = '<i class="fa-solid fa-pen"></i> แก้ไขผู้แนะนำ: ' + refId;
        const form = document.getElementById('referrerForm');
        
        if (form.elements['refName']) form.elements['refName'].value = ref.Ref_Name || ''; 
        if (form.elements['description']) form.elements['description'].value = ref.Description || ''; 
        if (form.elements['status']) form.elements['status'].value = ref.Status || 'Active';
        
        const discountInput = document.getElementById('refDiscount');
        if (discountInput) discountInput.value = ref.Discount_Amount || 0;
        
        const commInput = document.getElementById('refCommission');
        if (commInput) commInput.value = ref.Commission_Amount || 0;

        if (typeof flatpickr !== 'undefined') {
            flatpickr("#refStartDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(ref.Start_Date) || new Date() }); 
            flatpickr("#refEndDate", { locale: "th", dateFormat: "d/m/Y", defaultDate: formatDateForDisplay(ref.End_Date) || new Date() });
        }
        bootstrap.Modal.getOrCreateInstance(document.getElementById('referrerModal')).show();
    }

    async function deleteReferrer(refId) {
        Swal.fire({ title: 'ยืนยันการลบ?', text: `ลบผู้แนะนำ ${refId}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบทิ้ง' }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    let res = await supabase.from('db_referrers').delete().eq('ref_id', refId);
                    if (res.error) res = await supabase.from('db_referrers').delete().eq('Ref_ID', refId);
                    await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'DELETE_REFERRER', module: 'Referrers', details: `Deleted Referrer ID: ${refId}` }]);
                    Swal.fire('ลบสำเร็จ!', '', 'success'); loadPromotionsData(); loadInitialDataFromSupabase();
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            }
        });
    }

    // ==========================================
    // 🧲 FORM SUBMISSIONS
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        // Promo Submit
        const promoForm = document.getElementById('promoForm');
        if (promoForm) {
            promoForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const fd = new FormData(this); const promoId = fd.get('promoId'); 
                
                const discountInput = document.getElementById('promoDiscount');
                const discountVal = discountInput ? (parseFloat(discountInput.value) || 0) : 0;

                const payload = { 
                    promo_name: fd.get('promoName'), start_date: formatDateForDB(fd.get('startDate')), 
                    end_date: formatDateForDB(fd.get('endDate')), description: fd.get('description'), 
                    status: fd.get('status'), discount_amount: discountVal 
                };
                
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    if (promoId) {
                        let res = await supabase.from('db_promotions').update(payload).eq('promo_id', promoId);
                        if (res.error) res = await supabase.from('db_promotions').update(payload).eq('Promo_ID', promoId);
                        await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'UPDATE_PROMO', module: 'Promotions', details: `Updated Promo ID: ${promoId}` }]);
                    } else {
                        const newId = "PRM-" + new Date().getTime().toString().substring(7);
                        payload.promo_id = newId; 
                        let res = await supabase.from('db_promotions').insert([payload]);
                        if (res.error) {
                            payload.Promo_ID = newId; delete payload.promo_id;
                            res = await supabase.from('db_promotions').insert([payload]);
                        }
                        await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'CREATE_PROMO', module: 'Promotions', details: `Created Promo ID: ${newId}` }]);
                    }
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('promoModal')).hide(); 
                    promoForm.reset(); Swal.fire('สำเร็จ!', '', 'success'); loadInitialDataFromSupabase(); 
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            });
        }

        // Referrer Submit
        const referrerForm = document.getElementById('referrerForm');
        if (referrerForm) {
            referrerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const fd = new FormData(this); const refId = fd.get('refId'); 
                
                const discountInput = document.getElementById('refDiscount');
                const discountVal = discountInput ? (parseFloat(discountInput.value) || 0) : 0;
                
                const commInput = document.getElementById('refCommission');
                const commissionVal = commInput ? (parseFloat(commInput.value) || 0) : 0;

                const payload = { 
                    ref_name: fd.get('refName'), start_date: formatDateForDB(fd.get('startDate')), 
                    end_date: formatDateForDB(fd.get('endDate')), description: fd.get('description'), 
                    status: fd.get('status'), discount_amount: discountVal, commission_amount: commissionVal
                };
                
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    if (refId) {
                        let res = await supabase.from('db_referrers').update(payload).eq('ref_id', refId);
                        if (res.error) res = await supabase.from('db_referrers').update(payload).eq('Ref_ID', refId);
                        await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'UPDATE_REFERRER', module: 'Referrers', details: `Updated Referrer ID: ${refId}` }]);
                    } else {
                        const newId = "REF-" + new Date().getTime().toString().substring(7);
                        payload.ref_id = newId; 
                        let res = await supabase.from('db_referrers').insert([payload]);
                        if (res.error) {
                            payload.Ref_ID = newId; delete payload.ref_id;
                            res = await supabase.from('db_referrers').insert([payload]);
                        }
                        await supabase.from('db_logs').insert([{ user_email: state.currentUser?.email, action: 'CREATE_REFERRER', module: 'Referrers', details: `Created Referrer ID: ${newId}` }]);
                    }
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('referrerModal')).hide(); 
                    referrerForm.reset(); Swal.fire('สำเร็จ!', '', 'success'); loadInitialDataFromSupabase(); 
                } catch (err) { Swal.fire('Error', err.message, 'error'); }
            });
        }
    });
</script>
